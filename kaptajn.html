<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
    <title>mk40 — Kaptajn</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;0,9..144,900&family=JetBrains+Mono:wght@500;700;800&display=swap">
    <style>
        :root {
            /* Paper palette + team colors + fonts — delt med cards-h.html (canonical). */
            --ink-void: oklch(94% 0.012 60);
            --ink-deep: oklch(97% 0.008 60);
            --ink-card: oklch(99% 0.005 60);
            --ink-elevated: oklch(96% 0.010 60);
            --ink-border-soft: oklch(88% 0.012 60);
            --ink-border: oklch(75% 0.012 60);
            --bone: oklch(20% 0.014 30);
            --bone-muted: oklch(40% 0.014 30);
            --bone-dim: oklch(58% 0.012 30);
            --ok-green: oklch(55% 0.15 150);
            --wait-amber: oklch(60% 0.13 75);
            --signal-error: oklch(55% 0.22 25);
            --team-pink: oklch(58% 0.22 5);
            --team-navy: oklch(42% 0.20 258);
            --team-grøn: oklch(50% 0.18 145);
            --team-orange: oklch(68% 0.18 65);
            --team-lilla: oklch(52% 0.18 295);
            --font-display: "Fraunces", Georgia, serif;
            --font-label: "Segoe UI", system-ui, sans-serif;
            --font-numeric: "JetBrains Mono", ui-monospace, monospace;
            --shadow-low: 0 1px 2px oklch(20% 0.02 30 / 0.08), 0 2px 6px oklch(20% 0.02 30 / 0.06);
            --shadow-medium: 0 2px 4px oklch(20% 0.02 30 / 0.10), 0 8px 24px oklch(20% 0.02 30 / 0.08);
            --w-regular: 600; --w-bold: 700; --w-black: 900;
            --ls-label: 0.12em; --ls-tight: -0.02em;
        }
        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; }
        body {
            background: var(--ink-void);
            color: var(--bone);
            font-family: var(--font-label);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
        }
        /* iPhone: respektér safe-area (notch + home-indicator). Bund-padding holder
           sidste kort fri af home-baren; toast får samme sikkerhedsafstand. */
        .wrap { max-width: 540px; margin: 0 auto; padding: 0 0 calc(4rem + env(safe-area-inset-bottom)); }

        /* ===== Team header ===== */
        .team-head {
            position: sticky; top: 0; z-index: 10;
            background: var(--team-color, var(--bone));
            color: oklch(98% 0.01 60);
            /* Top-padding inkl. notch så titlen aldrig gemmer sig under statusbaren. */
            padding: calc(1.1rem + env(safe-area-inset-top)) 1.25rem 1rem;
            box-shadow: var(--shadow-medium);
        }
        .team-head .kicker {
            font-size: 0.7rem; letter-spacing: var(--ls-label); text-transform: uppercase;
            font-weight: var(--w-bold); opacity: 0.85; margin: 0 0 0.15rem;
        }
        .team-head h1 {
            font-family: var(--font-display); font-weight: var(--w-black);
            font-size: 1.6rem; line-height: 1.05; margin: 0; letter-spacing: var(--ls-tight);
        }
        .team-head .progress {
            margin-top: 0.6rem; font-size: 0.8rem; font-weight: var(--w-bold);
            font-family: var(--font-numeric); opacity: 0.92;
        }

        /* ===== Kaptajn-instruktioner ===== */
        .instructions {
            margin: 1rem 1rem 0; padding: 0.9rem 1rem;
            background: var(--ink-card); border: 1px solid var(--ink-border-soft);
            border-left: 4px solid var(--team-color, var(--ink-border));
            border-radius: 10px; box-shadow: var(--shadow-low);
        }
        .instructions p { margin: 0; font-size: 0.85rem; line-height: 1.4; color: var(--bone-muted); }
        .instructions p + p { margin-top: 0.45rem; }
        .instr-toggle {
            width: 100%; background: none; border: none; padding: 0; font: inherit; color: inherit;
            display: flex; align-items: center; gap: 0.5rem; cursor: pointer; text-align: left;
        }
        .instr-title {
            flex: 1; margin: 0; font-family: var(--font-display); font-weight: var(--w-bold);
            font-size: 0.95rem; color: var(--bone);
        }
        .instr-toggle .chevron { color: var(--bone-dim); font-size: 1rem; transition: transform 0.2s; }
        .instructions.collapsed .instr-toggle .chevron { transform: rotate(-90deg); }
        .instr-body { margin-top: 0.5rem; }
        .instructions.collapsed .instr-body { display: none; }
        .instr-tip { color: var(--bone-dim) !important; }

        /* ===== Discipline cards (accordion) ===== */
        .list { padding: 1rem 1rem 0; display: flex; flex-direction: column; gap: 0.85rem; }
        .disc {
            background: var(--ink-card); border: 1px solid var(--ink-border-soft);
            border-radius: 12px; box-shadow: var(--shadow-low); overflow: hidden;
        }
        /* Header = toggle. Hele rækken er klikbar; chevron roterer når åben. */
        .disc-top {
            width: 100%; text-align: left; background: var(--ink-card); border: none;
            font: inherit; color: inherit; cursor: pointer; user-select: none;
            padding: 0.9rem 1rem; display: flex; align-items: center; gap: 0.5rem;
        }
        .disc-name { flex: 1; min-width: 0; }
        .disc-name h2 {
            font-family: var(--font-display); font-weight: var(--w-bold);
            font-size: 1.15rem; margin: 0; line-height: 1.1;
        }
        .disc-hint {
            font-size: 0.72rem; color: var(--bone-dim); margin-top: 0.2rem;
            display: flex; gap: 0.4rem; align-items: center; flex-wrap: wrap;
        }
        .type-badge {
            font-size: 0.62rem; letter-spacing: var(--ls-label); text-transform: uppercase;
            font-weight: var(--w-bold); color: var(--bone-muted);
            border: 1px solid var(--ink-border-soft); border-radius: 999px; padding: 0.1rem 0.5rem;
        }
        /* Sammenklappet opsummering: rå-tal (tastet) eller placering (låst), i hold-farve. */
        .disc-summary {
            font-family: var(--font-numeric); font-weight: var(--w-bold); font-size: 0.9rem;
            color: var(--team-color, var(--bone-muted)); white-space: nowrap;
        }
        .status-chip {
            font-size: 0.7rem; font-weight: var(--w-bold); white-space: nowrap;
            padding: 0.25rem 0.55rem; border-radius: 999px;
        }
        .status-chip.missing { background: oklch(92% 0.012 60); color: var(--bone-dim); }
        .status-chip.entered { background: color-mix(in oklch, var(--wait-amber) 18%, transparent); color: var(--wait-amber); }
        .status-chip.locked  { background: color-mix(in oklch, var(--ok-green) 18%, transparent); color: var(--ok-green); }
        .chevron { color: var(--bone-dim); font-size: 1rem; transition: transform 0.2s; }
        .disc.open .chevron { transform: rotate(180deg); }

        /* Body skjult når sammenklappet. */
        .disc-body { padding: 0 1rem 1rem; display: none; }
        .disc.open .disc-body { display: block; }
        .field-row { display: flex; gap: 0.5rem; align-items: stretch; }
        input[type="number"], input[type="text"] {
            width: 100%; font-family: var(--font-numeric); font-size: 1rem;
            min-height: 48px; padding: 0.7rem 0.8rem; border: 1.5px solid var(--ink-border);
            border-radius: 9px; background: var(--ink-deep); color: var(--bone);
            -webkit-appearance: none; appearance: none;
        }
        /* 16px = iOS' grænse: under den auto-zoomer Safari ved fokus. Hold note-feltet >=16px. */
        input[type="text"] { font-family: var(--font-label); font-size: 1rem; }
        input:focus { outline: none; border-color: var(--team-color, var(--bone)); }
        .note-input { margin-top: 0.5rem; }
        /* Skabelsesberetningen — identitets-felter */
        .id-field { margin-bottom: 0.7rem; }
        .id-label {
            display: block; font-size: 0.72rem; font-weight: var(--w-bold); color: var(--bone-muted);
            letter-spacing: 0.02em; margin-bottom: 0.3rem;
        }
        .id-hint { font-weight: var(--w-regular); color: var(--bone-dim); }
        textarea.id-input {
            width: 100%; font-family: var(--font-label); font-size: 1rem; line-height: 1.4;
            min-height: 96px; padding: 0.7rem 0.8rem; border: 1.5px solid var(--ink-border);
            border-radius: 9px; background: var(--ink-deep); color: var(--bone); resize: vertical;
            -webkit-appearance: none; appearance: none;
        }
        textarea.id-input:focus { outline: none; border-color: var(--team-color, var(--bone)); }
        .id-foot { display: flex; align-items: center; gap: 0.6rem; margin-top: 0.3rem; }
        .id-foot .dommer-note { flex: 1; font-size: 0.72rem; color: var(--bone-dim); }
        .id-scoring {
            font-size: 0.78rem; line-height: 1.4; color: var(--bone-muted);
            background: var(--ink-elevated); border-radius: 8px; padding: 0.6rem 0.75rem; margin-bottom: 0.85rem;
        }
        .id-scoring strong { color: var(--bone); font-weight: var(--w-bold); }
        .save-btn {
            font-family: var(--font-label); font-weight: var(--w-bold); font-size: 1rem;
            min-height: 48px; padding: 0.7rem 1.25rem; border: none; border-radius: 9px; white-space: nowrap;
            background: var(--team-color, var(--bone)); color: oklch(98% 0.01 60);
            box-shadow: var(--shadow-low); cursor: pointer; transition: transform 0.08s, opacity 0.2s;
        }
        .save-btn:active { transform: scale(0.96); }
        .save-btn:disabled { opacity: 0.45; }
        .save-btn.saved { background: var(--ok-green); }

        /* Venter-på-host-linje + tastet-tæller. */
        .waiting { font-size: 0.78rem; margin: 0.6rem 0 0; color: var(--ok-green); font-weight: var(--w-bold); }
        .waiting.muted { color: var(--bone-dim); font-weight: var(--w-regular); }

        .locked-result {
            display: flex; align-items: baseline; gap: 0.6rem;
            padding: 0.4rem 0; font-family: var(--font-numeric);
        }
        .locked-result .place { font-size: 1.6rem; font-weight: var(--w-black); color: var(--team-color, var(--bone)); }
        .locked-result .pts { font-size: 1rem; font-weight: var(--w-bold); color: var(--bone-muted); }
        .locked-result .raw { font-size: 0.78rem; color: var(--bone-dim); margin-left: auto; }

        .state-msg { padding: 3rem 1.5rem; text-align: center; color: var(--bone-muted); }
        .state-msg.error { color: var(--signal-error); }

        .toast {
            position: fixed; left: 50%; bottom: calc(1.5rem + env(safe-area-inset-bottom)); transform: translateX(-50%) translateY(2rem);
            background: var(--bone); color: var(--ink-card); font-weight: var(--w-bold);
            font-size: 0.85rem; padding: 0.7rem 1.2rem; border-radius: 999px;
            box-shadow: var(--shadow-medium); opacity: 0; pointer-events: none;
            transition: opacity 0.25s, transform 0.25s; z-index: 50;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast.error { background: var(--signal-error); }
    </style>
</head>
<body>
    <div class="wrap">
        <div id="content"><div class="state-msg">Indlæser…</div></div>
    </div>
    <div id="toast" class="toast"></div>

    <script type="module">
        import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
        import { SUPABASE_URL, SUPABASE_ANON_KEY } from "./config.js";

        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const POLL_MS = 5000;

        // ?team=N — hvilket hold denne kaptajn tilhører.
        const teamKey = Number(new URLSearchParams(location.search).get("team"));
        const contentEl = document.getElementById("content");
        const toastEl = document.getElementById("toast");

        const PLACE_LABEL = { 10: "1.", 7: "2.", 5: "3.", 3: "4.", 1: "5." };

        // Instruktions-kortet huskes sammenklappet på tværs af besøg (læst én gang = nok).
        let instrCollapsed = false;
        try { instrCollapsed = localStorage.getItem("mk40_instr_collapsed") === "1"; } catch {}

        // Skabelsesberetningen (gren-key 1): kaptajn-identitet, IKKE en score.
        // Kaptajnen udfylder kongerige-navn/kælenavn/motto/beretning (→ DimTeam);
        // dommeren indtaster den analoge afstemning + låser placeringen separat.
        const CREATION_KEY = 1;

        function cssVarSafe(name) { return String(name).replace(/\//g, "").replace(/\s+/g, ""); }
        const hasRaw = (r) => r && r.raw_value !== null && r.raw_value !== undefined;
        function esc(s) {
            if (s == null) return "";
            return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
        }
        let toastTimer;
        function toast(msg, isError = false) {
            clearTimeout(toastTimer);
            toastEl.textContent = msg;
            toastEl.className = "toast show" + (isError ? " error" : "");
            toastTimer = setTimeout(() => { toastEl.className = "toast"; }, 2200);
        }

        let allTeams = [];      // alle hold (til total-tæller)
        let team = null;        // dette holds DimTeam-row
        let disciplines = [];
        let allScores = [];     // alle holds rækker (til "X/N hold tastet")
        let myScores = {};      // discipline_key → mit holds row
        const openKeys = new Set();   // hvilke grene er foldet ud
        let initializedOpen = false;  // auto-åbn kun ved første render

        async function load() {
            const [teamRes, discRes, scoreRes] = await Promise.all([
                supabase.from("DimTeam").select("*").order("team_key"),
                supabase.from("DimDiscipline").select("*").order("discipline_key"),
                supabase.from("FactScore").select("team_key,discipline_key,score_id,raw_value,points,is_final,notes"),
            ]);
            if (teamRes.error) throw new Error(teamRes.error.message);
            if (discRes.error) throw new Error(discRes.error.message);
            if (scoreRes.error) throw new Error(scoreRes.error.message);
            allTeams = teamRes.data;
            team = allTeams.find((t) => t.team_key === teamKey);
            if (!team) throw new Error(`Hold ${teamKey} findes ikke`);
            disciplines = discRes.data;
            allScores = scoreRes.data;
            myScores = {};
            for (const r of allScores) if (r.team_key === teamKey) myScores[r.discipline_key] = r;
        }

        // Antal hold der har tastet et resultat i en given gren (distinkte hold, rå-tal != null).
        function enteredCountFor(discKey) {
            const seen = new Set();
            for (const r of allScores) {
                if (r.discipline_key === discKey && hasRaw(r)) seen.add(r.team_key);
            }
            return seen.size;
        }

        // Hvilken gren skal stå åben ved første load:
        //   1) den hvis planlagte tidsvindue indeholder nu (festdagen), ellers
        //   2) første gren jeg endnu ikke har tastet, ellers
        //   3) første gren der ikke er låst, ellers første.
        function activeDisciplineKey() {
            const now = Date.now();
            for (const d of disciplines) {
                if (d.planned_start && d.planned_end) {
                    const s = Date.parse(String(d.planned_start).replace(" ", "T"));
                    const e = Date.parse(String(d.planned_end).replace(" ", "T"));
                    if (!isNaN(s) && !isNaN(e) && now >= s && now <= e) return d.discipline_key;
                }
            }
            for (const d of disciplines) if (!hasRaw(myScores[d.discipline_key])) return d.discipline_key;
            for (const d of disciplines) if (!myScores[d.discipline_key]?.is_final) return d.discipline_key;
            return disciplines[0]?.discipline_key ?? null;
        }

        function render() {
            const teamVar = `var(--team-${cssVarSafe(team.team_color)})`;
            const doneCount = disciplines.filter((d) =>
                d.discipline_key === CREATION_KEY ? !!team.team_creation : hasRaw(myScores[d.discipline_key])
            ).length;

            if (!initializedOpen) {
                const active = activeDisciplineKey();
                if (active != null) openKeys.add(active);
                initializedOpen = true;
            }

            let html = `<div class="team-head" style="--team-color:${teamVar}">
                <p class="kicker">Kaptajn · Kongerigernes Kamp</p>
                <h1>${esc(team.team_name)}</h1>
                <div class="progress">${doneCount} / ${disciplines.length} grene tastet</div>
            </div>
            <div class="instructions ${instrCollapsed ? "collapsed" : ""}" style="--team-color:${teamVar}">
                <button class="instr-toggle" type="button" data-instr-toggle aria-expanded="${!instrCollapsed}">
                    <span class="instr-title">Sådan gør du som kaptajn</span>
                    <span class="chevron" aria-hidden="true">▾</span>
                </button>
                <div class="instr-body">
                    <p>Når en gren er færdigspillet, taster du <strong>jeres holds resultat</strong> her. Dommeren låser grenen når alle ${allTeams.length} hold har tastet — så omregnes resultaterne til point og vises på storskærmen.</p>
                    <p class="instr-tip">💡 Skriv gerne en note med lidt drama — den fodrer AI-kommentaren på storskærmen.</p>
                </div>
            </div>
            <div class="list">`;

            for (const d of disciplines) {
                const row = myScores[d.discipline_key];
                const dir = d.discipline_key === CREATION_KEY
                    ? "Udfyld jeres identitet"
                    : (d.sort_direction === "asc" ? "Lavest vinder" : "Højest vinder");
                const isOpen = openKeys.has(d.discipline_key);
                const entered = enteredCountFor(d.discipline_key);
                let chip, summary, body;

                if (d.discipline_key === CREATION_KEY) {
                    const filled = !!team.team_creation;
                    chip = filled
                        ? `<span class="status-chip locked">✅ Udfyldt</span>`
                        : `<span class="status-chip missing">⬜ Mangler</span>`;
                    summary = filled ? `<span class="disc-summary">${esc(team.team_short || team.team_name)}</span>` : ``;
                    body = identityBody(team);
                } else if (row && row.is_final) {
                    const place = PLACE_LABEL[row.points] ?? "–";
                    chip = `<span class="status-chip locked">🔒 Låst</span>`;
                    summary = `<span class="disc-summary">${place} plads · ${row.points ?? "–"} pt</span>`;
                    body = `<div class="locked-result">
                        <span class="place">${place} plads</span>
                        <span class="pts">${row.points ?? "–"} point</span>
                        <span class="raw">dit resultat: ${esc(row.raw_value ?? "–")}</span>
                    </div>`;
                } else if (hasRaw(row)) {
                    chip = `<span class="status-chip entered">✅ Tastet</span>`;
                    summary = `<span class="disc-summary">${esc(row.raw_value)}</span>`;
                    body = inputBody(d, row, entered, allTeams.length);
                } else {
                    chip = `<span class="status-chip missing">⬜ Mangler</span>`;
                    summary = ``;
                    body = inputBody(d, row, entered, allTeams.length);
                }

                html += `<div class="disc ${isOpen ? "open" : ""}" style="--team-color:${teamVar}" data-disc="${d.discipline_key}">
                    <div class="disc-top" role="button" tabindex="0" data-toggle aria-expanded="${isOpen}">
                        <div class="disc-name">
                            <h2>${esc(d.discipline_name)}</h2>
                            <div class="disc-hint"><span class="type-badge">${esc(d.discipline_type)}</span><span>${dir}</span></div>
                        </div>
                        ${summary}
                        ${chip}
                        <span class="chevron" aria-hidden="true">▾</span>
                    </div>
                    <div class="disc-body">${body}</div>
                </div>`;
            }
            html += `</div>`;
            contentEl.innerHTML = html;
            wireInputs();
        }

        function inputBody(d, row, entered, total) {
            const rawVal = row?.raw_value ?? "";
            const noteVal = row?.notes ?? "";
            const btnLabel = row ? "Opdatér" : "Gem";
            const winLabel = d.sort_direction === "asc" ? "laveste" : "højeste";
            const waiting = hasRaw(row)
                ? `<p class="waiting">✅ Gemt — venter på at dommeren låser · <strong>${entered}/${total}</strong> hold har tastet</p>`
                : `<p class="waiting muted">${entered}/${total} hold har tastet denne gren</p>`;
            return `<div class="id-scoring">🏆 <strong>Sådan gives point:</strong> holdet med ${winLabel} resultat får <strong>10 point</strong> (1. plads), derefter 7 / 5 / 3 / 1 efter placering.</div>
                <div class="field-row">
                    <input type="number" inputmode="decimal" step="any" class="raw-input"
                           placeholder="Jeres resultat" value="${esc(rawVal)}">
                    <button class="save-btn" type="button">${btnLabel}</button>
                </div>
                <input type="text" class="note-input raw-note" maxlength="140"
                       placeholder="Note til storskærmen — jo mere drama, jo federe 🎤" value="${esc(noteVal)}">
                ${waiting}`;
        }

        // Skabelsesberetningen: kaptajn-identitet → DimTeam (ikke FactScore, ingen score).
        function identityBody(t) {
            return `<div class="id-scoring">🏆 <strong>Sådan gives point:</strong> aftenens gæster stemmer på den bedste skabelsesberetning. Holdet med flest stemmer får <strong>10 point</strong> (1. plads), derefter 7 / 5 / 3 / 1 som de andre grene. Dommeren tæller stemmerne og låser.</div>
                <div class="id-field">
                    <label class="id-label">Kongerige-navn</label>
                    <input type="text" class="id-input id-name" maxlength="40"
                           placeholder="Jeres kongeriges navn" value="${esc(t.team_name ?? "")}">
                </div>
                <div class="id-field">
                    <label class="id-label">Kælenavn <span class="id-hint">— kort navn til tavlen</span></label>
                    <input type="text" class="id-input id-short" maxlength="14"
                           placeholder="fx Pink" value="${esc(t.team_short ?? "")}">
                </div>
                <div class="id-field">
                    <label class="id-label">Motto <span class="id-hint">— kort slogan på storskærmen</span></label>
                    <input type="text" class="id-input id-motto" maxlength="60"
                           placeholder="Jeres kongeriges motto" value="${esc(t.team_motto ?? "")}">
                </div>
                <div class="id-field">
                    <label class="id-label">Skabelsesberetningen <span class="id-hint">— jeres kongeriges historie</span></label>
                    <textarea class="id-input id-creation" rows="4"
                              placeholder="Fortæl hvordan jeres kongerige blev til…">${esc(t.team_creation ?? "")}</textarea>
                </div>
                <div class="id-foot">
                    <span class="dommer-note">Dommeren styrer selve afstemningen — I udfylder bare jeres identitet.</span>
                    <button class="save-btn" type="button">Gem</button>
                </div>`;
        }

        function wireInputs() {
            const instrToggle = contentEl.querySelector("[data-instr-toggle]");
            if (instrToggle) instrToggle.addEventListener("click", () => {
                instrCollapsed = !instrCollapsed;
                try { localStorage.setItem("mk40_instr_collapsed", instrCollapsed ? "1" : "0"); } catch {}
                instrToggle.closest(".instructions").classList.toggle("collapsed", instrCollapsed);
                instrToggle.setAttribute("aria-expanded", String(!instrCollapsed));
            });
            for (const card of contentEl.querySelectorAll(".disc")) {
                const discKey = Number(card.dataset.disc);
                // Header = toggle (klik eller Enter/Space). Påvirker ikke DB — kun udfold/fold.
                const toggle = card.querySelector("[data-toggle]");
                if (toggle) {
                    const flip = () => {
                        if (openKeys.has(discKey)) openKeys.delete(discKey); else openKeys.add(discKey);
                        const open = openKeys.has(discKey);
                        card.classList.toggle("open", open);
                        toggle.setAttribute("aria-expanded", String(open));
                    };
                    toggle.addEventListener("click", flip);
                    toggle.addEventListener("keydown", (e) => {
                        if (e.key === "Enter" || e.key === " ") { e.preventDefault(); flip(); }
                    });
                }
                const btn = card.querySelector(".save-btn");
                if (btn) {
                    if (discKey === CREATION_KEY) btn.addEventListener("click", () => saveIdentity(card, btn));
                    else btn.addEventListener("click", () => submit(card, discKey, btn));
                }
            }
        }

        async function submit(card, discKey, btn) {
            const rawInput = card.querySelector(".raw-input");
            const noteInput = card.querySelector(".raw-note");
            const rawValue = rawInput.value.trim();
            if (rawValue === "") { toast("Indtast et resultat først", true); rawInput.focus(); return; }

            btn.disabled = true;
            const payload = {
                team_key: teamKey,
                discipline_key: discKey,
                round_number: 1,
                raw_value: Number(rawValue),
                notes: noteInput.value.trim() || null,
            };
            // Upsert på (team, disciplin, runde): idempotent re-submit, rører ikke is_final/points.
            const { error } = await supabase
                .from("FactScore")
                .upsert(payload, { onConflict: "team_key,discipline_key,round_number" });

            if (error) {
                btn.disabled = false;
                toast("Kunne ikke gemme — prøv igen", true);
                console.error(error);
                return;
            }
            btn.classList.add("saved");
            btn.textContent = "Gemt ✓";
            toast("Resultat gemt");
            openKeys.add(discKey); // hold grenen åben efter gem så bekræftelsen er synlig
            await refresh(true);
        }

        // Skabelsesberetningen-kortet: gem holdets identitet på DimTeam (kræver anon-UPDATE
        // RLS-policy på DimTeam + kolonnerne team_short/team_creation — se SQL ved deploy).
        async function saveIdentity(card, btn) {
            const payload = {
                team_name: card.querySelector(".id-name").value.trim() || team.team_name,
                team_short: card.querySelector(".id-short").value.trim() || null,
                team_motto: card.querySelector(".id-motto").value.trim() || null,
                team_creation: card.querySelector(".id-creation").value.trim() || null,
            };
            btn.disabled = true;
            const { error } = await supabase.from("DimTeam").update(payload).eq("team_key", teamKey);
            if (error) {
                btn.disabled = false;
                toast("Kunne ikke gemme — prøv igen", true);
                console.error(error);
                return;
            }
            btn.classList.add("saved");
            btn.textContent = "Gemt ✓";
            toast("Jeres identitet er gemt");
            openKeys.add(CREATION_KEY); // hold kortet åbent efter gem
            await refresh(true);
        }

        // Skip poll-re-render mens kaptajnen taster i et felt — ellers smider 5s-pollen
        // fokus + det indtastede væk midt i indtastningen.
        function focusInsideContent() {
            const a = document.activeElement;
            return a && (a.tagName === "INPUT" || a.tagName === "TEXTAREA") && contentEl.contains(a);
        }

        async function refresh(force = false) {
            try {
                await load();
                if (force || !focusInsideContent()) render();
            } catch (err) {
                if (force) contentEl.innerHTML = `<div class="state-msg error">Fejl: ${esc(err.message)}</div>`;
            }
        }

        async function init() {
            if (!teamKey) {
                contentEl.innerHTML = `<div class="state-msg error">Mangler ?team=N i URL'en.<br>Scan dit holds QR-kode.</div>`;
                return;
            }
            await refresh(true);
            setInterval(() => refresh(false), POLL_MS);
        }

        init();
    </script>
</body>
</html>
