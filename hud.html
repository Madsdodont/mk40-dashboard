<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mk40 — HUD prototype</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,900&family=Inter:wght@500;600;700&family=JetBrains+Mono:wght@500;700;800&display=swap">
    <style>
        :root {
            --ink-deep:        oklch(10% 0.012 30);
            --ink-elevated:    oklch(16% 0.015 30);
            --ink-panel:       oklch(14% 0.013 30);
            --ink-border:      oklch(28% 0.018 30);
            --bone:            oklch(95% 0.008 60);
            --bone-muted:      oklch(68% 0.012 60);
            --bone-dim:        oklch(45% 0.010 60);
            --gold-ceremonial: oklch(78% 0.16 85);
            --live-red:        oklch(60% 0.22 25);
            --team-pink:        oklch(55% 0.22 25);
            --team-navy:        oklch(48% 0.20 245);
            --team-grøn:       oklch(50% 0.15 145);
            --team-orange:        oklch(80% 0.16 90);
            --team-lilla:   oklch(60% 0.005 60);
            --font-display:    "Fraunces", Georgia, serif;
            --font-label:      "Inter", system-ui, sans-serif;
            --font-numeric:    "JetBrains Mono", ui-monospace, monospace;
        }
        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; }
        body {
            background: var(--ink-deep); color: var(--bone);
            font-family: var(--font-label); min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            display: flex; flex-direction: column;
        }

        .proto-nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 20;
            background: oklch(7% 0.008 30 / 0.85); backdrop-filter: blur(8px);
            padding: 0.5rem 1.5rem; display: flex; gap: 0.5rem;
            font-family: var(--font-label); font-size: 0.75rem;
            font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
        }
        .proto-nav a {
            color: var(--bone-muted); text-decoration: none; padding: 0.25rem 0.75rem;
            border: 1px solid transparent;
        }
        .proto-nav a.current { color: var(--gold-ceremonial); border-color: var(--gold-ceremonial); }
        .proto-nav a:hover { color: var(--bone); }

        /* ===== Broadcast Banner ===== */
        .broadcast-banner {
            margin-top: 2.25rem;
            background: var(--ink-elevated);
            border-bottom: 1px solid var(--ink-border);
            padding: 0.875rem 2rem;
            display: flex; align-items: center; gap: 2rem;
            font-family: var(--font-label); font-size: 0.875rem;
            font-weight: 600; letter-spacing: 0.08em;
            text-transform: uppercase;
            overflow: hidden;
            white-space: nowrap;
        }

        .live-pill {
            display: inline-flex; align-items: center; gap: 0.5rem;
            background: var(--live-red); color: var(--bone);
            padding: 0.3rem 0.7rem;
            font-weight: 800; letter-spacing: 0.12em;
            font-size: 0.75rem;
        }
        .live-pill::before {
            content: ""; width: 7px; height: 7px; border-radius: 50%;
            background: var(--bone);
            animation: pulse 1.8s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .banner-block { display: flex; align-items: baseline; gap: 0.6rem; }
        .banner-label {
            color: var(--bone-dim); font-size: 0.6875rem;
            letter-spacing: 0.15em;
        }
        .banner-value {
            color: var(--bone); font-weight: 700;
        }
        .banner-value strong {
            font-family: var(--font-display); font-weight: 900;
            font-size: 1.125rem; letter-spacing: -0.01em;
            text-transform: none;
            color: var(--gold-ceremonial);
            margin-left: 0.5rem;
        }
        .banner-event {
            flex: 1; overflow: hidden;
            color: var(--bone); font-weight: 600;
        }
        .banner-event .team-tag {
            display: inline-block; padding: 0.15rem 0.5rem;
            background: var(--event-team-color, var(--ink-border));
            color: var(--bone);
            font-weight: 800;
            letter-spacing: 0.06em;
            margin-right: 0.5rem;
        }
        .banner-clock {
            font-family: var(--font-numeric); font-weight: 700;
            color: var(--bone); font-variant-numeric: tabular-nums;
            font-size: 1rem;
        }

        /* ===== Main grid ===== */
        main {
            flex: 1;
            padding: 1.25rem 2rem;
            display: grid;
            grid-template-columns: 1.55fr 1fr;
            grid-template-rows: minmax(38vh, 1fr) auto auto;
            gap: 1.25rem;
            max-width: 2400px;
            margin: 0 auto;
            width: 100%;
        }

        /* ===== Hero leaderboard (5 cinematic zones) ===== */
        .hero-leaderboard {
            grid-column: 1;
            grid-row: 1;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            background: var(--ink-panel);
            overflow: hidden;
        }

        .hero-zone {
            background:
                linear-gradient(180deg,
                    color-mix(in oklch, var(--team-color) 75%, transparent) 0%,
                    color-mix(in oklch, var(--team-color) 35%, var(--ink-panel)) 50%,
                    var(--ink-panel) 100%);
            padding: 1.25rem 1rem 1.25rem 1rem;
            display: flex; flex-direction: column;
            position: relative;
            border-right: 1px solid var(--ink-border);
        }
        .hero-zone:last-child { border-right: none; }

        .hero-zone.leader {
            box-shadow: inset 0 0 0 2px var(--gold-ceremonial);
            z-index: 1;
        }

        .hero-zone .rank {
            font-family: var(--font-numeric); font-weight: 800;
            font-size: 0.875rem;
            color: var(--bone); opacity: 0.7;
            letter-spacing: 0.1em;
        }
        .hero-zone.leader .rank { color: var(--gold-ceremonial); opacity: 1; }

        .hero-zone .name {
            font-family: var(--font-display);
            font-size: clamp(1.05rem, 1.4vw, 1.5rem);
            font-weight: 900; line-height: 0.95;
            color: var(--bone); letter-spacing: -0.02em;
            margin-top: 0.25rem;
            text-wrap: balance;
        }

        .hero-zone .total {
            font-family: var(--font-display);
            font-size: clamp(2.75rem, 5.5vw, 5.5rem);
            font-weight: 900; line-height: 0.85;
            color: var(--bone); letter-spacing: -0.04em;
            margin-top: auto; margin-bottom: 0.15rem;
            font-variant-numeric: tabular-nums;
        }
        .hero-zone.leader .total {
            color: var(--gold-ceremonial);
            text-shadow: 0 0 50px color-mix(in oklch, var(--gold-ceremonial) 60%, transparent);
        }
        .hero-zone .total-label {
            font-family: var(--font-label); font-size: 0.625rem;
            font-weight: 700; letter-spacing: 0.2em;
            color: var(--bone); opacity: 0.65;
            text-transform: uppercase;
        }

        /* ===== Bump chart panel ===== */
        .bump-panel {
            grid-column: 2;
            grid-row: 1;
            background: var(--ink-panel);
            padding: 1.25rem 1.5rem;
            display: flex; flex-direction: column;
            overflow: hidden;
        }
        .bump-panel .panel-header {
            display: flex; justify-content: space-between; align-items: baseline;
            margin-bottom: 0.75rem;
        }
        .panel-header .title {
            font-family: var(--font-display); font-weight: 700;
            font-size: 1.25rem; letter-spacing: -0.01em;
            color: var(--bone);
        }
        .panel-header .sub {
            font-family: var(--font-label); font-size: 0.6875rem;
            font-weight: 600; letter-spacing: 0.12em;
            color: var(--bone-dim); text-transform: uppercase;
        }

        .bump-svg {
            flex: 1; width: 100%;
            min-height: 200px;
        }
        .bump-svg .axis-line {
            stroke: var(--ink-border); stroke-width: 1; stroke-dasharray: 2 4;
        }
        .bump-svg .rank-label {
            font-family: var(--font-numeric); font-size: 11px;
            font-weight: 700; fill: var(--bone-dim);
            letter-spacing: 0.05em;
        }
        .bump-svg .team-line {
            stroke-width: 3; fill: none;
            stroke-linecap: round; stroke-linejoin: round;
        }
        .bump-svg .team-end-dot {
            stroke: var(--ink-panel); stroke-width: 2;
        }
        .bump-svg .team-end-label {
            font-family: var(--font-display); font-weight: 700;
            font-size: 12px; letter-spacing: -0.01em;
        }

        .bump-empty {
            text-align: center; padding: 2rem 1rem;
            color: var(--bone-dim);
            font-family: var(--font-label); font-size: 0.75rem;
            letter-spacing: 0.12em; text-transform: uppercase;
        }

        /* ===== Radar-cards row ===== */
        .radar-row {
            grid-column: 1 / -1;
            grid-row: 2;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 0.75rem;
        }

        .radar-card {
            background: var(--ink-panel);
            border-top: 4px solid var(--team-color);
            padding: 0.875rem 1rem;
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 0.875rem;
            align-items: center;
        }
        .radar-card.leader {
            box-shadow: inset 0 0 0 1.5px var(--gold-ceremonial);
        }

        .radar-svg { width: 88px; height: 88px; }
        .radar-svg .axis { stroke: var(--ink-border); stroke-width: 1; }
        .radar-svg .ring { stroke: var(--ink-border); stroke-width: 1; fill: none; opacity: 0.5; }
        .radar-svg .polygon {
            fill: var(--team-color); fill-opacity: 0.35;
            stroke: var(--team-color); stroke-width: 2;
            stroke-linejoin: round;
        }
        .radar-svg .axis-label {
            font-family: var(--font-label); font-size: 8px;
            font-weight: 600; letter-spacing: 0.08em;
            fill: var(--bone-dim); text-transform: uppercase;
        }

        .radar-card .meta {
            display: flex; flex-direction: column; min-width: 0;
        }
        .radar-card .name {
            font-family: var(--font-display); font-weight: 700;
            font-size: 0.875rem; line-height: 1.1; color: var(--bone);
            letter-spacing: -0.01em;
            text-wrap: balance;
        }
        .radar-card .total {
            font-family: var(--font-numeric); font-weight: 800;
            font-size: 1.5rem; color: var(--bone);
            margin-top: 0.25rem; line-height: 1;
            font-variant-numeric: tabular-nums;
        }
        .radar-card.leader .total { color: var(--gold-ceremonial); }
        .radar-card .rank {
            font-family: var(--font-label); font-size: 0.625rem;
            letter-spacing: 0.15em; text-transform: uppercase;
            color: var(--bone-dim); margin-top: 0.15rem;
        }

        /* ===== Discipline strip ===== */
        .disc-strip {
            grid-column: 1 / -1;
            grid-row: 3;
            background: var(--ink-panel);
            padding: 0.875rem 1.5rem;
            display: flex; align-items: stretch; gap: 0;
            overflow-x: auto;
        }
        .disc-pill {
            flex: 1;
            min-width: 0;
            padding: 0.5rem 0.875rem;
            display: flex; flex-direction: column;
            border-right: 1px solid var(--ink-border);
        }
        .disc-pill:last-child { border-right: none; }

        .disc-pill .label {
            font-family: var(--font-label); font-size: 0.75rem;
            font-weight: 700; letter-spacing: 0.1em;
            text-transform: uppercase; color: var(--bone-muted);
            display: flex; align-items: center; gap: 0.5rem;
        }
        .disc-pill[data-status="done"] .label { color: var(--gold-ceremonial); }
        .disc-pill[data-status="done"] .label::before {
            content: "✓"; font-weight: 900;
        }
        .disc-pill[data-status="pending"] .label::before {
            content: "○"; opacity: 0.6;
        }
        .disc-pill .meta {
            font-family: var(--font-numeric); font-size: 0.6875rem;
            font-weight: 600; color: var(--bone-dim);
            margin-top: 0.25rem;
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.05em;
        }

        /* ===== Mobile ===== */
        @media (max-width: 1100px) {
            main {
                grid-template-columns: 1fr;
                grid-template-rows: auto auto auto auto;
                padding: 1rem;
            }
            .hero-leaderboard { grid-column: 1; grid-row: 1; }
            .bump-panel { grid-column: 1; grid-row: 2; min-height: 280px; }
            .radar-row { grid-column: 1; grid-row: 3; grid-template-columns: repeat(2, 1fr); }
            .disc-strip { grid-column: 1; grid-row: 4; flex-wrap: wrap; }
            .disc-pill { min-width: 33%; border-right: none; }
            .broadcast-banner { padding: 0.75rem 1rem; flex-wrap: wrap; gap: 1rem; }
        }
        @media (max-width: 600px) {
            .hero-leaderboard { grid-template-columns: repeat(2, 1fr); }
            .hero-zone:nth-child(5) { grid-column: 1 / -1; }
            .radar-row { grid-template-columns: 1fr; }
        }

        .state-message {
            grid-column: 1 / -1;
            text-align: center; padding: 3rem 1rem;
            color: var(--bone-muted);
            font-family: var(--font-label); letter-spacing: 0.1em;
            text-transform: uppercase;
        }
        .state-message.error { color: var(--live-red); }
    </style>
</head>
<body>
    <nav class="proto-nav">
        <a href="./">Table (boring)</a>
        <a href="./cards.html">A · Cards</a>
        <a href="./bars.html">B · Bars</a>
        <a href="./cinema.html">C · Cinematic</a>
        <a href="./hud.html" class="current">D · HUD</a>
        <a href="./hud2.html">E · HUD v2</a>
    </nav>

    <div class="broadcast-banner" id="banner">
        <span class="live-pill">LIVE</span>
        <div class="banner-block">
            <span class="banner-label">Disciplin</span>
            <span class="banner-value" id="bnr-discipline">—</span>
        </div>
        <div class="banner-block">
            <span class="banner-label">Leader</span>
            <span class="banner-value" id="bnr-leader"><strong id="bnr-leader-total">—</strong></span>
        </div>
        <div class="banner-event" id="bnr-event"></div>
        <span class="banner-clock" id="bnr-clock">--:--</span>
    </div>

    <main id="main">
        <div class="hero-leaderboard" id="hero">
            <div class="state-message">Henter data…</div>
        </div>
        <div class="bump-panel">
            <div class="panel-header">
                <span class="title">Placering gennem aftenen</span>
                <span class="sub">Rank · Bump</span>
            </div>
            <svg class="bump-svg" id="bump-svg" viewBox="0 0 400 240" preserveAspectRatio="none"></svg>
        </div>
        <div class="radar-row" id="radar-row"></div>
        <div class="disc-strip" id="disc-strip"></div>
    </main>

    <script type="module">
        import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
        import { SUPABASE_URL, SUPABASE_ANON_KEY } from "./config.js";
        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const $ = id => document.getElementById(id);
        const hero = $("hero");
        const bumpSvg = $("bump-svg");
        const radarRow = $("radar-row");
        const discStrip = $("disc-strip");

        function cssVarSafe(name) { return String(name).replace(/\//g, "").replace(/\s+/g, ""); }
        function esc(s) { return String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c])); }
        function teamColorVar(team) { return `var(--team-${cssVarSafe(team.team_color)})`; }

        async function fetchAll() {
            const [t, d, s] = await Promise.all([
                supabase.from("DimTeam").select("*").order("team_key"),
                supabase.from("DimDiscipline").select("*").order("discipline_key"),
                supabase.from("FactScore").select("*").eq("is_final", true),
            ]);
            if (t.error || d.error || s.error) throw new Error(t.error?.message || d.error?.message || s.error?.message);
            return { teams: t.data, disciplines: d.data, scores: s.data };
        }

        function render({ teams, disciplines, scores }) {
            // === Matrix + totals + ranks =====================================
            const matrix = {};
            for (const r of scores) {
                if (!matrix[r.team_key]) matrix[r.team_key] = {};
                matrix[r.team_key][r.discipline_key] = r.points;
            }
            const totals = teams.map(t => ({
                team: t,
                total: disciplines.reduce((a, d) => a + (matrix[t.team_key]?.[d.discipline_key] ?? 0), 0),
            }));
            const sortedByTotal = [...totals].sort((a, b) => b.total - a.total);
            const leaderKey = sortedByTotal[0]?.team.team_key;
            const rankByKey = Object.fromEntries(sortedByTotal.map((x, i) => [x.team.team_key, i + 1]));
            const leaderTotal = sortedByTotal[0]?.total ?? 0;
            const leaderName = sortedByTotal[0]?.team.team_name ?? "—";

            // === Broadcast banner ============================================
            // Latest event: highest score_timestamp
            const sortedScores = [...scores].sort((a, b) => new Date(b.score_timestamp) - new Date(a.score_timestamp));
            const latest = sortedScores[0];
            const latestTeam = latest ? teams.find(t => t.team_key === latest.team_key) : null;
            const latestDisc = latest ? disciplines.find(d => d.discipline_key === latest.discipline_key) : null;
            $("bnr-discipline").textContent = latestDisc?.discipline_name ?? "—";
            $("bnr-leader").innerHTML = `${esc(leaderName)} <strong>${leaderTotal}</strong>`;
            if (latest && latestTeam && latestDisc) {
                $("bnr-event").innerHTML =
                    `<span class="team-tag" style="--event-team-color: ${teamColorVar(latestTeam)}">${esc(latestTeam.team_name)}</span>` +
                    `+${latest.points} i ${esc(latestDisc.discipline_name)}`;
            } else {
                $("bnr-event").textContent = "";
            }
            $("bnr-clock").textContent = new Date().toLocaleTimeString("da-DK", { hour: "2-digit", minute: "2-digit" });

            // === Hero leaderboard (5 cinematic zones) ========================
            hero.innerHTML = totals.map(x => {
                const isLeader = x.team.team_key === leaderKey;
                const rank = rankByKey[x.team.team_key];
                return `
                    <div class="hero-zone${isLeader ? " leader" : ""}" style="--team-color: ${teamColorVar(x.team)}">
                        <div class="rank">#${rank}</div>
                        <div class="name">${esc(x.team.team_name)}</div>
                        <div class="total">${x.total}</div>
                        <div class="total-label">Total</div>
                    </div>
                `;
            }).join("");

            // === Bump chart ==================================================
            renderBump(teams, scores, sortedScores);

            // === Radar cards ================================================
            radarRow.innerHTML = totals.map(x => {
                const isLeader = x.team.team_key === leaderKey;
                const rank = rankByKey[x.team.team_key];
                const teamScores = matrix[x.team.team_key] ?? {};
                return `
                    <div class="radar-card${isLeader ? " leader" : ""}" style="--team-color: ${teamColorVar(x.team)}">
                        ${renderRadarSvg(teamScores, disciplines)}
                        <div class="meta">
                            <div class="name">${esc(x.team.team_name)}</div>
                            <div class="total">${x.total}</div>
                            <div class="rank">#${rank} · Total</div>
                        </div>
                    </div>
                `;
            }).join("");

            // === Discipline strip ===========================================
            discStrip.innerHTML = disciplines.map(d => {
                // Status: done = any team has score, pending = none
                const hasAny = teams.some(t => typeof matrix[t.team_key]?.[d.discipline_key] === "number");
                const status = hasAny ? "done" : "pending";
                // Top scorer for discipline
                let topScore = 0, topTeam = null;
                for (const t of teams) {
                    const pts = matrix[t.team_key]?.[d.discipline_key];
                    if (typeof pts === "number" && pts > topScore) {
                        topScore = pts; topTeam = t;
                    }
                }
                const meta = hasAny ? `${topScore}/${d.max_points} · ${topTeam?.team_name ?? ""}` : `Kommer · /${d.max_points}`;
                return `
                    <div class="disc-pill" data-status="${status}">
                        <span class="label">${esc(d.discipline_name)}</span>
                        <span class="meta">${esc(meta)}</span>
                    </div>
                `;
            }).join("");
        }

        // ===== Bump chart rendering =========================================
        function renderBump(teams, scores, sortedScoresDesc) {
            // x-axis: score event index (0 = before any score, then 1..N after each)
            // y-axis: rank 1 (top) to 5 (bottom)
            const sortedAsc = [...scores].sort((a, b) => new Date(a.score_timestamp) - new Date(b.score_timestamp));

            const running = Object.fromEntries(teams.map(t => [t.team_key, 0]));
            const snapshots = [computeRanks(running, teams)]; // initial state at event 0
            for (const s of sortedAsc) {
                running[s.team_key] = (running[s.team_key] ?? 0) + s.points;
                snapshots.push(computeRanks(running, teams));
            }

            const W = 400, H = 240;
            const padL = 18, padR = 78, padT = 12, padB = 16;
            const plotW = W - padL - padR;
            const plotH = H - padT - padB;
            const N = snapshots.length; // includes event 0
            if (N < 2) {
                bumpSvg.innerHTML = `<text x="${W/2}" y="${H/2}" text-anchor="middle" fill="oklch(45% 0.010 60)" font-family="Inter, sans-serif" font-size="11" letter-spacing="2" style="text-transform:uppercase">Venter på første score</text>`;
                return;
            }

            const xStep = plotW / (N - 1);
            const numTeams = teams.length;
            const yStep = plotH / Math.max(numTeams - 1, 1);

            let svg = "";

            // y-axis rank labels
            for (let r = 1; r <= numTeams; r++) {
                const y = padT + (r - 1) * yStep;
                svg += `<line class="axis-line" x1="${padL}" y1="${y.toFixed(1)}" x2="${padL + plotW}" y2="${y.toFixed(1)}"/>`;
                svg += `<text class="rank-label" x="${(padL - 4).toFixed(1)}" y="${(y + 3.5).toFixed(1)}" text-anchor="end">#${r}</text>`;
            }

            // team lines
            for (const team of teams) {
                const colorVar = teamColorVar(team);
                const points = snapshots.map((snap, i) => {
                    const rank = snap[team.team_key];
                    const x = padL + i * xStep;
                    const y = padT + (rank - 1) * yStep;
                    return `${x.toFixed(1)},${y.toFixed(1)}`;
                }).join(" ");
                svg += `<polyline class="team-line" stroke="${colorVar}" points="${points}"/>`;

                // end dot + label
                const last = snapshots[snapshots.length - 1];
                const lastRank = last[team.team_key];
                const ex = padL + (N - 1) * xStep;
                const ey = padT + (lastRank - 1) * yStep;
                svg += `<circle class="team-end-dot" cx="${ex.toFixed(1)}" cy="${ey.toFixed(1)}" r="5" fill="${colorVar}"/>`;
                svg += `<text class="team-end-label" x="${(ex + 10).toFixed(1)}" y="${(ey + 4).toFixed(1)}" fill="${colorVar}">${esc(team.team_name.split(" ").slice(-1)[0])}</text>`;
            }

            bumpSvg.innerHTML = svg;
        }

        function computeRanks(running, teams) {
            const entries = teams.map(t => [t.team_key, running[t.team_key] ?? 0]);
            // sort desc by points, ties broken by team_key for stability
            entries.sort((a, b) => b[1] - a[1] || a[0] - b[0]);
            const ranks = {};
            entries.forEach(([key], i) => { ranks[key] = i + 1; });
            return ranks;
        }

        // ===== Radar plot rendering =========================================
        function renderRadarSvg(teamScores, disciplines) {
            const size = 88;
            const cx = size / 2, cy = size / 2;
            const maxR = size / 2 - 12;
            const N = disciplines.length;
            if (N < 3) return "";

            // Axes
            let axes = "";
            for (let i = 0; i < N; i++) {
                const ang = (i / N) * 2 * Math.PI - Math.PI / 2;
                const x2 = cx + maxR * Math.cos(ang);
                const y2 = cy + maxR * Math.sin(ang);
                axes += `<line class="axis" x1="${cx}" y1="${cy}" x2="${x2.toFixed(2)}" y2="${y2.toFixed(2)}"/>`;
            }

            // Rings at 50% and 100%
            let rings = "";
            for (const frac of [0.5, 1.0]) {
                const pts = [];
                for (let i = 0; i <= N; i++) {
                    const ang = (i / N) * 2 * Math.PI - Math.PI / 2;
                    const r = maxR * frac;
                    pts.push(`${(cx + r * Math.cos(ang)).toFixed(2)},${(cy + r * Math.sin(ang)).toFixed(2)}`);
                }
                rings += `<polyline class="ring" points="${pts.join(" ")}"/>`;
            }

            // Team polygon
            const polyPts = disciplines.map((d, i) => {
                const ang = (i / N) * 2 * Math.PI - Math.PI / 2;
                const pts = teamScores[d.discipline_key];
                const pct = typeof pts === "number" ? Math.min(pts / d.max_points, 1) : 0;
                const r = maxR * pct;
                return `${(cx + r * Math.cos(ang)).toFixed(2)},${(cy + r * Math.sin(ang)).toFixed(2)}`;
            }).join(" ");

            return `<svg class="radar-svg" viewBox="0 0 ${size} ${size}">${axes}${rings}<polygon class="polygon" points="${polyPts}"/></svg>`;
        }

        // ===== Poll loop ====================================================
        async function poll() {
            try { render(await fetchAll()); }
            catch (e) {
                hero.innerHTML = `<div class="state-message error">${esc(e.message)}</div>`;
            }
        }
        poll(); setInterval(poll, 5000);
    </script>
</body>
</html>
