<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mk40 — HUD v2 prototype</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;0,9..144,900;1,9..144,600;1,9..144,700&family=Inter:wght@500;600;700&family=JetBrains+Mono:wght@500;700;800&display=swap">
    <style>
        :root {
            /* Ink palette — wider tonal spread (8→15→20→24→32) so 5 levels read as hierarchy on TV */
            --ink-void:        oklch(6% 0.010 30);   /* page background — deepest, behind shell */
            --ink-deep:        oklch(8% 0.012 30);   /* shell background */
            --ink-card:        oklch(15% 0.014 30);  /* card surface (default elevation) */
            --ink-elevated:    oklch(20% 0.018 30);  /* mid surface (banner clock block, hero variants) */
            --ink-border-soft: oklch(24% 0.016 30);  /* subtle divider */
            --ink-border:      oklch(32% 0.020 30);  /* visible divider */

            /* Bone scale — foreground */
            --bone:            oklch(95% 0.008 60);
            --bone-muted:      oklch(68% 0.012 60);
            --bone-dim:        oklch(45% 0.010 60);

            /* Gold — leader signal (10% accent budget per 60-30-10) */
            --gold-ceremonial: oklch(78% 0.16 85);
            --gold-soft:       oklch(70% 0.14 85);
            --gold-glow:       oklch(78% 0.16 85 / 0.18);  /* ambient glow for leader */

            /* Live red — broadcast pill only */
            --live-red:        oklch(60% 0.22 25);

            /* Team colors — sampled from physical bandanas, calibrated for TV readability against ink-deep.
               Navy bumped from bandana L=28% to L=45% so the team reads on dark canvas without losing navy character. */
            --team-rød:        oklch(64% 0.22 5);    /* Pink bandana ("Pink Rødder" — rename pending) */
            --team-blå:        oklch(48% 0.20 258);  /* Navy bandana, L-bumped for TV */
            --team-grøn:       oklch(55% 0.18 145);  /* Grass green bandana */
            --team-gul:        oklch(74% 0.18 65);   /* Orange/golden bandana → Gyldne Riger */
            --team-sortHvid:   oklch(60% 0.18 295);  /* Lilla bandana → Sorte Cirkel (decided 2026-05-29) */

            /* Fonts */
            --font-display:    "Fraunces", Georgia, serif;
            --font-label:      "Inter", system-ui, sans-serif;
            --font-numeric:    "JetBrains Mono", ui-monospace, monospace;

            /* Shadow tokens — 3-level elevation (per Material Design + designparser elevation-system).
               Tinted dark-warm (matches ink hue 30°), never pure black per shadow-fundamentals. */
            --shadow-low:    0 1px 2px oklch(0% 0.02 30 / 0.45),
                             0 2px 6px oklch(0% 0.02 30 / 0.25);
            --shadow-medium: 0 2px 4px oklch(0% 0.02 30 / 0.55),
                             0 8px 24px oklch(0% 0.02 30 / 0.35);
            --shadow-high:   0 4px 8px oklch(0% 0.02 30 / 0.60),
                             0 16px 48px oklch(0% 0.02 30 / 0.45);

            /* Spacing scale — 8pt grid (4pt only for micro-typography) */
            --space-1:  4px;
            --space-2:  8px;
            --space-3:  12px;
            --space-4:  16px;
            --space-5:  24px;
            --space-6:  32px;
            --space-7:  40px;
            --space-8:  48px;
        }
        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; }
        body {
            background:
                radial-gradient(ellipse at 50% 0%,
                    oklch(12% 0.018 30) 0%,
                    var(--ink-void) 60%),
                var(--ink-void);
            color: var(--bone);
            font-family: var(--font-label); min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            display: flex; flex-direction: column;
        }

        /* ===== Proto nav ===== */
        .proto-nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 30;
            background: oklch(7% 0.008 30 / 0.85); backdrop-filter: blur(8px);
            padding: 0.5rem 1.5rem; display: flex; gap: 0.5rem;
            font-family: var(--font-label); font-size: 0.75rem;
            font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
        }
        .proto-nav a {
            color: var(--bone-muted); text-decoration: none; padding: 0.25rem 0.75rem;
            border: 1px solid transparent;
        }
        .proto-nav a.current { color: var(--gold-ceremonial); border-color: var(--gold-ceremonial); }
        .proto-nav a:hover { color: var(--bone); }

        /* ===== Layout shell — vertical lock 15/45/25/15 ===== */
        .shell {
            margin-top: 2.25rem;
            min-height: calc(100vh - 2.25rem);
            padding: 1rem;
            display: grid;
            grid-template-rows: 15fr 45fr 25fr 15fr;
            gap: 1rem;
            max-width: 2400px;
            margin-left: auto; margin-right: auto;
            width: 100%;
        }

        /* ===== Top banner ===== */
        .top-banner {
            background: linear-gradient(180deg,
                var(--ink-elevated) 0%,
                var(--ink-card) 100%);
            border: 1px solid var(--ink-border-soft);
            box-shadow: var(--shadow-low);
            display: grid;
            grid-template-columns: 1.7fr repeat(4, 1fr) auto;
            overflow: hidden;
            min-height: 0;
            position: relative;
        }
        /* Top-edge light catch — single light source from above per shadow-fundamentals */
        .top-banner::before {
            content: ""; position: absolute; top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg,
                transparent 0%,
                oklch(45% 0.020 30 / 0.6) 50%,
                transparent 100%);
            pointer-events: none;
        }

        .event-block {
            padding: 0.875rem 1rem;
            display: flex; flex-direction: column;
            justify-content: space-between;
            position: relative;
            border-right: 1px solid var(--ink-border-soft);
            min-width: 0;
        }
        .event-block:last-of-type { border-right: 1px solid var(--ink-border-soft); }
        .event-block.empty { opacity: 0.4; }
        .event-block.empty .ev-team { color: var(--bone-dim); }

        .event-block.hero {
            background:
                radial-gradient(ellipse at 0% 100%,
                    color-mix(in oklch, var(--team-color) 55%, transparent) 0%,
                    transparent 60%),
                linear-gradient(135deg,
                    color-mix(in oklch, var(--team-color) 38%, var(--ink-elevated)) 0%,
                    var(--ink-elevated) 80%);
            padding: 1rem 1.25rem;
            box-shadow:
                inset 0 1px 0 oklch(60% 0.020 30 / 0.25),
                inset 0 0 0 1px color-mix(in oklch, var(--team-color) 25%, transparent);
            position: relative;
            overflow: hidden;
        }
        /* Hero ambient glow — radial spill behind team color */
        .event-block.hero::after {
            content: ""; position: absolute; inset: 0;
            background: radial-gradient(circle at 20% 80%,
                color-mix(in oklch, var(--team-color) 25%, transparent) 0%,
                transparent 50%);
            pointer-events: none;
            mix-blend-mode: screen;
            opacity: 0.6;
        }

        .event-block .ev-team-tag {
            position: absolute; top: 0; left: 0;
            width: 4px; height: 100%;
            background: var(--team-color);
        }
        .event-block.hero .ev-team-tag { width: 6px; }
        .event-block.empty .ev-team-tag { background: var(--ink-border); }

        .event-block .ev-meta {
            display: flex; align-items: center; gap: 0.5rem;
            font-family: var(--font-label); font-size: 0.6875rem;
            font-weight: 700; letter-spacing: 0.12em;
            color: var(--bone-dim); text-transform: uppercase;
        }
        .event-block.hero .ev-meta { font-size: 0.75rem; color: var(--bone-muted); }

        .event-block .ev-team {
            font-family: var(--font-display); font-weight: 700;
            font-size: clamp(0.875rem, 1vw, 1.0625rem);
            line-height: 1.05; color: var(--bone);
            letter-spacing: -0.01em; margin-top: 0.4rem;
        }
        .event-block.hero .ev-team {
            font-weight: 900;
            font-size: clamp(1.125rem, 1.4vw, 1.625rem);
        }

        .event-block .ev-discipline {
            font-family: var(--font-label); font-size: 0.6875rem;
            font-weight: 600; letter-spacing: 0.1em;
            color: var(--bone-muted); text-transform: uppercase;
            margin-top: 0.1rem;
        }
        .event-block.hero .ev-discipline { font-size: 0.75rem; }

        .event-block .ev-points {
            font-family: var(--font-numeric); font-weight: 800;
            font-size: clamp(1.25rem, 1.7vw, 1.875rem);
            color: var(--bone); line-height: 1;
            font-variant-numeric: tabular-nums; align-self: flex-end;
        }
        .event-block.hero .ev-points { font-size: clamp(2rem, 3.2vw, 3.5rem); }
        .event-block .ev-points::before { content: "+"; opacity: 0.5; font-weight: 700; }

        .banner-clock-block {
            padding: 0.875rem 1.25rem;
            display: flex; flex-direction: column;
            justify-content: space-between; align-items: flex-end;
            background: var(--ink-elevated);
            min-width: 120px;
        }
        .live-pill {
            display: inline-flex; align-items: center; gap: 0.5rem;
            background: var(--live-red); color: var(--bone);
            padding: 0.25rem 0.6rem;
            font-family: var(--font-label); font-weight: 800;
            letter-spacing: 0.12em; font-size: 0.6875rem;
        }
        .live-pill::before {
            content: ""; width: 6px; height: 6px; border-radius: 50%;
            background: var(--bone); animation: pulse 1.8s ease-in-out infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .banner-clock {
            font-family: var(--font-numeric); font-weight: 700;
            color: var(--bone); font-variant-numeric: tabular-nums;
            font-size: 1.5rem; line-height: 1;
        }
        .banner-date {
            font-family: var(--font-label); font-size: 0.6875rem;
            font-weight: 600; letter-spacing: 0.12em;
            color: var(--bone-dim); text-transform: uppercase;
            margin-bottom: 0.25rem;
        }

        /* ===== Hold cards row — BIG ===== */
        .cards-row {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 1rem;
            min-height: 0;
        }

        .hold-card {
            background:
                linear-gradient(180deg,
                    var(--ink-elevated) 0%,
                    var(--ink-card) 60%);
            border: 1px solid var(--ink-border-soft);
            border-top: 6px solid var(--team-color);
            padding: 1.5rem 1.5rem 1.25rem 1.5rem;
            display: grid;
            grid-template-rows: auto auto 1fr auto;
            gap: 0;
            position: relative;
            min-height: 0;
            overflow: hidden;
            box-shadow: var(--shadow-low);
            transition: box-shadow 240ms cubic-bezier(0.23, 1, 0.32, 1);
        }
        /* Hold card top-edge light catch (under colored stripe) */
        .hold-card::before {
            content: ""; position: absolute; top: 6px; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg,
                transparent 0%,
                oklch(45% 0.020 30 / 0.4) 50%,
                transparent 100%);
            pointer-events: none;
            z-index: 1;
        }
        /* Subtle team-color spill at bottom of card */
        .hold-card::after {
            content: ""; position: absolute; left: 0; right: 0; bottom: 0; height: 60%;
            background: radial-gradient(ellipse at 50% 100%,
                color-mix(in oklch, var(--team-color) 14%, transparent) 0%,
                transparent 70%);
            pointer-events: none;
            z-index: 0;
        }
        .hold-card > * { position: relative; z-index: 2; }

        .hold-card.leader {
            background:
                radial-gradient(ellipse at 50% 0%,
                    color-mix(in oklch, var(--gold-ceremonial) 18%, var(--ink-elevated)) 0%,
                    var(--ink-card) 70%);
            border-color: color-mix(in oklch, var(--gold-ceremonial) 60%, var(--ink-border));
            border-top-color: var(--gold-ceremonial);
            border-top-width: 8px;
            box-shadow:
                var(--shadow-high),
                0 0 40px var(--gold-glow),
                inset 0 1px 0 oklch(85% 0.10 85 / 0.3);
        }
        .hold-card.leader::after {
            background: radial-gradient(ellipse at 50% 100%,
                color-mix(in oklch, var(--gold-ceremonial) 14%, transparent) 0%,
                transparent 70%);
        }

        .hold-card .badge-row {
            display: flex; justify-content: space-between; align-items: baseline;
            font-family: var(--font-label); font-size: 0.6875rem;
            font-weight: 800; letter-spacing: 0.18em;
            text-transform: uppercase; color: var(--bone-dim);
        }
        .hold-card.leader .badge-row {
            color: var(--gold-ceremonial);
        }
        .hold-card.leader .badge-row .lead-badge {
            background: var(--gold-ceremonial);
            color: var(--ink-deep);
            padding: 0.25rem 0.6rem;
            font-weight: 900;
        }

        .hold-card .name {
            font-family: var(--font-display); font-weight: 700;
            font-size: clamp(1.125rem, 1.4vw, 1.625rem);
            line-height: 1.0; color: var(--bone);
            letter-spacing: -0.02em; margin-top: 0.5rem;
            text-wrap: balance;
        }
        .hold-card.leader .name {
            font-weight: 900;
            font-size: clamp(1.25rem, 1.7vw, 2rem);
        }

        .hold-card .motto {
            font-family: var(--font-display); font-style: italic;
            font-weight: 600; font-size: 0.875rem;
            color: var(--bone-muted); line-height: 1.3;
            margin-top: 0.5rem; min-height: 2.2em;
        }
        .hold-card.leader .motto {
            color: var(--bone);
            opacity: 0.85;
        }

        .hold-card .total-block {
            align-self: end;
            margin-top: 1rem;
        }
        .hold-card .total-label {
            font-family: var(--font-label); font-size: 0.625rem;
            font-weight: 700; letter-spacing: 0.2em;
            color: var(--bone-dim); text-transform: uppercase;
        }
        .hold-card .total {
            font-family: var(--font-numeric); font-weight: 800;
            font-size: clamp(3.5rem, 6vw, 6.5rem);
            color: var(--bone); line-height: 0.9;
            margin-top: 0.15rem;
            font-variant-numeric: tabular-nums;
            letter-spacing: -0.03em;
        }
        .hold-card.leader .total {
            color: var(--gold-ceremonial);
            font-weight: 800;
        }

        .hold-card .radar-row {
            margin-top: 1.25rem;
            padding-top: 1rem;
            border-top: 1px solid var(--ink-border-soft);
            display: flex; align-items: center; gap: 1rem;
        }
        .hold-card.leader .radar-row { border-top-color: color-mix(in oklch, var(--gold-ceremonial) 30%, transparent); }

        .hold-card .radar { width: 120px; height: 120px; flex-shrink: 0; }
        .hold-card .radar .axis { stroke: var(--ink-border); stroke-width: 1; }
        .hold-card .radar .ring { stroke: var(--ink-border); stroke-width: 1; fill: none; opacity: 0.55; }
        .hold-card .radar .polygon {
            fill: var(--team-color); fill-opacity: 0.42;
            stroke: var(--team-color); stroke-width: 2;
            stroke-linejoin: round;
        }
        .hold-card.leader .radar .polygon {
            fill: var(--gold-ceremonial); fill-opacity: 0.32;
            stroke: var(--gold-ceremonial);
        }
        .hold-card .radar .axis-label {
            font-family: var(--font-label); font-size: 7px;
            font-weight: 700; letter-spacing: 0.06em;
            fill: var(--bone-dim); text-transform: uppercase;
        }

        .hold-card .radar-meta {
            font-family: var(--font-label); font-size: 0.6875rem;
            font-weight: 700; letter-spacing: 0.15em;
            color: var(--bone-dim); text-transform: uppercase;
            line-height: 1.35;
            min-width: 0;
        }
        .hold-card .radar-meta strong {
            display: block;
            font-family: var(--font-numeric); font-weight: 700;
            font-size: 1rem; color: var(--bone-muted);
            letter-spacing: 0.04em;
            margin-top: 0.15rem;
        }
        .hold-card.leader .radar-meta strong { color: var(--bone); }

        /* ===== Mid row: bump (1.4fr) + seneste+AI (1fr) ===== */
        .mid-row {
            display: grid;
            grid-template-columns: 1.4fr 1fr;
            gap: 1rem;
            min-height: 0;
        }

        .panel {
            background: linear-gradient(180deg,
                var(--ink-elevated) 0%,
                var(--ink-card) 80%);
            border: 1px solid var(--ink-border-soft);
            padding: 1.25rem 1.5rem;
            display: flex; flex-direction: column;
            overflow: hidden;
            min-height: 0;
            box-shadow: var(--shadow-low);
            position: relative;
        }
        .panel::before {
            content: ""; position: absolute; top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg,
                transparent 0%,
                oklch(45% 0.020 30 / 0.4) 50%,
                transparent 100%);
            pointer-events: none;
        }

        .panel-header {
            display: flex; justify-content: space-between; align-items: baseline;
            margin-bottom: 0.875rem;
            flex-shrink: 0;
        }
        .panel-header .title {
            font-family: var(--font-display); font-weight: 700;
            font-size: 1.25rem; letter-spacing: -0.01em;
            color: var(--bone);
        }
        .panel-header .sub {
            font-family: var(--font-label); font-size: 0.6875rem;
            font-weight: 700; letter-spacing: 0.15em;
            color: var(--bone-dim); text-transform: uppercase;
        }

        /* Bump chart container — fills mid-row vertically */
        .bump-wrap {
            flex: 1; min-height: 0;
            position: relative;
        }
        .bump-svg { position: absolute; inset: 0; width: 100%; height: 100%; }
        .bump-svg .axis-line {
            stroke: var(--ink-border-soft); stroke-width: 1; stroke-dasharray: 2 5;
        }
        .bump-svg .rank-label {
            font-family: var(--font-numeric); font-size: 12px;
            font-weight: 700; fill: var(--bone-dim);
            letter-spacing: 0.05em;
        }
        .bump-svg .team-line {
            stroke-width: 3; fill: none;
            stroke-linecap: round; stroke-linejoin: round;
        }
        .bump-svg .team-end-dot { stroke: var(--ink-card); stroke-width: 2.5; }
        .bump-svg .team-end-label {
            font-family: var(--font-display); font-weight: 700;
            font-size: 14px; letter-spacing: -0.01em;
        }

        /* ===== Seneste + AI commentary panel ===== */
        .latest-panel {
            display: grid;
            grid-template-rows: auto auto 1fr auto;
            gap: 0;
            background: linear-gradient(180deg,
                var(--ink-elevated) 0%,
                var(--ink-card) 80%);
            border: 1px solid var(--ink-border-soft);
            position: relative;
            overflow: hidden;
            min-height: 0;
            box-shadow: var(--shadow-low);
            transition: box-shadow 240ms cubic-bezier(0.23, 1, 0.32, 1);
        }
        .latest-panel::before {
            content: ""; position: absolute; top: 0; left: 0; right: 0;
            height: 6px; background: var(--team-color);
            box-shadow: 0 1px 12px color-mix(in oklch, var(--team-color) 60%, transparent);
            z-index: 2;
        }
        .latest-panel.has-event {
            background:
                radial-gradient(ellipse at 0% 100%,
                    color-mix(in oklch, var(--team-color) 28%, transparent) 0%,
                    transparent 55%),
                linear-gradient(180deg,
                    color-mix(in oklch, var(--team-color) 16%, var(--ink-elevated)) 0%,
                    var(--ink-card) 70%);
            box-shadow:
                var(--shadow-medium),
                0 0 60px color-mix(in oklch, var(--team-color) 18%, transparent);
        }
        .latest-panel.has-event.leader {
            box-shadow:
                var(--shadow-high),
                0 0 80px var(--gold-glow);
        }

        .latest-panel .lp-header {
            padding: 1rem 1.5rem 0.5rem 1.5rem;
            display: flex; justify-content: space-between; align-items: baseline;
        }
        .latest-panel .lp-label {
            font-family: var(--font-label); font-size: 0.6875rem;
            font-weight: 800; letter-spacing: 0.2em;
            color: var(--bone-muted); text-transform: uppercase;
        }
        .latest-panel .lp-time {
            font-family: var(--font-numeric); font-weight: 600;
            font-size: 0.75rem; color: var(--bone-dim);
            font-variant-numeric: tabular-nums; letter-spacing: 0.05em;
        }

        .latest-panel .lp-hero {
            padding: 0.25rem 1.5rem 0 1.5rem;
            display: flex; align-items: baseline; gap: 1.25rem;
        }
        .latest-panel .lp-points {
            font-family: var(--font-display); font-weight: 900;
            font-size: clamp(3.5rem, 6vw, 5.5rem);
            line-height: 0.9;
            color: var(--bone);
            letter-spacing: -0.04em;
            font-variant-numeric: tabular-nums;
            flex-shrink: 0;
        }
        .latest-panel .lp-points::before {
            content: "+"; opacity: 0.55; font-weight: 700;
            font-size: 0.55em; vertical-align: top;
            margin-right: 0.05em;
        }
        .latest-panel .lp-event-meta {
            display: flex; flex-direction: column;
            min-width: 0;
        }
        .latest-panel .lp-team {
            font-family: var(--font-display); font-weight: 900;
            font-size: clamp(1.25rem, 1.6vw, 1.875rem);
            line-height: 1.0; color: var(--bone);
            letter-spacing: -0.02em; text-wrap: balance;
        }
        .latest-panel .lp-discipline {
            font-family: var(--font-label); font-size: 0.8125rem;
            font-weight: 700; letter-spacing: 0.15em;
            color: var(--bone-muted); text-transform: uppercase;
            margin-top: 0.25rem;
        }

        .latest-panel .lp-commentary {
            padding: 1rem 1.5rem 0.5rem 1.5rem;
            font-family: var(--font-display); font-style: italic;
            font-weight: 600;
            font-size: clamp(0.95rem, 1.1vw, 1.25rem);
            line-height: 1.35;
            color: var(--bone);
            text-wrap: balance;
            align-self: end;
        }
        .latest-panel .lp-commentary::before {
            content: "“"; font-size: 1.5em; line-height: 0;
            vertical-align: -0.25em; color: var(--bone-muted);
            margin-right: 0.15em;
        }
        .latest-panel .lp-commentary::after {
            content: "”"; font-size: 1.5em; line-height: 0;
            vertical-align: -0.25em; color: var(--bone-muted);
            margin-left: 0.1em;
        }
        .latest-panel .lp-commentary-tag {
            display: block;
            margin-top: 0.4rem;
            font-family: var(--font-label); font-style: normal;
            font-size: 0.625rem; font-weight: 700;
            letter-spacing: 0.18em; text-transform: uppercase;
            color: var(--bone-dim);
        }

        .latest-panel .lp-context {
            padding: 0.75rem 1.5rem 1rem 1.5rem;
            font-family: var(--font-label); font-size: 0.75rem;
            font-weight: 700; letter-spacing: 0.12em;
            color: var(--bone-muted); text-transform: uppercase;
            border-top: 1px solid var(--ink-border-soft);
            display: flex; justify-content: space-between; align-items: baseline;
        }
        .latest-panel .lp-context strong {
            font-family: var(--font-numeric); font-weight: 800;
            color: var(--bone); font-size: 0.9375rem;
            letter-spacing: 0.04em;
        }
        .latest-panel .lp-context strong.lead { color: var(--gold-ceremonial); }
        .latest-panel .lp-context strong.behind { color: var(--bone-muted); }

        .latest-panel.empty .lp-hero,
        .latest-panel.empty .lp-commentary { display: none; }
        .latest-panel.empty .lp-empty {
            grid-row: 2 / 4;
            padding: 2rem 1.5rem;
            display: flex; align-items: center; justify-content: center;
            color: var(--bone-dim);
            font-family: var(--font-label); font-size: 0.875rem;
            font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase;
            text-align: center;
        }

        /* ===== Disciplin strip ===== */
        .disc-strip {
            background: linear-gradient(180deg,
                var(--ink-card) 0%,
                var(--ink-elevated) 100%);
            border: 1px solid var(--ink-border-soft);
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            overflow: hidden;
            min-height: 0;
            box-shadow: var(--shadow-low);
            position: relative;
        }
        .disc-strip::before {
            content: ""; position: absolute; top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg,
                transparent 0%,
                oklch(45% 0.020 30 / 0.4) 50%,
                transparent 100%);
            pointer-events: none;
        }
        .disc-pill {
            padding: 1.125rem 1.5rem;
            border-right: 1px solid var(--ink-border-soft);
            display: flex; flex-direction: column;
            justify-content: center;
            gap: 0.35rem;
            min-width: 0;
        }
        .disc-pill:last-child { border-right: none; }
        .disc-pill .label {
            font-family: var(--font-label); font-size: 0.875rem;
            font-weight: 800; letter-spacing: 0.12em;
            text-transform: uppercase; color: var(--bone-muted);
            display: flex; align-items: center; gap: 0.5rem;
        }
        .disc-pill[data-status="done"] .label { color: var(--gold-ceremonial); }
        .disc-pill[data-status="done"] .label::before { content: "✓"; font-weight: 900; font-size: 0.875rem; }
        .disc-pill[data-status="pending"] .label::before { content: "○"; opacity: 0.6; }
        .disc-pill .meta {
            font-family: var(--font-numeric); font-size: 0.8125rem;
            font-weight: 700; color: var(--bone-dim);
            font-variant-numeric: tabular-nums; letter-spacing: 0.04em;
        }
        .disc-pill .meta .leader-name {
            font-family: var(--font-display); font-weight: 700;
            font-style: italic; color: var(--bone-muted);
            letter-spacing: 0; margin-left: 0.25rem;
        }

        /* ===== Responsive breakpoints ===== */

        /* Tablets landscape & smaller desktop */
        @media (max-width: 1500px) {
            .hold-card .radar { width: 96px; height: 96px; }
            .hold-card .total { font-size: clamp(3rem, 5vw, 5.5rem); }
            .hold-card .name { font-size: clamp(1rem, 1.2vw, 1.375rem); }
        }

        /* Smaller tablet — drop to 3-up cards */
        @media (max-width: 1300px) {
            .cards-row { grid-template-columns: repeat(3, 1fr); }
            .hold-card:nth-child(4), .hold-card:nth-child(5) {
                grid-column: span 1;
            }
            .hold-card { min-height: 280px; }
            .hold-card .radar { width: 88px; height: 88px; }
        }

        /* Phones & narrow */
        @media (max-width: 1100px) {
            .shell {
                padding: 0.75rem;
                grid-template-rows: auto auto auto auto;
            }
            .top-banner { grid-template-columns: 1fr; }
            .event-block { border-right: none; border-bottom: 1px solid var(--ink-border-soft); }
            .event-block.empty { display: none; }
            .banner-clock-block { flex-direction: row; align-items: center; padding: 0.6rem 1rem; }
            .banner-date { margin-bottom: 0; }
            .cards-row { grid-template-columns: repeat(2, 1fr); }
            .hold-card { min-height: 240px; }
            .hold-card .radar { width: 80px; height: 80px; }
            .hold-card .total { font-size: clamp(2.5rem, 8vw, 4rem); }
            .mid-row { grid-template-columns: 1fr; }
            .bump-wrap { min-height: 280px; }
            .latest-panel .lp-hero { flex-direction: column; align-items: flex-start; gap: 0.5rem; }
            .latest-panel .lp-points { font-size: 3rem; }
            .disc-strip { grid-template-columns: 1fr 1fr; }
            .disc-pill { border-right: none; border-bottom: 1px solid var(--ink-border-soft); padding: 0.75rem 1rem; }
        }

        @media (max-width: 540px) {
            .cards-row { grid-template-columns: 1fr; }
        }

        .state-message {
            grid-column: 1 / -1;
            text-align: center; padding: 2rem 1rem;
            color: var(--bone-muted);
            font-family: var(--font-label); letter-spacing: 0.15em;
            text-transform: uppercase;
            font-size: 0.75rem; font-weight: 700;
        }
        .state-message.error { color: var(--live-red); }
    </style>
</head>
<body>
    <nav class="proto-nav">
        <a href="./">Table (boring)</a>
        <a href="./cards.html">A · Cards</a>
        <a href="./bars.html">B · Bars</a>
        <a href="./cinema.html">C · Cinematic</a>
        <a href="./hud.html">D · HUD</a>
        <a href="./hud2.html" class="current">E · HUD v2</a>
    </nav>

    <div class="shell">
        <div class="top-banner" id="top-banner">
            <div class="state-message">Henter data…</div>
        </div>

        <div class="cards-row" id="cards-row"></div>

        <div class="mid-row">
            <div class="panel">
                <div class="panel-header">
                    <span class="title">Placering gennem aftenen</span>
                    <span class="sub">Rank · Bump</span>
                </div>
                <div class="bump-wrap" id="bump-wrap">
                    <svg class="bump-svg" id="bump-svg" preserveAspectRatio="none"></svg>
                </div>
            </div>

            <div class="latest-panel empty" id="latest-panel">
                <div class="lp-header">
                    <span class="lp-label">Seneste resultat</span>
                    <span class="lp-time" id="lp-time"></span>
                </div>
                <div class="lp-empty" id="lp-empty">Venter på første score</div>
            </div>
        </div>

        <div class="disc-strip" id="disc-strip"></div>
    </div>

    <script type="module">
        import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
        import { SUPABASE_URL, SUPABASE_ANON_KEY } from "./config.js";
        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const $ = id => document.getElementById(id);
        const banner = $("top-banner");
        const cardsRow = $("cards-row");
        const bumpSvg = $("bump-svg");
        const bumpWrap = $("bump-wrap");
        const latestPanel = $("latest-panel");
        const discStrip = $("disc-strip");

        function cssVarSafe(name) { return String(name).replace(/\//g, "").replace(/\s+/g, ""); }
        function esc(s) { return String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c])); }
        function teamColorVar(team) { return `var(--team-${cssVarSafe(team.team_color)})`; }
        function shortName(name) { return String(name).split(" ").slice(-1)[0]; }

        let lastData = null;

        async function fetchAll() {
            const [t, d, s] = await Promise.all([
                supabase.from("DimTeam").select("*").order("team_key"),
                supabase.from("DimDiscipline").select("*").order("discipline_key"),
                supabase.from("FactScore").select("*").eq("is_final", true),
            ]);
            if (t.error || d.error || s.error) throw new Error(t.error?.message || d.error?.message || s.error?.message);
            return { teams: t.data, disciplines: d.data, scores: s.data };
        }

        function render(data) {
            lastData = data;
            const { teams, disciplines, scores } = data;
            const matrix = {};
            for (const r of scores) {
                if (!matrix[r.team_key]) matrix[r.team_key] = {};
                matrix[r.team_key][r.discipline_key] = r.points;
            }
            const totals = teams.map(t => ({
                team: t,
                total: disciplines.reduce((a, d) => a + (matrix[t.team_key]?.[d.discipline_key] ?? 0), 0),
            }));
            const sortedByTotal = [...totals].sort((a, b) => b.total - a.total);
            const leaderKey = sortedByTotal[0]?.team.team_key;
            const leaderTeam = sortedByTotal[0]?.team;
            const leaderTotal = sortedByTotal[0]?.total ?? 0;
            const rankByKey = Object.fromEntries(sortedByTotal.map((x, i) => [x.team.team_key, i + 1]));

            renderBanner(scores, teams, disciplines);
            renderCards(totals, matrix, disciplines, leaderKey, rankByKey);
            renderBump(teams, scores);
            renderLatest(scores, teams, disciplines, totals, leaderKey, leaderTeam, leaderTotal, rankByKey);
            renderDiscStrip(disciplines, teams, matrix);
        }

        // ===== Banner =========================================================
        function renderBanner(scores, teams, disciplines) {
            const sortedDesc = [...scores].sort((a, b) => new Date(b.score_timestamp) - new Date(a.score_timestamp));
            const top5 = sortedDesc.slice(0, 5);
            while (top5.length < 5) top5.push(null);

            const eventsHtml = top5.map((s, idx) => {
                if (!s) {
                    return `<div class="event-block empty"><span class="ev-team-tag"></span><div><div class="ev-meta"><span>—</span></div><div class="ev-team">—</div><div class="ev-discipline">Venter</div></div><div class="ev-points">0</div></div>`;
                }
                const team = teams.find(t => t.team_key === s.team_key);
                const disc = disciplines.find(d => d.discipline_key === s.discipline_key);
                const isHero = idx === 0;
                const time = new Date(s.score_timestamp).toLocaleTimeString("da-DK", { hour: "2-digit", minute: "2-digit" });
                return `
                    <div class="event-block${isHero ? " hero" : ""}" style="--team-color: ${teamColorVar(team)}">
                        <span class="ev-team-tag"></span>
                        <div>
                            <div class="ev-meta"><span>${isHero ? "Seneste" : "–" + (idx + 1)}</span><span>·</span><span>${time}</span></div>
                            <div class="ev-team">${esc(team?.team_name ?? "—")}</div>
                            <div class="ev-discipline">${esc(disc?.discipline_name ?? "—")}</div>
                        </div>
                        <div class="ev-points">${s.points}</div>
                    </div>
                `;
            }).join("");

            const now = new Date();
            const clockTime = now.toLocaleTimeString("da-DK", { hour: "2-digit", minute: "2-digit" });
            const dateStr = now.toLocaleDateString("da-DK", { day: "numeric", month: "short" }).toUpperCase();

            banner.innerHTML = eventsHtml + `
                <div class="banner-clock-block">
                    <div><span class="live-pill">LIVE</span></div>
                    <div>
                        <div class="banner-date">${esc(dateStr)}</div>
                        <div class="banner-clock">${clockTime}</div>
                    </div>
                </div>
            `;
        }

        // ===== Hold cards =====================================================
        function renderCards(totals, matrix, disciplines, leaderKey, rankByKey) {
            cardsRow.innerHTML = totals.map(x => {
                const isLeader = x.team.team_key === leaderKey;
                const rank = rankByKey[x.team.team_key];
                const teamScores = matrix[x.team.team_key] ?? {};
                const filledDiscs = disciplines.filter(d => typeof teamScores[d.discipline_key] === "number").length;
                const badgeLeft = isLeader ? `<span class="lead-badge">FØRER</span>` : `<span>#${rank}</span>`;
                const badgeRight = isLeader ? `` : `<span>${shortName(x.team.team_name)}</span>`;
                return `
                    <div class="hold-card${isLeader ? " leader" : ""}" style="--team-color: ${teamColorVar(x.team)}">
                        <div class="badge-row">${badgeLeft}${badgeRight}</div>
                        <div class="name">${esc(x.team.team_name)}</div>
                        <div class="motto">${esc(x.team.team_motto || "")}</div>
                        <div class="total-block">
                            <div class="total-label">Total</div>
                            <div class="total">${x.total}</div>
                        </div>
                        <div class="radar-row">
                            ${renderRadar(teamScores, disciplines, 120)}
                            <div class="radar-meta">
                                Disciplin-spread<strong>${filledDiscs}/${disciplines.length} kørt</strong>
                            </div>
                        </div>
                    </div>
                `;
            }).join("");
        }

        function renderRadar(teamScores, disciplines, size) {
            const cx = size / 2, cy = size / 2;
            const maxR = size / 2 - 8;
            const N = disciplines.length;
            if (N < 3) return "";

            let axes = "";
            for (let i = 0; i < N; i++) {
                const ang = (i / N) * 2 * Math.PI - Math.PI / 2;
                axes += `<line class="axis" x1="${cx}" y1="${cy}" x2="${(cx + maxR * Math.cos(ang)).toFixed(2)}" y2="${(cy + maxR * Math.sin(ang)).toFixed(2)}"/>`;
            }

            let rings = "";
            for (const frac of [0.5, 1.0]) {
                const pts = [];
                for (let i = 0; i <= N; i++) {
                    const ang = (i / N) * 2 * Math.PI - Math.PI / 2;
                    const r = maxR * frac;
                    pts.push(`${(cx + r * Math.cos(ang)).toFixed(2)},${(cy + r * Math.sin(ang)).toFixed(2)}`);
                }
                rings += `<polyline class="ring" points="${pts.join(" ")}"/>`;
            }

            const polyPts = disciplines.map((d, i) => {
                const ang = (i / N) * 2 * Math.PI - Math.PI / 2;
                const pts = teamScores[d.discipline_key];
                const pct = typeof pts === "number" ? Math.min(pts / d.max_points, 1) : 0;
                const r = maxR * pct;
                return `${(cx + r * Math.cos(ang)).toFixed(2)},${(cy + r * Math.sin(ang)).toFixed(2)}`;
            }).join(" ");

            return `<svg class="radar" viewBox="0 0 ${size} ${size}">${axes}${rings}<polygon class="polygon" points="${polyPts}"/></svg>`;
        }

        // ===== Bump chart — dynamic viewBox sized to container ===============
        function renderBump(teams, scores) {
            const W = bumpWrap.clientWidth;
            const H = bumpWrap.clientHeight;
            if (W < 50 || H < 50) return; // not yet sized

            bumpSvg.setAttribute("viewBox", `0 0 ${W} ${H}`);

            const padL = 32, padR = 100, padT = 16, padB = 20;
            const plotW = W - padL - padR;
            const plotH = H - padT - padB;

            const sortedAsc = [...scores].sort((a, b) => new Date(a.score_timestamp) - new Date(b.score_timestamp));
            const running = Object.fromEntries(teams.map(t => [t.team_key, 0]));
            const snapshots = [];
            for (const s of sortedAsc) {
                running[s.team_key] = (running[s.team_key] ?? 0) + s.points;
                snapshots.push(computeRanks(running, teams));
            }

            if (snapshots.length < 2) {
                bumpSvg.innerHTML = `<text x="${W/2}" y="${H/2}" text-anchor="middle" class="rank-label" fill="oklch(45% 0.010 60)">Venter på første scores</text>`;
                return;
            }

            const N = snapshots.length;
            const numTeams = teams.length;
            const xStep = N > 1 ? plotW / (N - 1) : 0;
            const yStep = numTeams > 1 ? plotH / (numTeams - 1) : 0;

            let svg = "";
            for (let r = 1; r <= numTeams; r++) {
                const y = padT + (r - 1) * yStep;
                svg += `<line class="axis-line" x1="${padL}" y1="${y.toFixed(1)}" x2="${(padL + plotW).toFixed(1)}" y2="${y.toFixed(1)}"/>`;
                svg += `<text class="rank-label" x="${(padL - 8).toFixed(1)}" y="${(y + 4).toFixed(1)}" text-anchor="end">#${r}</text>`;
            }

            for (const team of teams) {
                const colorVar = teamColorVar(team);
                const points = snapshots.map((snap, i) => {
                    const rank = snap[team.team_key];
                    const x = padL + i * xStep;
                    const y = padT + (rank - 1) * yStep;
                    return `${x.toFixed(1)},${y.toFixed(1)}`;
                }).join(" ");
                svg += `<polyline class="team-line" stroke="${colorVar}" points="${points}"/>`;

                const last = snapshots[snapshots.length - 1];
                const lastRank = last[team.team_key];
                const ex = padL + (N - 1) * xStep;
                const ey = padT + (lastRank - 1) * yStep;
                svg += `<circle class="team-end-dot" cx="${ex.toFixed(1)}" cy="${ey.toFixed(1)}" r="5" fill="${colorVar}"/>`;
                svg += `<text class="team-end-label" x="${(ex + 11).toFixed(1)}" y="${(ey + 5).toFixed(1)}" fill="${colorVar}">${esc(shortName(team.team_name))}</text>`;
            }

            bumpSvg.innerHTML = svg;
        }

        function computeRanks(running, teams) {
            const entries = teams.map(t => [t.team_key, running[t.team_key] ?? 0]);
            entries.sort((a, b) => b[1] - a[1] || a[0] - b[0]);
            const ranks = {};
            entries.forEach(([key], i) => { ranks[key] = i + 1; });
            return ranks;
        }

        // ===== Seneste resultat + AI commentary ===============================
        function renderLatest(scores, teams, disciplines, totals, leaderKey, leaderTeam, leaderTotal, rankByKey) {
            const sortedDesc = [...scores].sort((a, b) => new Date(b.score_timestamp) - new Date(a.score_timestamp));
            const latest = sortedDesc[0];

            if (!latest) {
                latestPanel.className = "latest-panel empty";
                latestPanel.style.removeProperty("--team-color");
                $("lp-time").textContent = "";
                latestPanel.innerHTML = `
                    <div class="lp-header"><span class="lp-label">Seneste resultat</span><span class="lp-time"></span></div>
                    <div class="lp-empty">Venter på første score</div>
                `;
                return;
            }

            const team = teams.find(t => t.team_key === latest.team_key);
            const disc = disciplines.find(d => d.discipline_key === latest.discipline_key);
            const teamTotal = totals.find(x => x.team.team_key === latest.team_key)?.total ?? 0;
            const isLeader = latest.team_key === leaderKey;
            const rank = rankByKey[latest.team_key];
            const time = new Date(latest.score_timestamp).toLocaleTimeString("da-DK", { hour: "2-digit", minute: "2-digit" });

            // Context line
            let contextHtml;
            if (isLeader) {
                contextHtml = `<span>Position</span><strong class="lead">#1 · Fører med ${teamTotal} pt</strong>`;
            } else {
                const gap = leaderTotal - teamTotal;
                contextHtml = `<span>Vs. ${esc(shortName(leaderTeam?.team_name ?? ""))}</span><strong class="behind">#${rank} · ${gap} pt bagud</strong>`;
            }

            // Mock AI commentary (placeholder for dashboard-011 LLM-calls)
            const commentary = mockCommentary(team, disc, latest.points, teamTotal, isLeader, leaderTeam, leaderTotal);

            latestPanel.className = "latest-panel has-event" + (isLeader ? " leader" : "");
            latestPanel.style.setProperty("--team-color", teamColorVar(team));
            latestPanel.innerHTML = `
                <div class="lp-header">
                    <span class="lp-label">Seneste resultat</span>
                    <span class="lp-time" id="lp-time">${esc(time)}</span>
                </div>
                <div class="lp-hero">
                    <div class="lp-points">${latest.points}</div>
                    <div class="lp-event-meta">
                        <div class="lp-team">${esc(team?.team_name ?? "—")}</div>
                        <div class="lp-discipline">${esc(disc?.discipline_name ?? "—")} <span style="opacity:0.55;margin-left:0.5rem">/${disc?.max_points ?? "?"}</span></div>
                    </div>
                </div>
                <div class="lp-commentary">
                    ${esc(commentary)}
                    <span class="lp-commentary-tag">AI commentary · placeholder (dashboard-011 hooks Claude Haiku 4.5)</span>
                </div>
                <div class="lp-context">${contextHtml}</div>
            `;
        }

        function mockCommentary(team, disc, points, teamTotal, isLeader, leaderTeam, leaderTotal) {
            const teamShort = shortName(team?.team_name ?? "Holdet");
            const leaderShort = shortName(leaderTeam?.team_name ?? "feltet");
            const discName = disc?.discipline_name ?? "disciplinen";
            const maxPts = disc?.max_points ?? 0;
            const pctOfMax = maxPts > 0 ? points / maxPts : 0;
            const gap = leaderTotal - teamTotal;

            // Strong performance
            if (pctOfMax >= 0.85) {
                if (isLeader) return `${teamShort} tromler videre — ${points} af ${maxPts} i ${discName} sætter dem endnu mere fast på toppen.`;
                return `${teamShort} ridder højt på ${points} i ${discName}, men ${leaderShort} holder fortsat føringen ${gap} pt foran.`;
            }
            // Decent
            if (pctOfMax >= 0.5) {
                if (isLeader) return `${teamShort} samler ${points} i ${discName} — føringen bliver sværere at indhente.`;
                return `${teamShort} henter ${points} i ${discName} og kæmper sig op. Stadig ${gap} pt bag ${leaderShort}.`;
            }
            // Weak
            if (isLeader) return `${teamShort} mistede momentum i ${discName} med kun ${points}, men holder stadig toppen.`;
            return `Skuffende ${points} i ${discName} for ${teamShort}. ${leaderShort} løber fra dem — ${gap} pt foran nu.`;
        }

        // ===== Disciplin strip ================================================
        function renderDiscStrip(disciplines, teams, matrix) {
            discStrip.innerHTML = disciplines.map(d => {
                const hasAny = teams.some(t => typeof matrix[t.team_key]?.[d.discipline_key] === "number");
                const status = hasAny ? "done" : "pending";
                let topScore = -1, topTeam = null;
                for (const t of teams) {
                    const pts = matrix[t.team_key]?.[d.discipline_key];
                    if (typeof pts === "number" && pts > topScore) { topScore = pts; topTeam = t; }
                }
                const meta = hasAny
                    ? `${topScore}/${d.max_points} <span class="leader-name">${esc(topTeam?.team_name ?? "")}</span>`
                    : `Kommer · /${d.max_points}`;
                return `
                    <div class="disc-pill" data-status="${status}">
                        <span class="label">${esc(d.discipline_name)}</span>
                        <span class="meta">${meta}</span>
                    </div>
                `;
            }).join("");
        }

        // ===== Resize handler — rerender bump chart on container resize =======
        const resizeObs = new ResizeObserver(() => {
            if (lastData) renderBump(lastData.teams, lastData.scores);
        });
        resizeObs.observe(bumpWrap);

        async function poll() {
            try { render(await fetchAll()); }
            catch (e) {
                banner.innerHTML = `<div class="state-message error">${esc(e.message)}</div>`;
            }
        }
        poll(); setInterval(poll, 5000);
    </script>
</body>
</html>
