    </nav>

    <div class="shell">
        <div class="cards-stack" id="cards-row">
            <div class="state-message">Henter data…</div>
        </div>
        <div class="col-mid">
            <div class="page-header">
                <div class="ph-title">MK40</div>
                <div class="ph-meta">
                    <span class="ph-date" id="ph-date"></span>
                    <span class="ph-sep">·</span>
                    <span class="ph-clock" id="ph-clock"></span>
                    <span class="live-pill">LIVE</span>
                </div>
            </div>
            <div class="latest-hero-slot">
                <div class="latest-panel empty" id="latest-panel">
                    <div class="lp-tag"><span class="lp-label">Seneste resultat</span><span class="lp-tag-time"></span></div>
                    <div class="lp-empty">Venter på første score</div>
                </div>
            </div>
            <div class="panel bump-panel">
                <div class="panel-header">
                    <span class="title">Placering gennem aftenen</span>
                    <span class="sub">Rank · Bump</span>
                </div>
                <div class="bump-wrap" id="bump-wrap">
                    <svg class="bump-svg" id="bump-svg" preserveAspectRatio="none"></svg>
                </div>
            </div>
        </div>
        <div class="col-right">
            <div class="agenda" id="agenda"></div>
            <div class="disc-panel" id="disc-panel"></div>
        </div>
    </div>

    <!-- dashboard-020: lock-summary overlay — eksploderer fra centrum, 15s dwell, skrumper -->
    <div class="hero-overlay" id="hero-overlay" aria-hidden="true"></div>

    <script type="module">
        import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
        import { SUPABASE_URL, SUPABASE_ANON_KEY } from "./config.js";
        import { computePlacements, rawToBarFraction } from "./score.js";
        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const $ = id => document.getElementById(id);
        const banner = $("top-banner");
        const cardsRow = $("cards-row");
        const bumpSvg = $("bump-svg");
        const bumpWrap = $("bump-wrap");
        const latestPanel = $("latest-panel");
        const discStrip = $("disc-strip");
        const agenda = $("agenda");
        const discPanel = $("disc-panel");
        const overlayEl = $("hero-overlay");

        function cssVarSafe(name) { return String(name).replace(/\//g, "").replace(/\s+/g, ""); }
        function esc(s) { return String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c])); }
        function teamColorVar(team) { return `var(--team-${cssVarSafe(team.team_color)})`; }
        function shortName(name) { return String(name).split(" ").slice(-1)[0]; }

        let lastData = null;

        // ===== Callout state (dashboard-011 + 020) ===========================
        // TO lag (dashboard-020):
        //  • SCORE-entry → lille center-hero (provisorisk, relativ kommentar). Fyrer ofte.
        //  • Disciplin-LÅS → stort overlay (federe summary der væver de små callouts sammen),
        //    eksploderer fra centrum, 15s dwell, skrumper tilbage. Fyrer 7× over aftenen.
        // Host flipper hele grenens rows is_final→true i én batch → lås = pr. disciplin.
        // Dedup: scoreSeen pr. (hold×disc×runde), lockSeen pr. disciplin. Baseline-seed på
        // første poll (ingen kold-start-burst). Kald fejler stille (ADR-5).
        const CALLOUT_URL = `${SUPABASE_URL}/functions/v1/callout`;
        const CALLOUT_TIMEOUT_MS = 12000;  // lock-summary (heavy Sonnet-prompt) målt 7.1s live 06-13 → headroom mod cold-start/load før graceful fallback rammer
        const OVERLAY_DWELL_MS = 15000;  // Mads: 15s først
        // ?demo=1 → lokal success-path-verifikation. Den ægte Edge Function har kun
        // GitHub-Pages-origin i CORS, så et localhost-kald blokeres af browseren; stubben
        // lader os se animation+dedup lokalt uden at røre funktionen.
        const DEMO = new URLSearchParams(location.search).has("demo");

        const scoreSeen = new Set();    // "team:disc:round" — score-entries vi har set/fyret
        const lockSeen = new Set();     // disciplin-keys vi har fyret lock-overlay for
        let baselineSeeded = false;     // første poll seeder uden at fyre
        const calloutLog = new Map();   // discKey → [tekst,…] (rigtige score-callouts, fodres til summary)

        let currentHero = null;         // malet hero-indhold ({kind, …fields, text})
        let heroPaintKey = null;        // "kind:discKey:teamKey:rev" sidst malet → repaint/anim-guard
        let heroRevision = 0;
        let overlayActive = false;      // sandt mens det store overlay er oppe → små callouts holdes tilbage
        let lastCtx = null;             // seneste poll-kontekst (til overlay-flush)

        // Fem sarkastiske fallbacks (Mads' valg): vist når AI fejler/timeouter ELLER ved
        // kold-start. Hero'en bliver aldrig tom; AI er ren enhancement ovenpå (ADR-5).
        const AI_FALLBACKS = [
            "AI'en blev bedt om en kommentar. Den loggede ud i stedet.",
            "Her skulle stå noget kløgtigt — men AI'en holdt fri.",
            "Kommentatoren er udskiftet med en fejlmeddelelse. Ingen mærker forskel.",
            "AI'en lovede en perle og leverede stilhed.",
            "Maskinen tænkte længe og sagde så ingenting. Klassisk.",
        ];
        function fallbackCommentary() { return AI_FALLBACKS[Math.floor(Math.random() * AI_FALLBACKS.length)]; }

        async function fetchAll() {
            const [t, d, s] = await Promise.all([
                supabase.from("DimTeam").select("*").order("team_key"),
                supabase.from("DimDiscipline").select("*").order("discipline_key"),
                supabase.from("FactScore").select("*"),
            ]);
            if (t.error || d.error || s.error) throw new Error(t.error?.message || d.error?.message || s.error?.message);
            return { teams: t.data, disciplines: d.data, scores: s.data };
        }

        function render(data) {
            lastData = data;
            const { teams, disciplines, scores } = data;
            // Totals/cards/bump/latest/radar bevæger sig KUN på låste grene (Mads' beslutning
            // 2026-06-07): provisoriske rå-tal lever udelukkende i den live disc-panel nedenfor.
            const finalScores = scores.filter(r => r.is_final);
            const matrix = {};
            for (const r of finalScores) {
                if (!matrix[r.team_key]) matrix[r.team_key] = {};
                matrix[r.team_key][r.discipline_key] = r.points;
            }
            const totals = teams.map(t => ({
                team: t,
                total: disciplines.reduce((a, d) => a + (matrix[t.team_key]?.[d.discipline_key] ?? 0), 0),
            }));
            const sortedByTotal = [...totals].sort((a, b) => b.total - a.total);
            const leaderKey = sortedByTotal[0]?.team.team_key;
            const leaderTeam = sortedByTotal[0]?.team;
            const leaderTotal = sortedByTotal[0]?.total ?? 0;
            const rankByKey = Object.fromEntries(sortedByTotal.map((x, i) => [x.team.team_key, i + 1]));

            // G · Cards Horizontal — rank-sorted cards (left) + AI-commentary hero (Region A,
            // the wow-moment) + bump chart below it. Banner / disc-strip renderers retained
            // below for Region B (right rail) — not wired yet, pending that decision.
            renderHeader();
            renderCards(totals, matrix, disciplines, leaderKey, rankByKey);
            syncCallouts({ disciplines, teams, scores, totals, leaderKey, leaderTeam, leaderTotal, rankByKey });
            renderBump(teams, finalScores);
            renderAgenda();
            renderDiscPanel(disciplines, teams, scores);
        }

        // ===== Banner =========================================================
        function renderBanner(scores, teams, disciplines) {
            const sortedDesc = [...scores].sort((a, b) => new Date(b.score_timestamp) - new Date(a.score_timestamp));
            const top5 = sortedDesc.slice(0, 5);
            while (top5.length < 5) top5.push(null);

            const eventsHtml = top5.map((s, idx) => {
                if (!s) {
                    return `<div class="event-block empty"><span class="ev-team-tag"></span><div><div class="ev-meta"><span>—</span></div><div class="ev-team">—</div><div class="ev-discipline">Venter</div></div><div class="ev-points">0</div></div>`;
                }
                const team = teams.find(t => t.team_key === s.team_key);
                const disc = disciplines.find(d => d.discipline_key === s.discipline_key);
                const isHero = idx === 0;
                const time = new Date(s.score_timestamp).toLocaleTimeString("da-DK", { hour: "2-digit", minute: "2-digit" });
                return `
                    <div class="event-block${isHero ? " hero" : ""}" style="--team-color: ${teamColorVar(team)}">
                        <span class="ev-team-tag"></span>
                        <div>
                            <div class="ev-meta"><span>${isHero ? "Seneste" : "–" + (idx + 1)}</span><span>·</span><span>${time}</span></div>
                            <div class="ev-team">${esc(team?.team_name ?? "—")}</div>
                            <div class="ev-discipline">${esc(disc?.discipline_name ?? "—")}</div>
                        </div>
                        <div class="ev-points">${s.points}</div>
                    </div>
                `;
            }).join("");

            const now = new Date();
            const clockTime = now.toLocaleTimeString("da-DK", { hour: "2-digit", minute: "2-digit" });
            const dateStr = now.toLocaleDateString("da-DK", { day: "numeric", month: "short" }).toUpperCase();

            banner.innerHTML = eventsHtml + `
                <div class="banner-clock-block">
                    <div><span class="live-pill">LIVE</span></div>
                    <div>
                        <div class="banner-date">${esc(dateStr)}</div>
                        <div class="banner-clock">${clockTime}</div>
                    </div>
                </div>
            `;
        }

        // ===== Hold cards — HORIZONTAL, sorted by rank (leader on top; re-sorts as scores change) =====
        function renderCards(totals, matrix, disciplines, leaderKey, rankByKey) {
            const sortedDesc = [...totals].sort((a, b) => b.total - a.total);
            const leaderTotal = sortedDesc[0]?.total ?? 0;
            const secondTotal = sortedDesc[1]?.total ?? leaderTotal;
            // Der er kun en FØRER ved STRENGT forspring (>0 point OG foran nr. 2).
            // 0-0-0 ved start eller top-uafgjort → ingen fører, ingen gap-linje.
            const hasLeader = leaderTotal > 0 && leaderTotal > secondTotal;
            const noScores = leaderTotal === 0;
            // Render in rank order so the stack reorders through the evening.
            const ordered = [...totals].sort((a, b) => rankByKey[a.team.team_key] - rankByKey[b.team.team_key]);
            cardsRow.innerHTML = ordered.map(x => {
                const isLeader = hasLeader && x.team.team_key === leaderKey;
                const rank = rankByKey[x.team.team_key];
                const teamScores = matrix[x.team.team_key] ?? {};
                const behind = leaderTotal - x.total;
                const badgeLeft = isLeader
                    ? `<span class="lead-badge">FØRER</span>`
                    : `<span>${noScores ? "–" : "#" + rank}</span>`;
                let gapHtml = "";
                if (noScores) gapHtml = "";
                else if (isLeader) gapHtml = `<div class="gap">+${leaderTotal - secondTotal}<span class="gap-unit">PT FORSPRING</span></div>`;
                else if (behind > 0) gapHtml = `<div class="gap">−${behind}<span class="gap-unit">PT BAGUD</span></div>`;
                else gapHtml = `<div class="gap"><span class="gap-unit">LIGE</span></div>`;
                return `
                    <div class="hold-card${isLeader ? " leader" : ""}" style="--team-color: ${teamColorVar(x.team)}">
                        <div class="hc-identity">
                            <div class="badge-row">${badgeLeft}</div>
                            <div class="name">${esc(x.team.team_name)}</div>
                            <div class="motto">${esc(x.team.team_motto || "")}</div>
                        </div>
                        <div class="hc-stats">
                            <div class="total-label">Total</div>
                            <div class="total">${x.total}</div>
                            ${gapHtml}
                        </div>
                        <div class="hc-radar">
                            ${renderRadar(teamScores, disciplines, 120)}
                        </div>
                    </div>
                `;
            }).join("");
        }

        function renderRadar(teamScores, disciplines, size) {
            const cx = size / 2, cy = size / 2;
            const maxR = size / 2 - 12;  /* extra margin so the numbered vertex nodes fit inside the viewBox */
            const N = disciplines.length;
            if (N < 3) return "";

            let axes = "";
            for (let i = 0; i < N; i++) {
                const ang = (i / N) * 2 * Math.PI - Math.PI / 2;
                axes += `<line class="axis" x1="${cx}" y1="${cy}" x2="${(cx + maxR * Math.cos(ang)).toFixed(2)}" y2="${(cy + maxR * Math.sin(ang)).toFixed(2)}"/>`;
            }

            let rings = "";
            for (const frac of [0.5, 1.0]) {
                const pts = [];
                for (let i = 0; i <= N; i++) {
                    const ang = (i / N) * 2 * Math.PI - Math.PI / 2;
                    const r = maxR * frac;
                    pts.push(`${(cx + r * Math.cos(ang)).toFixed(2)},${(cy + r * Math.sin(ang)).toFixed(2)}`);
                }
                rings += `<polyline class="ring" points="${pts.join(" ")}"/>`;
            }

            const polyPts = disciplines.map((d, i) => {
                const ang = (i / N) * 2 * Math.PI - Math.PI / 2;
                const pts = teamScores[d.discipline_key];
                const pct = typeof pts === "number" ? Math.min(pts / d.max_points, 1) : 0;
                const r = maxR * pct;
                return `${(cx + r * Math.cos(ang)).toFixed(2)},${(cy + r * Math.sin(ang)).toFixed(2)}`;
            }).join(" ");

            // Numbered vertex nodes — each corner carries the discipline's index (1..N), matching
            // the number chip on the disc-strip pill below. This is the radar↔discipline key.
            let nodes = "";
            for (let i = 0; i < N; i++) {
                const ang = (i / N) * 2 * Math.PI - Math.PI / 2;
                const nx = (cx + maxR * Math.cos(ang)).toFixed(2);
                const ny = (cy + maxR * Math.sin(ang)).toFixed(2);
                nodes += `<circle class="axis-node" cx="${nx}" cy="${ny}" r="8"/>`;
                nodes += `<text class="axis-num" x="${nx}" y="${ny}" dy="0.34em">${i + 1}</text>`;
            }

            return `<svg class="radar" viewBox="0 0 ${size} ${size}">${axes}${rings}<polygon class="polygon" points="${polyPts}"/>${nodes}</svg>`;
        }

        // ===== Bump chart — dynamic viewBox sized to container ===============
        function renderBump(teams, scores) {
            const W = bumpWrap.clientWidth;
            const H = bumpWrap.clientHeight;
            if (W < 50 || H < 50) return; // not yet sized

            bumpSvg.setAttribute("viewBox", `0 0 ${W} ${H}`);

            const padL = 32, padR = 100, padT = 16, padB = 20;
            const plotW = W - padL - padR;
            const plotH = H - padT - padB;

            const sortedAsc = [...scores].sort((a, b) => new Date(a.score_timestamp) - new Date(b.score_timestamp));
            const running = Object.fromEntries(teams.map(t => [t.team_key, 0]));
            const snapshots = [];
            for (const s of sortedAsc) {
                running[s.team_key] = (running[s.team_key] ?? 0) + s.points;
                snapshots.push(computeRanks(running, teams));
            }

            if (snapshots.length < 2) {
                bumpSvg.innerHTML = `<text x="${W/2}" y="${H/2}" text-anchor="middle" class="rank-label" fill="oklch(58% 0.012 30)">Venter på første scores</text>`;
                return;
            }

            const N = snapshots.length;
            const numTeams = teams.length;
            const xStep = N > 1 ? plotW / (N - 1) : 0;
            const yStep = numTeams > 1 ? plotH / (numTeams - 1) : 0;

            let svg = "";
            for (let r = 1; r <= numTeams; r++) {
                const y = padT + (r - 1) * yStep;
                svg += `<line class="axis-line" x1="${padL}" y1="${y.toFixed(1)}" x2="${(padL + plotW).toFixed(1)}" y2="${y.toFixed(1)}"/>`;
                svg += `<text class="rank-label" x="${(padL - 8).toFixed(1)}" y="${(y + 4).toFixed(1)}" text-anchor="end">#${r}</text>`;
            }

            // Soft bump: smooth cubic curves through each team's rank-at-each-event points.
            // Control handles sit at the midpoint x with the flanking y's, so lines flow gently
            // instead of hard steps — crossings still land at the events, just softened.
            for (const team of teams) {
                const colorVar = teamColorVar(team);
                const pts = snapshots.map((snap, i) => ({
                    x: padL + i * xStep,
                    y: padT + (snap[team.team_key] - 1) * yStep,
                }));

                let d = `M ${pts[0].x.toFixed(1)} ${pts[0].y.toFixed(1)}`;
                for (let i = 1; i < pts.length; i++) {
                    const prev = pts[i - 1], cur = pts[i];
                    const cx = (prev.x + cur.x) / 2;
                    d += ` C ${cx.toFixed(1)} ${prev.y.toFixed(1)}, ${cx.toFixed(1)} ${cur.y.toFixed(1)}, ${cur.x.toFixed(1)} ${cur.y.toFixed(1)}`;
                }
                svg += `<path class="team-line" stroke="${colorVar}" d="${d}"/>`;

                const last = pts[pts.length - 1];
                svg += `<circle class="team-end-dot" cx="${last.x.toFixed(1)}" cy="${last.y.toFixed(1)}" r="5" fill="${colorVar}"/>`;
                svg += `<text class="team-end-label" x="${(last.x + 11).toFixed(1)}" y="${(last.y + 5).toFixed(1)}" fill="${colorVar}">${esc(shortName(team.team_name))}</text>`;
            }

            bumpSvg.innerHTML = svg;
        }

        function computeRanks(running, teams) {
            const entries = teams.map(t => [t.team_key, running[t.team_key] ?? 0]);
            entries.sort((a, b) => b[1] - a[1] || a[0] - b[0]);
            const ranks = {};
            entries.forEach(([key], i) => { ranks[key] = i + 1; });
            return ranks;
        }

        // ===== Seneste resultat + AI commentary ===============================
        // ----- Detection: locks + score-entries ------------------------------
        // En gren er LÅST når den har ≥1 indtastet rå-tal OG alle indtastede rows er
        // is_final (host låser hele grenen i én batch). Samme prædikat som renderDiscPanel/host.
        function lockedDiscKeys(disciplines, scores) {
            const locked = [];
            for (const d of disciplines) {
                const entered = scores.filter(s => s.discipline_key === d.discipline_key
                    && s.raw_value !== null && s.raw_value !== undefined);
                if (entered.length > 0 && entered.every(s => s.is_final)) locked.push(d.discipline_key);
            }
            return locked;
        }

        // Alle indtastede score-entries med stabil nøgle (hold×disc×runde).
        function enteredEntries(scores) {
            return scores
                .filter(s => s.raw_value !== null && s.raw_value !== undefined)
                .map(s => ({ key: `${s.team_key}:${s.discipline_key}:${s.round_number ?? 1}`,
                             teamKey: s.team_key, discKey: s.discipline_key, row: s }));
        }

        const tsOf = row => row?.score_timestamp ? new Date(row.score_timestamp).getTime() : 0;
        function discLatestTs(discKey, scores) {
            let max = 0;
            for (const s of scores) { if (s.discipline_key === discKey) { const t = tsOf(s); if (t > max) max = t; } }
            return max;
        }
        function pickMostRecentDisc(discKeys, scores) {
            return discKeys.slice().sort((a, b) => discLatestTs(b, scores) - discLatestTs(a, scores))[0];
        }

        // ----- Shared fetch + log --------------------------------------------
        async function fetchCallout(payload) {
            if (DEMO) {
                await new Promise(r => setTimeout(r, 600));
                return payload.event === "lock"
                    ? `DEMO · ${payload.discipline?.name} afgjort — ${payload.results?.[0]?.name} tog den foran et tæt felt, og spændingen lever videre.`
                    : `DEMO · ${payload.team?.name} melder ${payload.raw_value} i ${payload.discipline?.name}.`;
            }
            const ctrl = new AbortController();
            const timer = setTimeout(() => ctrl.abort(), CALLOUT_TIMEOUT_MS);
            try {
                const resp = await fetch(CALLOUT_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json",
                        "Authorization": `Bearer ${SUPABASE_ANON_KEY}`, "apikey": SUPABASE_ANON_KEY },
                    body: JSON.stringify(payload), signal: ctrl.signal,
                });
                if (!resp.ok) throw new Error(`callout ${resp.status}`);
                const data = await resp.json();
                return String(data.callout ?? "").trim();
            } finally { clearTimeout(timer); }
        }
        function logCallout(discKey, text) {
            const a = calloutLog.get(discKey) ?? []; a.push(text); calloutLog.set(discKey, a);
        }

        // Provisorisk rangering af de indtastede hold i en gren (uafhængigt af is_final).
        function enteredRanked(discKey, ctx) {
            const disc = ctx.disciplines.find(d => d.discipline_key === discKey);
            const rows = ctx.scores.filter(s => s.discipline_key === discKey);
            const placements = computePlacements(rows, disc?.sort_direction);
            const entered = rows
                .filter(s => s.raw_value !== null && s.raw_value !== undefined)
                .map(s => ({ team: ctx.teams.find(t => t.team_key === s.team_key), row: s,
                             rank: placements.get(s.team_key)?.rank ?? 99 }))
                .sort((a, b) => a.rank - b.rank);
            return { disc, entered };
        }

        // ----- SCORE mode: provisorisk, relativ → lille hero -----------------
        function buildScorePayload(entry, ctx) {
            const { disc, entered } = enteredRanked(entry.discKey, ctx);
            const team = ctx.teams.find(t => t.team_key === entry.teamKey);
            const me = entered.find(e => e.team?.team_key === entry.teamKey);
            return {
                event: "score",
                team: { name: team?.team_name,
                        skabelsesberetning: team?.team_motto || undefined,
                        members: team?.team_members || undefined },
                discipline: { name: disc?.discipline_name, type: disc?.discipline_type, sort_direction: disc?.sort_direction },
                raw_value: entry.row?.raw_value,
                entered_so_far: entered.map(e => ({ name: e.team?.team_name, raw_value: e.row?.raw_value })),
                provisional_rank: me?.rank ?? entered.length,
                entered_count: entered.length,
                total_teams: ctx.teams.length,
                notes: entry.row?.notes || undefined,
            };
        }
        function buildScoreFields(entry, ctx) {
            const { disc, entered } = enteredRanked(entry.discKey, ctx);
            const team = ctx.teams.find(t => t.team_key === entry.teamKey);
            if (!team || !disc) return null;
            const me = entered.find(e => e.team?.team_key === entry.teamKey);
            const time = entry.row?.score_timestamp
                ? new Date(entry.row.score_timestamp).toLocaleTimeString("da-DK", { hour: "2-digit", minute: "2-digit" }) : "";
            return {
                kind: "score", idKey: entry.key,
                teamColorVar: teamColorVar(team),
                discName: disc.discipline_name ?? "—",
                time, teamName: team.team_name ?? "—",
                scoreHtml: `${esc(entry.row?.raw_value ?? "?")}`,
                standing: entered.length > 1 ? `midl. #${me?.rank ?? "?"}/${entered.length}` : "først ind",
                isLeader: false,
            };
        }
        async function dispatchScore(entry, ctx) {
            const fields = buildScoreFields(entry, ctx);
            if (!fields) return;
            let text, real = true;
            try { text = await fetchCallout(buildScorePayload(entry, ctx)); }
            catch { text = ""; real = false; }
            if (!text) { text = fallbackCommentary(); real = false; }
            if (real) logCallout(entry.discKey, text);   // kun ægte callouts fodres til summary
            setHero(fields, text, true);
            renderHero();
        }

        // ----- LOCK mode: federe summary → stort overlay ---------------------
        function discResults(discKey, ctx) {
            const disc = ctx.disciplines.find(d => d.discipline_key === discKey);
            const rows = ctx.scores.filter(s => s.discipline_key === discKey);
            const placements = computePlacements(rows, disc?.sort_direction);
            const results = rows
                .filter(s => s.raw_value !== null && s.raw_value !== undefined)
                .map(s => { const p = placements.get(s.team_key);
                    const team = ctx.teams.find(t => t.team_key === s.team_key);
                    return { team, name: team?.team_name, raw_value: s.raw_value,
                             rank: p?.rank ?? 99, points: p?.points ?? 0, notes: s.notes }; })
                .sort((a, b) => a.rank - b.rank);
            return { disc, results };
        }
        function buildLockPayload(discKey, ctx) {
            const { disc, results } = discResults(discKey, ctx);
            const sorted = [...ctx.totals].sort((a, b) => b.total - a.total);
            const gap = (sorted[0]?.total ?? 0) - (sorted[1]?.total ?? sorted[0]?.total ?? 0);
            return {
                event: "lock",
                discipline: { name: disc?.discipline_name, type: disc?.discipline_type },
                results: results.map(r => ({ name: r.name, raw_value: r.raw_value, rank: r.rank, points: r.points, notes: r.notes || undefined })),
                prior_callouts: calloutLog.get(discKey) ?? [],
                standings: { leader: ctx.leaderTeam?.team_name, gap: Math.max(0, gap) },
            };
        }
        function buildLockFields(discKey, ctx) {
            const { disc, results } = discResults(discKey, ctx);
            if (!disc || results.length === 0) return null;
            const winner = results[0];
            const isLeader = ctx.leaderTeam && winner.team?.team_key === ctx.leaderTeam.team_key;
            return {
                kind: "lock", idKey: `lock:${discKey}`,
                teamColorVar: winner.team ? teamColorVar(winner.team) : "var(--ink-border)",
                discName: disc.discipline_name ?? "—",
                time: "", teamName: winner.name ?? "—",
                points: winner.points, maxPoints: disc.max_points ?? "?",
                standing: "#1 · Vinder", isLeader, results,
            };
        }
        async function dispatchLock(discKey, ctx) {
            const fields = buildLockFields(discKey, ctx);
            if (!fields) return;
            overlayActive = true;   // bloker score-fyring straks — også under fetch-latency
            let text;
            try { text = await fetchCallout(buildLockPayload(discKey, ctx)); }
            catch { text = ""; }
            if (!text) text = fallbackCommentary();
            setHero(fields, text, true);   // hero under overlayet bærer summaryen ved normal størrelse
            renderHero();
            showOverlay(fields, text);     // eksplodér 70%, dwell 15s, skrump tilbage
        }

        // ----- Overlay: eksplodér fra centrum, dwell, skrump -----------------
        function showOverlay(fields, text) {
            overlayActive = true;
            overlayEl.style.setProperty("--team-color", fields.teamColorVar);
            const rowsHtml = (fields.results || []).map(r => `
                <div class="ov-row${r.rank === 1 ? " win" : ""}" style="--team-color:${r.team ? teamColorVar(r.team) : "var(--ink-border)"}">
                    <span class="ov-rank">${r.rank}.</span>
                    <span class="ov-dot"></span>
                    <span class="ov-name">${esc(r.name ?? "—")}</span>
                    <span class="ov-raw">${esc(r.raw_value ?? "")}</span>
                    <span class="ov-pts">+${r.points}</span>
                </div>`).join("");
            overlayEl.innerHTML = `
                <div class="hero-overlay-card">
                    <div class="ov-tag"><span class="ov-disc">${esc(fields.discName)}</span><span class="ov-status">Disciplin afsluttet</span></div>
                    <div class="ov-commentary">${esc(text)}</div>
                    <div class="ov-results">${rowsHtml}</div>
                </div>`;
            overlayEl.classList.add("show");
            void overlayEl.offsetWidth;                    // reflow → animation kører ved insert
            overlayEl.classList.add("explode");
            setTimeout(() => {
                overlayEl.classList.remove("explode");
                overlayEl.classList.add("implode");
                setTimeout(() => {
                    overlayEl.classList.remove("show", "implode");
                    overlayEl.innerHTML = "";
                    overlayActive = false;                 // næste poll surfacer evt. ventende score
                }, 520);
            }, 600 + OVERLAY_DWELL_MS);
        }

        // ----- Orchestrator --------------------------------------------------
        function setHero(fields, text, animate) {
            heroRevision++;
            currentHero = { ...fields, text, animate, rev: heroRevision };
        }

        function syncCallouts(ctx) {
            lastCtx = ctx;
            // Crescendo kører → defer al ny fyring; ventende entries/låse surfacer efter.
            if (overlayActive) { renderHero(); return; }

            const lockedNow = new Set(lockedDiscKeys(ctx.disciplines, ctx.scores));
            const entries = enteredEntries(ctx.scores);

            // Baseline-seed på første poll: markér alt nuværende som set, fyr ikke.
            if (!baselineSeeded) {
                baselineSeeded = true;
                for (const e of entries) scoreSeen.add(e.key);
                for (const k of lockedNow) lockSeen.add(k);
                if (lockedNow.size > 0) {
                    const f = buildLockFields(pickMostRecentDisc([...lockedNow], ctx.scores), ctx);
                    if (f) setHero(f, fallbackCommentary(), false);
                } else if (entries.length > 0) {
                    const latest = entries.slice().sort((a, b) => tsOf(b.row) - tsOf(a.row))[0];
                    const f = buildScoreFields(latest, ctx);
                    if (f) setHero(f, fallbackCommentary(), false);
                }
                renderHero();
                return;
            }

            // Ryd lockSeen for grene der er låst op igen → en korrektions-genlås kan fyre.
            for (const k of [...lockSeen]) if (!lockedNow.has(k)) lockSeen.delete(k);

            // LÅS er headline: en ny lås → stort overlay. Skip score denne poll.
            const freshLocks = [...lockedNow].filter(k => !lockSeen.has(k));
            if (freshLocks.length) {
                freshLocks.forEach(k => lockSeen.add(k));
                dispatchLock(pickMostRecentDisc(freshLocks, ctx.scores), ctx);
                renderHero();
                return;
            }

            // SCORE: nye entries → lille hero (kun når intet overlay kører).
            const fresh = entries.filter(e => !scoreSeen.has(e.key));
            if (fresh.length) {
                const chosen = fresh.slice().sort((a, b) => tsOf(b.row) - tsOf(a.row))[0];
                fresh.forEach(e => scoreSeen.add(e.key));
                dispatchScore(chosen, ctx);
            }
            renderHero();
        }

        // ----- Hero painter (maler KUN ved ændring → ingen re-anim hver poll) -
        function renderHero() {
            if (!currentHero) {
                if (heroPaintKey === "empty") return;
                heroPaintKey = "empty";
                latestPanel.className = "latest-panel empty";
                latestPanel.style.removeProperty("--team-color");
                latestPanel.innerHTML = `
                    <div class="lp-tag"><span class="lp-label">Seneste resultat</span><span class="lp-tag-time"></span></div>
                    <div class="lp-empty">Venter på første score</div>
                `;
                return;
            }
            const h = currentHero;
            const key = `${h.kind}:${h.idKey}:${h.rev}`;
            if (key === heroPaintKey) return;
            const animate = !!h.animate;
            heroPaintKey = key;

            const scoreCell = h.kind === "lock"
                ? `+${h.points}<i>/${h.maxPoints}</i>`
                : `${h.scoreHtml}`;
            const timeTag = h.kind === "lock" ? "Afsluttet" : (h.time || "Live");
            latestPanel.className = "latest-panel has-event"
                + (h.isLeader ? " leader" : "") + (animate ? " lp-arrive" : "");
            latestPanel.style.setProperty("--team-color", h.teamColorVar);
            latestPanel.innerHTML = `
                <div class="lp-tag">
                    <span class="lp-tag-disc">${esc(h.discName)}</span>
                    <span class="lp-tag-time">${esc(timeTag)}</span>
                </div>
                <div class="lp-commentary${animate ? " lp-fresh" : ""}${h.kind === "lock" ? " is-summary" : ""}">${esc(h.text)}</div>
                <div class="lp-result">
                    <span class="lp-result-team">${esc(h.teamName)}</span>
                    <span class="lp-result-score">${scoreCell}</span>
                    <span class="lp-result-standing">${esc(h.standing)}</span>
                </div>
            `;
        }

        // ===== Disciplin strip ================================================
        function renderDiscStrip(disciplines, teams, matrix) {
            discStrip.innerHTML = disciplines.map((d, i) => {
                const hasAny = teams.some(t => typeof matrix[t.team_key]?.[d.discipline_key] === "number");
                const status = hasAny ? "done" : "pending";
                let topScore = -1, topTeam = null;
                for (const t of teams) {
                    const pts = matrix[t.team_key]?.[d.discipline_key];
                    if (typeof pts === "number" && pts > topScore) { topScore = pts; topTeam = t; }
                }
                // Dot per team that has scored this discipline, on a shared 0→max axis.
                const dotsHtml = teams.map(t => {
                    const pts = matrix[t.team_key]?.[d.discipline_key];
                    if (typeof pts !== "number") return "";
                    const frac = d.max_points > 0 ? Math.min(pts / d.max_points, 1) : 0;
                    const leftPct = (4 + frac * 92).toFixed(1); // inset so edge dots aren't clipped
                    const isTop = topTeam && t.team_key === topTeam.team_key;
                    return `<span class="dot${isTop ? " lead" : ""}" style="left:${leftPct}%; --team-color: ${teamColorVar(t)}" title="${esc(t.team_name)}: ${pts}"></span>`;
                }).join("");
                const meta = hasAny
                    ? `${topScore}/${d.max_points} <span class="leader-name">${esc(topTeam?.team_name ?? "")}</span>`
                    : `Kommer · /${d.max_points}`;
                // Pass leader-of-this-discipline color to the pill so the ✓ carries team identity
                const leaderColorStyle = hasAny && topTeam
                    ? ` style="--leader-color: ${teamColorVar(topTeam)}"`
                    : "";
                return `
                    <div class="disc-pill" data-status="${status}"${leaderColorStyle}>
                        <span class="label">${esc(d.discipline_name)}<span class="disc-num">${i + 1}</span></span>
                        <div class="disc-dots">${dotsHtml}</div>
                        <span class="meta">${meta}</span>
                    </div>
                `;
            }).join("");
        }

        // ===== Agenda — minimal program of the day ============================
        // Static: the day program includes non-scoring events (arrival, food truck),
        // so it is NOT DimDiscipline. The "now" row tracks the wall clock (time-of-day).
        // Durations are best-guess ASSUMPTIONS (Mads corrects) — they drive box heights.
        const SCHEDULE = [
            { start: "12:30", end: "13:30", title: "Velkommen" },
            { start: "13:30", end: "14:00", title: "Afgang — Creation Myth digtes på vejen" },
            { start: "14:00", end: "16:00", title: "Bowling" },
            // 16–21 er et åbent station-vindue, ikke et fast skema: de 4 grene køres i eget
            // tempo (~10 min hver). Food Truck-boksen nedenfor ligger oven på vinduet.
            { start: "16:00", end: "21:00", title: "Konkurrence", kind: "window",
              stations: ["Dart", "Cornhole", "Puslespil", "Slå søm"] },
            { start: "18:00", end: "20:00", title: "Food Truck + Creation Myth-afstemning", menu: ["Cheeseburger", "Fried Chicken", "Veggie", "+ Fritter"] },
            { start: "21:00", end: "22:00", title: "Musikquiz" },
        ];
        const toMin = t => { const [h, m] = t.split(":").map(Number); return h * 60 + m; };

        // Day calendar 12:00 → 22:00. Faint hour grid + an event BOX per item (placed by
        // start, sized to duration) + a "now" line tracking the wall clock.
        function renderAgenda() {
            const T0 = 12 * 60, T1 = 22 * 60, span = T1 - T0;
            const pct = m => (m - T0) / span * 100;
            const clamp = p => Math.max(0, Math.min(100, p));
            const now = new Date();
            const nowMin = now.getHours() * 60 + now.getMinutes();
            const nowPct = clamp(pct(nowMin));

            let grid = "";
            for (let h = 12; h <= 22; h++) {
                grid += `<div class="tl-hour" style="top:${pct(h * 60).toFixed(2)}%"><span class="tl-hour-lbl">${h}</span><span class="tl-hour-line"></span></div>`;
            }
            // Windows render first (behind) so solid boxes that overlap them (e.g. Food Truck
            // inside the 16–21 competition window) paint on top.
            const ordered = [...SCHEDULE].sort((a, b) => (a.kind === "window" ? 0 : 1) - (b.kind === "window" ? 0 : 1));
            const boxes = ordered.map(it => {
                const s = toMin(it.start), e = it.end ? toMin(it.end) : s + 30;
                const top = clamp(pct(s)), bot = clamp(pct(e));
                const isNow = nowMin >= s && nowMin < e;
                const h = (bot - top).toFixed(2);

                // Open station-window: a translucent band with station chips, not a solid event box.
                if (it.kind === "window") {
                    const chips = (it.stations || []).map(st => `<span class="tl-st">${esc(st)}</span>`).join("");
                    return `<div class="tl-window${isNow ? " is-now" : ""}" style="top:${top.toFixed(2)}%; height:calc(${h}% - 4px)">
                        <div class="tl-window-head"><span class="tl-window-title">${esc(it.title)}</span><span class="tl-window-time">${esc(it.start)}–${esc(it.end)}</span></div>
                        <div class="tl-stations">${chips}</div>
                    </div>`;
                }

                const timeStr = it.end ? `${it.start}–${it.end}` : it.start;
                // Time line only fits in taller boxes (>=45 min); short boxes show the title alone.
                const timeLine = (e - s) >= 45 ? `<span class="tl-box-time">${esc(timeStr)}</span>` : "";
                const menuLine = it.menu ? `<span class="tl-box-menu">${it.menu.map(esc).join(" · ")}</span>` : "";
                // Shrink each box 4px shy of its true end — a little air between blocks (visual only; grid stays truthful).
                return `<div class="tl-box${isNow ? " is-now" : ""}" style="top:${top.toFixed(2)}%; height:calc(${h}% - 4px)">
                    <span class="tl-box-title">${esc(it.title)}</span>${timeLine}${menuLine}
                </div>`;
            }).join("");

            agenda.innerHTML = `
                <div class="ag-head">Program</div>
                <div class="tl">
                    ${grid}
                    ${boxes}
                    <div class="tl-now" style="top:${nowPct.toFixed(2)}%"></div>
                </div>
            `;
        }

        // ===== Page header — MK40 + live date/clock ===========================
        function renderHeader() {
            const now = new Date();
            $("ph-date").textContent = now.toLocaleDateString("da-DK", { day: "numeric", month: "short" }).replace(/\./g, "").toUpperCase();
            $("ph-clock").textContent = now.toLocaleTimeString("da-DK", { hour: "2-digit", minute: "2-digit" });
        }

        // ===== Disciplines panel — LIVE rå-score-bars (dashboard-009) =========
        // Per discipline: op til 5 lodrette bars med holdenes faktiske rå-tal, vinder
        // højest, opdateret live efterhånden som kaptajnerne taster (provisorisk —
        // uafhængigt af is_final). Numrene 1..N matcher fortsat radar-vertices.
        // Dette er "følg-med"-fladen; totalen rører sig først når host LÅSER (renderCards).
        function renderDiscPanel(disciplines, teams, allScores) {
            const rows = disciplines.map((d, i) => {
                const discRows = allScores.filter(s => s.discipline_key === d.discipline_key);
                const entered = discRows.filter(s => s.raw_value !== null && s.raw_value !== undefined);
                const isLocked = entered.length > 0 && discRows.every(s => s.is_final);
                const placements = computePlacements(discRows, d.sort_direction);
                const allRaws = entered.map(s => Number(s.raw_value));

                const sorted = entered.map(s => {
                    const team = teams.find(t => t.team_key === s.team_key);
                    const p = placements.get(s.team_key);
                    return { team, raw: Number(s.raw_value), rank: p.rank,
                             frac: rawToBarFraction(Number(s.raw_value), allRaws, d.sort_direction) };
                }).sort((a, b) => a.rank - b.rank);

                const bars = sorted.map((x, idx) => `
                    <div class="dp-bar${idx === 0 ? " lead" : ""}" style="--team-color:${teamColorVar(x.team)}; --h:${(x.frac * 100).toFixed(0)}%" title="${esc(x.team.team_name)}: ${esc(x.raw)}">
                        <span class="dp-bar-val">${esc(x.raw)}</span>
                        <span class="dp-bar-fill"></span>
                    </div>`).join("");
                const empties = Math.max(0, teams.length - sorted.length);
                const padHtml = Array.from({ length: empties }, () =>
                    `<div class="dp-bar empty"><span class="dp-bar-fill"></span></div>`).join("");

                const status = isLocked
                    ? `<span class="dp-status locked">🔒</span>`
                    : entered.length > 0
                        ? `<span class="dp-status live">${entered.length}/${teams.length}</span>`
                        : `<span class="dp-status idle">–</span>`;

                return `<div class="dp-disc${isLocked ? " is-locked" : ""}">
                    <div class="dp-disc-label"><span class="dp-num">${i + 1}</span><span class="dp-name">${esc(d.discipline_name)}</span>${status}</div>
                    <div class="dp-bars">${bars}${padHtml}</div>
                </div>`;
            }).join("");
            discPanel.innerHTML = `<div class="dp-head">Discipliner — live</div><div class="dp-list">${rows}</div>`;
        }

        // Re-render the bump chart when its container resizes (it sizes to viewBox at runtime).
        const resizeObs = new ResizeObserver(() => {
            if (lastData) renderBump(lastData.teams, lastData.scores);
        });
        resizeObs.observe(bumpWrap);

        async function poll() {
            try { render(await fetchAll()); }
            catch (e) {
                cardsRow.innerHTML = `<div class="state-message error">${esc(e.message)}</div>`;
            }
        }
        poll(); setInterval(poll, 5000);
    </script>
</body>
</html>
