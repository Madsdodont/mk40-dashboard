<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mk40 — Cards prototype</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700;9..144,900&family=Inter:wght@500;600;700&family=JetBrains+Mono:wght@600;700;800&display=swap">
    <style>
        :root {
            --ink-deep:        oklch(15% 0.015 30);
            --ink-elevated:    oklch(20% 0.018 30);
            --ink-card:        oklch(24% 0.020 30);
            --ink-border:      oklch(32% 0.022 30);
            --bone:            oklch(94% 0.010 60);
            --bone-muted:      oklch(70% 0.012 60);
            --gold-ceremonial: oklch(78% 0.16 85);
            --team-pink:        oklch(55% 0.22 25);
            --team-navy:        oklch(48% 0.20 245);
            --team-grøn:       oklch(50% 0.15 145);
            --team-orange:        oklch(80% 0.16 90);
            --team-lilla:   oklch(60% 0.005 60);
            --font-display:    "Fraunces", Georgia, serif;
            --font-label:      "Inter", system-ui, sans-serif;
            --font-numeric:    "JetBrains Mono", ui-monospace, monospace;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0; background: var(--ink-deep); color: var(--bone);
            font-family: var(--font-label); min-height: 100vh;
            display: flex; flex-direction: column;
            -webkit-font-smoothing: antialiased;
        }

        /* Prototype nav */
        .proto-nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 10;
            background: oklch(10% 0.01 30 / 0.85); backdrop-filter: blur(8px);
            padding: 0.5rem 1.5rem; display: flex; gap: 0.5rem;
            font-family: var(--font-label); font-size: 0.75rem;
            font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
        }
        .proto-nav a {
            color: var(--bone-muted); text-decoration: none; padding: 0.25rem 0.75rem;
            border: 1px solid transparent;
        }
        .proto-nav a.current { color: var(--gold-ceremonial); border-color: var(--gold-ceremonial); }
        .proto-nav a:hover { color: var(--bone); }

        header {
            padding: 4rem 3rem 2rem 3rem;
            display: flex; justify-content: space-between; align-items: flex-end;
            gap: 2rem; flex-wrap: wrap;
        }
        header h1 {
            margin: 0; font-family: var(--font-display);
            font-size: clamp(2.5rem, 5.5vw, 4.5rem);
            font-weight: 900; line-height: 0.95; letter-spacing: -0.025em;
            color: var(--bone);
        }
        header .meta {
            font-family: var(--font-label); color: var(--bone-muted);
            font-size: 0.875rem; font-weight: 500; letter-spacing: 0.1em;
            text-transform: uppercase; font-variant-numeric: tabular-nums;
            text-align: right;
        }

        main { flex: 1; padding: 0 3rem 3rem 3rem; }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 1.25rem;
            max-width: 2200px; margin: 0 auto;
        }

        .team-card {
            position: relative;
            background: var(--ink-card);
            border-top: 8px solid var(--team-color);
            overflow: hidden;
            display: flex; flex-direction: column;
        }

        .team-card.leader {
            outline: 2px solid var(--gold-ceremonial);
            outline-offset: -2px;
        }
        .team-card.leader::after {
            content: "#1"; position: absolute; top: 16px; right: 16px;
            font-family: var(--font-display); font-weight: 900;
            font-size: 1.5rem; color: var(--gold-ceremonial); line-height: 1;
        }

        .team-card .rank {
            position: absolute; top: 16px; right: 16px;
            font-family: var(--font-label); font-size: 0.75rem;
            font-weight: 600; letter-spacing: 0.12em;
            color: var(--bone-muted); text-transform: uppercase;
        }
        .team-card.leader .rank { display: none; }

        .team-card .name {
            padding: 1.5rem 1.5rem 0.5rem 1.5rem;
            font-family: var(--font-display);
            font-size: clamp(1.125rem, 1.5vw, 1.5rem);
            font-weight: 700; line-height: 1.0;
            color: var(--bone); letter-spacing: -0.015em;
        }

        .team-card .motto {
            padding: 0 1.5rem;
            font-family: var(--font-display); font-style: italic;
            font-size: 0.875rem; font-weight: 600;
            color: var(--bone-muted); line-height: 1.3;
            min-height: 1.3em;
        }

        .team-card .total {
            padding: 1.25rem 1.5rem 0.5rem 1.5rem;
            font-family: var(--font-numeric);
            font-size: clamp(3.5rem, 6vw, 5.5rem);
            font-weight: 800; line-height: 1.0;
            color: var(--bone);
            font-variant-numeric: tabular-nums;
            font-feature-settings: "tnum" 1;
        }
        .team-card.leader .total { color: var(--gold-ceremonial); }

        .team-card .total-label {
            padding: 0 1.5rem 1rem 1.5rem;
            font-family: var(--font-label); font-size: 0.75rem;
            font-weight: 600; letter-spacing: 0.15em;
            color: var(--bone-muted); text-transform: uppercase;
        }

        .team-card .disciplines {
            padding: 1rem 1.5rem 1.5rem 1.5rem;
            border-top: 1px solid var(--ink-border);
            margin-top: auto;
        }

        .discipline-row {
            display: flex; justify-content: space-between; align-items: baseline;
            padding: 0.4rem 0;
            font-family: var(--font-label); font-size: 0.8125rem;
            font-weight: 500; color: var(--bone-muted);
            letter-spacing: 0.06em; text-transform: uppercase;
            border-bottom: 1px dotted oklch(25% 0.015 30);
        }
        .discipline-row:last-child { border-bottom: none; }
        .discipline-row .pts {
            font-family: var(--font-numeric); font-weight: 700;
            color: var(--bone); font-size: 1rem;
            font-variant-numeric: tabular-nums;
        }
        .discipline-row .pts.empty { color: var(--ink-border); }

        @media (max-width: 1400px) {
            .cards-grid { grid-template-columns: repeat(3, 1fr); }
        }
        @media (max-width: 900px) {
            .cards-grid { grid-template-columns: repeat(2, 1fr); }
            header { padding: 3.5rem 1.5rem 1.5rem 1.5rem; }
            header h1 { font-size: 2rem; }
            main { padding: 0 1.5rem 1.5rem 1.5rem; }
        }
        @media (max-width: 540px) {
            .cards-grid { grid-template-columns: 1fr; }
        }

        .state-message {
            text-align: center; padding: 4rem 2rem; color: var(--bone-muted);
            font-family: var(--font-label); letter-spacing: 0.1em;
            text-transform: uppercase;
        }
        .state-message.error { color: var(--team-pink); }
    </style>
</head>
<body>
    <nav class="proto-nav">
        <a href="./">Table (boring)</a>
        <a href="./cards.html" class="current">A · Cards</a>
        <a href="./bars.html">B · Bars</a>
        <a href="./cinema.html">C · Cinematic</a>
        <a href="./hud.html">D · HUD</a>
        <a href="./hud2.html">E · HUD v2</a>
    </nav>

    <header>
        <h1>Kongerigernes<br>Kamp</h1>
        <div class="meta">
            <div>mk40 · 2026-06-27</div>
            <div id="last-updated">Forbinder…</div>
        </div>
    </header>

    <main>
        <div id="cards-container" class="cards-grid">
            <div class="state-message" style="grid-column: 1/-1;">Henter data…</div>
        </div>
    </main>

    <script type="module">
        import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
        import { SUPABASE_URL, SUPABASE_ANON_KEY } from "./config.js";
        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const container = document.getElementById("cards-container");
        const lastUpdated = document.getElementById("last-updated");

        function cssVarSafe(name) { return String(name).replace(/\//g, "").replace(/\s+/g, ""); }

        async function fetchAll() {
            const [t, d, s] = await Promise.all([
                supabase.from("DimTeam").select("*").order("team_key"),
                supabase.from("DimDiscipline").select("*").order("discipline_key"),
                supabase.from("FactScore").select("*").eq("is_final", true),
            ]);
            if (t.error || d.error || s.error) throw new Error(t.error?.message || d.error?.message || s.error?.message);
            return { teams: t.data, disciplines: d.data, scores: s.data };
        }

        function render({ teams, disciplines, scores }) {
            const matrix = {};
            for (const r of scores) {
                if (!matrix[r.team_key]) matrix[r.team_key] = {};
                matrix[r.team_key][r.discipline_key] = r.points;
            }
            const totals = teams.map(t => ({
                team: t,
                total: disciplines.reduce((a, d) => a + (matrix[t.team_key]?.[d.discipline_key] ?? 0), 0),
                matrix,
            }));
            totals.sort((a, b) => b.total - a.total);
            const leaderKey = totals[0]?.team.team_key;

            // Restore original order for rendering (left-to-right by team_key)
            const ordered = teams.map(t => totals.find(x => x.team.team_key === t.team_key));

            container.innerHTML = ordered.map((x, idx) => {
                const isLeader = x.team.team_key === leaderKey;
                const rank = totals.findIndex(y => y.team.team_key === x.team.team_key) + 1;
                const colorVar = `var(--team-${cssVarSafe(x.team.team_color)})`;
                const discRows = disciplines.map(d => {
                    const pts = matrix[x.team.team_key]?.[d.discipline_key];
                    const empty = typeof pts !== "number";
                    return `<div class="discipline-row"><span>${esc(d.discipline_name)}</span><span class="pts${empty ? " empty" : ""}">${empty ? "—" : pts}</span></div>`;
                }).join("");
                return `
                    <div class="team-card${isLeader ? " leader" : ""}" style="--team-color: ${colorVar}">
                        <span class="rank">#${rank}</span>
                        <div class="name">${esc(x.team.team_name)}</div>
                        <div class="motto">${esc(x.team.team_motto || "")}</div>
                        <div class="total">${x.total}</div>
                        <div class="total-label">Total</div>
                        <div class="disciplines">${discRows}</div>
                    </div>
                `;
            }).join("");

            const time = new Date().toLocaleTimeString("da-DK", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
            lastUpdated.textContent = `Opdateret ${time}`;
        }

        function esc(s) { return String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c])); }

        async function poll() {
            try { render(await fetchAll()); }
            catch (e) {
                container.innerHTML = `<div class="state-message error" style="grid-column: 1/-1;">${esc(e.message)}</div>`;
                lastUpdated.textContent = "Forbindelse afbrudt";
            }
        }
        poll(); setInterval(poll, 5000);
    </script>
</body>
</html>
