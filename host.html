<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>mk40 — Dommer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;0,9..144,900&family=JetBrains+Mono:wght@500;700;800&display=swap">
    <style>
        :root {
            --paper-void: oklch(94% 0.012 60);
            --paper-deep: oklch(97% 0.008 60);
            --paper-card: oklch(99% 0.005 60);
            --paper-border-soft: oklch(88% 0.012 60);
            --paper-border: oklch(75% 0.012 60);
            --ink: oklch(20% 0.014 30);
            --ink-muted: oklch(40% 0.014 30);
            --ink-dim: oklch(58% 0.012 30);
            --ok-green: oklch(55% 0.15 150);
            --wait-amber: oklch(60% 0.13 75);
            --team-pink: oklch(58% 0.22 5);
            --team-navy: oklch(42% 0.20 258);
            --team-grøn: oklch(50% 0.18 145);
            --team-gul: oklch(82% 0.16 85);
            --team-lilla: oklch(52% 0.18 295);
            --font-display: "Fraunces", Georgia, serif;
            --font-label: "Segoe UI", system-ui, sans-serif;
            --font-numeric: "JetBrains Mono", ui-monospace, monospace;
            --shadow-low: 0 1px 2px oklch(20% 0.02 30 / 0.08), 0 2px 6px oklch(20% 0.02 30 / 0.06);
            --shadow-medium: 0 2px 4px oklch(20% 0.02 30 / 0.10), 0 8px 24px oklch(20% 0.02 30 / 0.08);
            --w-regular: 600; --w-bold: 700; --w-black: 900;
            --ls-label: 0.12em; --ls-tight: -0.02em;
        }
        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; }
        body {
            background: var(--paper-void); color: var(--ink);
            font-family: var(--font-label); min-height: 100vh; -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
        }
        /* iPad landscape: bredt canvas → giv plads til 2-3 kolonner. */
        .wrap { max-width: 1280px; margin: 0 auto; padding: 0 0 calc(4rem + env(safe-area-inset-bottom)); }
        .head {
            position: sticky; top: 0; z-index: 10; background: var(--ink); color: var(--paper-card);
            padding: calc(1rem + env(safe-area-inset-top)) 1.25rem 1rem; box-shadow: var(--shadow-medium);
            display: flex; align-items: baseline; gap: 0.75rem; flex-wrap: wrap;
        }
        .head h1 { font-family: var(--font-display); font-weight: var(--w-black); font-size: 1.4rem; margin: 0; letter-spacing: var(--ls-tight); }
        .head .sub { font-size: 0.75rem; letter-spacing: var(--ls-label); text-transform: uppercase; opacity: 0.7; font-weight: var(--w-bold); }
        .head .conn { margin-left: auto; font-size: 0.75rem; font-family: var(--font-numeric); opacity: 0.8; }

        /* auto-fit grid: 1 kolonne på telefon, 2-3 på iPad landscape — ingen media-query nødvendig.
           min 440px holder hver disciplin læselig. align-items:start så kort ikke strækkes. */
        .list { padding: 1rem 1rem 0; display: grid; grid-template-columns: repeat(auto-fit, minmax(440px, 1fr)); gap: 1rem; align-items: start; }
        .disc { break-inside: avoid; }
        .disc { background: var(--paper-card); border: 1px solid var(--paper-border-soft); border-radius: 12px; box-shadow: var(--shadow-low); overflow: hidden; }
        .disc.locked { border-color: color-mix(in oklch, var(--ok-green) 45%, var(--paper-border-soft)); }

        /* Accordion: disciplin-kort foldes ud/ind ligesom på kaptajn-siden (dashboard-026). */
        .disc-top { padding: 0.85rem 1rem; display: flex; align-items: center; gap: 0.6rem; cursor: pointer; user-select: none; }
        .disc.open .disc-top { border-bottom: 1px solid var(--paper-border-soft); }
        .disc-top h2 { font-family: var(--font-display); font-weight: var(--w-bold); font-size: 1.15rem; margin: 0; flex: 1; }
        .disc-top .chevron { color: var(--ink-dim); font-size: 1rem; transition: transform 0.2s; }
        .disc.open .disc-top .chevron { transform: rotate(180deg); }
        .disc-body { display: none; }
        .disc.open .disc-body { display: block; }
        .count-chip { font-family: var(--font-numeric); font-size: 0.8rem; font-weight: var(--w-bold); color: var(--ink-muted); }
        .count-chip.full { color: var(--ok-green); }
        .lock-tag { font-size: 0.7rem; font-weight: var(--w-bold); color: var(--ok-green); letter-spacing: var(--ls-label); text-transform: uppercase; }

        table { width: 100%; border-collapse: collapse; }
        td, th { padding: 0.5rem 1rem; text-align: left; }
        thead th { font-size: 0.62rem; letter-spacing: var(--ls-label); text-transform: uppercase; color: var(--ink-dim); font-weight: var(--w-bold); }
        tbody tr { border-top: 1px solid var(--paper-border-soft); }
        tbody tr.pending td { color: var(--ink-dim); }
        .rank-cell { font-family: var(--font-numeric); font-weight: var(--w-black); font-size: 1.05rem; width: 2.2rem; color: var(--team-color, var(--ink)); }
        .team-cell { font-weight: var(--w-bold); }
        .team-dot { display: inline-block; width: 0.7rem; height: 0.7rem; border-radius: 50%; background: var(--team-color); margin-right: 0.45rem; vertical-align: -1px; }
        .raw-cell input {
            width: 5.5rem; font-family: var(--font-numeric); font-size: 1rem; text-align: right;
            min-height: 40px; padding: 0.4rem 0.55rem; border: 1.5px solid var(--paper-border); border-radius: 7px;
            background: var(--paper-deep); color: var(--ink); -webkit-appearance: none; appearance: none;
        }
        .raw-cell input:disabled { background: transparent; border-color: transparent; color: var(--ink-muted); text-align: right; }
        .raw-cell input:focus { outline: none; border-color: var(--ink); }
        .pts-cell { font-family: var(--font-numeric); font-weight: var(--w-bold); width: 4rem; text-align: right; }
        .note-cell { font-size: 0.78rem; color: var(--ink-dim); max-width: 12rem; }

        /* Per-spiller-blokke (bowling + dart): host kan se og rette hver enkelt spillers tal,
           ikke kun holdets snit (dashboard-026 fix 1). Snit genberegnes live af de viste tal. */
        .team-block { border-top: 1px solid var(--paper-border-soft); padding: 0.7rem 1rem 0.85rem; }
        .tb-head { display: flex; align-items: baseline; gap: 0.5rem; }
        .tb-head .rank-cell { width: 1.9rem; }
        .tb-head .team-cell { flex: 1; }
        .tb-snit { font-family: var(--font-numeric); font-size: 0.78rem; color: var(--ink-dim); }
        .tb-snit b { color: var(--team-color, var(--ink)); font-weight: var(--w-black); font-size: 0.95rem; }
        .tb-head .pts-cell { width: auto; }
        /* Fast 2-kolonne-grid: navn | felt | «deltog ikke» justeret i bånd (ikke rodet flex-wrap). */
        .player-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.55rem 1.5rem; margin-top: 0.6rem; }
        .player-grid .player-row { display: grid; grid-template-columns: 4.75rem 4.4rem 1fr; align-items: center; gap: 0.45rem; }
        .player-grid .player-row.absent { opacity: 0.55; }
        .player-grid .pname { font-size: 0.85rem; font-weight: var(--w-bold); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .player-grid .absent-toggle { justify-self: end; }
        .player-grid .player-input {
            width: 100%; min-width: 0; font-family: var(--font-numeric); font-size: 0.95rem; text-align: right;
            min-height: 40px; padding: 0.35rem 0.5rem; border: 1.5px solid var(--paper-border); border-radius: 7px;
            background: var(--paper-deep); color: var(--ink); -webkit-appearance: none; appearance: none;
        }
        .player-grid .player-input:focus { outline: none; border-color: var(--ink); }
        .player-grid .player-input:disabled { opacity: 0.5; }
        .absent-toggle {
            font-size: 0.66rem; font-weight: var(--w-bold); background: none; border: 1px solid var(--paper-border);
            border-radius: 999px; padding: 0.2rem 0.5rem; color: var(--ink-muted); cursor: pointer; white-space: nowrap;
        }
        .player-row.absent .absent-toggle { background: color-mix(in oklch, var(--ink-muted) 14%, transparent); color: var(--ink); }
        .absent-toggle[hidden] { display: none; }
        .tb-note { font-size: 0.76rem; color: var(--ink-dim); margin-top: 0.45rem; }
        .tb-empty { font-size: 0.76rem; color: var(--ink-dim); margin-top: 0.5rem; }

        .disc-foot { padding: 0.75rem 1rem; display: flex; align-items: center; gap: 0.6rem; border-top: 1px solid var(--paper-border-soft); }
        .hint { font-size: 0.72rem; color: var(--ink-dim); flex: 1; }
        .btn {
            font-family: var(--font-label); font-weight: var(--w-bold); font-size: 0.9rem;
            min-height: 44px; padding: 0.55rem 1.25rem; border: none; border-radius: 8px; cursor: pointer;
            box-shadow: var(--shadow-low); transition: transform 0.08s, opacity 0.2s;
        }
        .btn:active { transform: scale(0.97); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-lock { background: var(--ok-green); color: oklch(98% 0.01 60); }
        .btn-unlock { background: transparent; color: var(--ink-muted); border: 1.5px solid var(--paper-border); box-shadow: none; }
        .btn-save { background: var(--ink); color: var(--paper-card); }

        .state-msg { padding: 3rem 1.5rem; text-align: center; color: var(--ink-muted); }
        .state-msg.error { color: var(--team-pink); }
        .toast {
            position: fixed; left: 50%; bottom: calc(1.5rem + env(safe-area-inset-bottom)); transform: translateX(-50%) translateY(2rem);
            background: var(--ink); color: var(--paper-card); font-weight: var(--w-bold); font-size: 0.85rem;
            padding: 0.7rem 1.2rem; border-radius: 999px; box-shadow: var(--shadow-medium);
            opacity: 0; pointer-events: none; transition: opacity 0.25s, transform 0.25s; z-index: 50;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast.error { background: var(--team-pink); }
        .head .tabnav { display: flex; align-items: baseline; gap: 1.1rem; margin: 0; }
        .head .tab { text-decoration: none; color: var(--paper-card); }
        .head .tab.active {
            font-family: var(--font-display); font-weight: var(--w-black); font-size: 1.4rem;
            letter-spacing: var(--ls-tight); padding-bottom: 0.12rem; border-bottom: 2px solid var(--paper-card);
        }
        .head .tab:not(.active) {
            font-size: 0.78rem; font-weight: var(--w-bold); letter-spacing: var(--ls-label);
            text-transform: uppercase; opacity: 0.55;
        }
        .head .tab:not(.active)::after { content: " →"; }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="head">
            <nav class="tabnav">
                <a class="tab active" href="host.html">Dommer</a>
                <a class="tab" href="quiz.html">Musikquiz</a>
            </nav>
            <span class="sub">Kongerigernes Kamp</span>
            <span class="conn" id="conn">●</span>
        </div>
        <div id="content"><div class="state-msg">Indlæser…</div></div>
    </div>
    <div id="toast" class="toast"></div>

    <script type="module">
        import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
        import { SUPABASE_URL, SUPABASE_ANON_KEY } from "./config.js";
        import { computePlacements } from "./score.js";

        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const POLL_MS = 5000;
        const contentEl = document.getElementById("content");
        const connEl = document.getElementById("conn");
        const toastEl = document.getElementById("toast");

        // Disciplin-typer — skal matche kaptajn.html, så snit/breakdown udregnes ens i begge ender.
        const PER_PLAYER_KEYS = new Set([2, 3]); // Bowling + Dart — ét felt per spiller, holdets snit
        const ABSENT = "✕";                       // "deltog ikke"-markør i breakdown

        function cssVarSafe(name) { return String(name).replace(/\//g, "").replace(/\s+/g, ""); }
        function esc(s) { return s == null ? "" : String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;"); }
        const hasRaw = (r) => r && r.raw_value !== null && r.raw_value !== undefined;
        const playersOf = (t) => String(t.team_members || "").split(",").map((s) => s.trim()).filter(Boolean);
        // breakdown "Navn: 180 · Bo: ✕" → { Navn: "180", Bo: "✕" }
        function parseBreakdown(str) {
            const out = {};
            if (!str) return out;
            for (const part of String(str).split(" · ")) {
                const i = part.lastIndexOf(": ");
                if (i > -1) out[part.slice(0, i).trim()] = part.slice(i + 2).trim();
            }
            return out;
        }
        let toastTimer;
        function toast(msg, isError = false) {
            clearTimeout(toastTimer);
            toastEl.textContent = msg;
            toastEl.className = "toast show" + (isError ? " error" : "");
            toastTimer = setTimeout(() => { toastEl.className = "toast"; }, 2200);
        }

        let teams = [], disciplines = [], scores = [];
        const openKeys = new Set();   // foldet-ud discipliner (tom ved load → alt lukket, som kaptajn)
        let dirty = false;            // ugemte lokale rettelser → pause poll-re-render

        async function load() {
            const [t, d, s] = await Promise.all([
                supabase.from("DimTeam").select("*").order("team_key"),
                supabase.from("DimDiscipline").select("*").order("discipline_key"),
                supabase.from("FactScore").select("*"),
            ]);
            if (t.error) throw new Error(t.error.message);
            if (d.error) throw new Error(d.error.message);
            if (s.error) throw new Error(s.error.message);
            // Musikquiz (disc 7) scores KUN fra dommer-konsollen (quiz.html, dashboard-030) →
            // udelad den her, så host ikke tilbyder en parallel scoring/lås-vej.
            teams = t.data; disciplines = d.data.filter(x => x.discipline_key !== 7); scores = s.data;
        }

        // ===== Per-spiller-snit (skal matche kaptajn.html readScoreData) =====
        // Læs et holds spiller-felter → { breakdown, value }. value = afrundet snit af de
        // tilstedeværende spillere; fraværende (✕) tæller ikke med.
        function readPerPlayer(block) {
            const parts = [], nums = [];
            for (const r of block.querySelectorAll(".player-row")) {
                const name = r.dataset.pname;
                if (r.classList.contains("absent")) { parts.push(`${name}: ${ABSENT}`); continue; }
                const v = r.querySelector(".player-input").value.trim();
                if (v !== "" && !isNaN(Number(v))) { parts.push(`${name}: ${v}`); nums.push(Number(v)); }
            }
            const value = nums.length ? Math.round(nums.reduce((a, b) => a + b, 0) / nums.length) : null;
            return { breakdown: parts.join(" · "), value };
        }
        function updateSnit(block) {
            const el = block.querySelector(".snit-val");
            if (!el) return;
            const { value } = readPerPlayer(block);
            el.textContent = value != null ? String(value) : "–";
        }

        function render() {
            let html = `<div class="list">`;
            for (const disc of disciplines) {
                const rows = scores.filter((r) => r.discipline_key === disc.discipline_key);
                const enteredCount = rows.filter(hasRaw).length;
                const isLocked = rows.length > 0 && rows.every((r) => r.is_final) && enteredCount > 0;
                const isPP = PER_PLAYER_KEYS.has(disc.discipline_key);
                const isOpen = openKeys.has(disc.discipline_key);
                const placements = computePlacements(rows, disc.sort_direction);

                const body = isPP
                    ? perPlayerBody(disc, rows, placements, isLocked)
                    : tableBody(disc, rows, placements, isLocked);

                const countClass = enteredCount === teams.length ? "count-chip full" : "count-chip";
                const dirHint = disc.sort_direction === "asc" ? "lavest vinder" : "højest vinder";
                const footHint = isLocked ? " · point tæller i totalen"
                    : enteredCount < teams.length ? " · mangler hold før låsning" : " · klar til låsning";

                html += `<div class="disc ${isLocked ? "locked" : ""} ${isOpen ? "open" : ""}" data-disc="${disc.discipline_key}">
                    <div class="disc-top" data-toggle role="button" tabindex="0" aria-expanded="${isOpen}">
                        <h2>${esc(disc.discipline_name)}</h2>
                        ${isLocked ? `<span class="lock-tag">🔒 Låst</span>` : ""}
                        <span class="${countClass}">${enteredCount}/${teams.length}</span>
                        <span class="chevron" aria-hidden="true">▾</span>
                    </div>
                    <div class="disc-body">
                        ${body}
                        <div class="disc-foot">
                            <span class="hint">${esc(disc.discipline_type)} · ${dirHint}${footHint}${isPP ? " · ret enkelt-tal direkte" : ""}</span>
                            ${isLocked
                                ? `<button class="btn btn-unlock" data-action="unlock">Lås op</button>`
                                : `<button class="btn btn-save" data-action="save">Gem rettelser</button>
                                   <button class="btn btn-lock" data-action="lock" ${enteredCount < teams.length ? "disabled" : ""}>Lås disciplin</button>`}
                        </div>
                    </div>
                </div>`;
            }
            html += `</div>`;
            contentEl.innerHTML = html;
            wire();
            dirty = false;
        }

        // Tabel-visning: enkelt-tal-discipliner (creation, cornhole, puslespil, søm, musikquiz).
        // Host retter holdets ene rå-tal direkte — samme som før.
        function tableBody(disc, rows, placements, isLocked) {
            const hasRawRow = (r) => r && r.raw_value !== null && r.raw_value !== undefined;
            const enteredTeams = teams
                .map((tm) => ({ tm, row: rows.find((r) => r.team_key === tm.team_key) }))
                .filter((x) => hasRawRow(x.row))
                .sort((a, b) => (placements.get(a.tm.team_key).rank - placements.get(b.tm.team_key).rank));
            const pendingTeams = teams.filter((tm) => !hasRawRow(rows.find((r) => r.team_key === tm.team_key)));

            let bodyRows = "";
            for (const { tm, row } of enteredTeams) {
                const p = placements.get(tm.team_key);
                const teamVar = `var(--team-${cssVarSafe(tm.team_color)})`;
                bodyRows += `<tr style="--team-color:${teamVar}">
                    <td class="rank-cell">${p.rank}.</td>
                    <td class="team-cell"><span class="team-dot"></span>${esc(tm.team_name)}</td>
                    <td class="raw-cell"><input type="number" step="any" inputmode="decimal"
                        value="${esc(row.raw_value)}" data-score-id="${row.score_id}" ${isLocked ? "disabled" : ""}></td>
                    <td class="pts-cell">${p.points} pt</td>
                    <td class="note-cell">${esc(row.notes ?? "")}</td>
                </tr>`;
            }
            for (const tm of pendingTeams) {
                // Redigerbart felt fra bunden (dashboard-023): host kan oprette et rå-tal for et hold
                // der ikke har et endnu — nødvendigt for creation-myth (stemmer tastes af host), og
                // en backstop for de øvrige enkelt-tal-discipliner. data-team-key i stedet for score-id.
                bodyRows += `<tr class="pending" style="--team-color:var(--team-${cssVarSafe(tm.team_color)})">
                    <td class="rank-cell">–</td>
                    <td class="team-cell"><span class="team-dot"></span>${esc(tm.team_name)}</td>
                    <td class="raw-cell"><input type="number" step="any" inputmode="decimal" placeholder="–" data-team-key="${tm.team_key}" ${isLocked ? "disabled" : ""}></td>
                    <td class="pts-cell">–</td><td class="note-cell"></td></tr>`;
            }
            return `<table>
                <thead><tr><th>#</th><th>Hold</th><th>Resultat</th><th>Point</th><th>Note</th></tr></thead>
                <tbody>${bodyRows}</tbody>
            </table>`;
        }

        // Per-spiller-visning: bowling + dart. Ét felt per spiller + «deltog ikke»-toggle.
        // Holdets snit genberegnes live; ved Gem skrives både snit (raw_value) og breakdown.
        function perPlayerBody(disc, rows, placements, isLocked) {
            const enteredTeams = teams
                .map((tm) => ({ tm, row: rows.find((r) => r.team_key === tm.team_key) }))
                .filter((x) => hasRaw(x.row))
                .sort((a, b) => (placements.get(a.tm.team_key).rank - placements.get(b.tm.team_key).rank));
            const pendingTeams = teams.filter((tm) => !hasRaw(rows.find((r) => r.team_key === tm.team_key)));
            const ordered = [...enteredTeams.map((x) => x.tm), ...pendingTeams];

            let html = "";
            for (const tm of ordered) {
                const row = rows.find((r) => r.team_key === tm.team_key);
                const p = hasRaw(row) ? placements.get(tm.team_key) : null;
                const prev = parseBreakdown(row?.breakdown);
                const teamVar = `var(--team-${cssVarSafe(tm.team_color)})`;

                let playerRows = "";
                for (const name of playersOf(tm)) {
                    const v = prev[name];
                    const absent = v === ABSENT;
                    const val = (v && v !== ABSENT) ? v : "";
                    playerRows += `<div class="player-row${absent ? " absent" : ""}" data-pname="${esc(name)}">
                        <span class="pname">${esc(name)}</span>
                        <input type="number" step="any" inputmode="decimal" class="player-input"
                            value="${esc(val)}" ${isLocked ? "disabled" : ""} ${absent ? "disabled" : ""}>
                        <button class="absent-toggle" type="button" ${isLocked ? "hidden" : ""}>${absent ? "✓ ikke med" : "deltog ikke"}</button>
                    </div>`;
                }

                html += `<div class="team-block" data-team="${tm.team_key}" style="--team-color:${teamVar}">
                    <div class="tb-head">
                        <span class="rank-cell">${p ? p.rank + "." : "–"}</span>
                        <span class="team-cell"><span class="team-dot"></span>${esc(tm.team_name)}</span>
                        <span class="tb-snit">snit <b class="snit-val">${hasRaw(row) ? esc(row.raw_value) : "–"}</b></span>
                        <span class="pts-cell">${p ? p.points + " pt" : ""}</span>
                    </div>
                    <div class="player-grid">${playerRows || `<span class="tb-empty">Ingen spillere registreret på holdet</span>`}</div>
                    ${row?.notes ? `<div class="tb-note">📣 ${esc(row.notes)}</div>` : ""}
                </div>`;
            }
            return html;
        }

        function wire() {
            for (const card of contentEl.querySelectorAll(".disc")) {
                const discKey = Number(card.dataset.disc);
                const isPP = PER_PLAYER_KEYS.has(discKey);

                // Header → fold disciplinen ud/ind.
                const toggle = card.querySelector("[data-toggle]");
                if (toggle) {
                    const flip = () => {
                        if (openKeys.has(discKey)) openKeys.delete(discKey); else openKeys.add(discKey);
                        const open = openKeys.has(discKey);
                        card.classList.toggle("open", open);
                        toggle.setAttribute("aria-expanded", String(open));
                    };
                    toggle.addEventListener("click", flip);
                    toggle.addEventListener("keydown", (e) => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); flip(); } });
                }

                for (const btn of card.querySelectorAll("[data-action]")) {
                    const action = btn.dataset.action;
                    btn.addEventListener("click", () => {
                        if (action === "save") saveEdits(card);
                        else if (action === "lock") lockDiscipline(card);
                        else if (action === "unlock") unlockDiscipline(discKey);
                    });
                }

                if (isPP) {
                    for (const block of card.querySelectorAll(".team-block")) {
                        for (const inp of block.querySelectorAll(".player-input")) {
                            inp.addEventListener("input", () => { updateSnit(block); dirty = true; });
                        }
                        for (const at of block.querySelectorAll(".absent-toggle")) {
                            at.addEventListener("click", () => {
                                const r = at.closest(".player-row");
                                const inp = r.querySelector(".player-input");
                                const nowAbsent = !r.classList.contains("absent");
                                r.classList.toggle("absent", nowAbsent);
                                at.textContent = nowAbsent ? "✓ ikke med" : "deltog ikke";
                                if (inp) { inp.disabled = nowAbsent; if (nowAbsent) inp.value = ""; }
                                updateSnit(block);
                                dirty = true;
                            });
                        }
                    }
                }
            }
        }

        // Skriv ugemte rettelser til Supabase. Per-spiller → upsert snit (raw_value) + breakdown;
        // enkelt-tal → update rå-værdi pr. score_id. Returnerer antal skrevne rækker. Kaster ved fejl.
        async function persistEdits(card) {
            const discKey = Number(card.dataset.disc);
            const isPP = PER_PLAYER_KEYS.has(discKey);
            const writes = [];
            if (isPP) {
                for (const block of card.querySelectorAll(".team-block")) {
                    const tk = Number(block.dataset.team);
                    const { breakdown, value } = readPerPlayer(block);
                    const orig = scores.find((r) => r.team_key === tk && r.discipline_key === discKey);
                    const origRaw = orig && orig.raw_value != null ? Number(orig.raw_value) : null;
                    const origBd = orig?.breakdown ?? "";
                    if (origRaw !== value || origBd !== (breakdown || "")) {
                        writes.push(supabase.from("FactScore").upsert(
                            { team_key: tk, discipline_key: discKey, round_number: 1, raw_value: value, breakdown: breakdown || null },
                            { onConflict: "team_key,discipline_key,round_number" }
                        ));
                    }
                }
            } else {
                for (const inp of card.querySelectorAll(".raw-cell input[data-score-id]")) {
                    const scoreId = Number(inp.dataset.scoreId);
                    const orig = scores.find((r) => r.score_id === scoreId);
                    const newVal = inp.value.trim() === "" ? null : Number(inp.value);
                    if (orig && Number(orig.raw_value) !== newVal) {
                        writes.push(supabase.from("FactScore").update({ raw_value: newVal }).eq("score_id", scoreId));
                    }
                }
                // Nye rækker: hold uden et rå-tal endnu (fx creation-myth-stemmer) → upsert fra bunden.
                for (const inp of card.querySelectorAll(".raw-cell input[data-team-key]")) {
                    const tk = Number(inp.dataset.teamKey);
                    if (inp.value.trim() === "") continue;
                    writes.push(supabase.from("FactScore").upsert(
                        { team_key: tk, discipline_key: discKey, round_number: 1, raw_value: Number(inp.value) },
                        { onConflict: "team_key,discipline_key,round_number" }
                    ));
                }
            }
            if (writes.length === 0) return 0;
            const results = await Promise.all(writes);
            if (results.some((r) => r.error)) { console.error(results); throw new Error("save failed"); }
            return writes.length;
        }

        // Host retter en eller flere værdier (slåfejl-validering).
        async function saveEdits(card) {
            let n;
            try { n = await persistEdits(card); }
            catch { toast("Fejl ved gem", true); return; }
            if (n === 0) { toast("Ingen ændringer"); return; }
            toast(`${n} rettelse(r) gemt`);
            dirty = false;
            await refresh(true);
        }

        // Lås: flush ugemte rettelser → genindlæs → udregn placeringer fra rå-tal → skriv points + is_final.
        async function lockDiscipline(card) {
            const discKey = Number(card.dataset.disc);
            try { await persistEdits(card); }
            catch { toast("Fejl ved gem", true); return; }
            await load(); // lås på den netop-persisterede rå-værdi, ikke stale state
            const disc = disciplines.find((d) => d.discipline_key === discKey);
            const rows = scores.filter((r) => r.discipline_key === discKey && r.raw_value !== null);
            // Guard: alle hold skal have et resultat før låsning — ellers får manglende hold
            // 0 point i totalen (knappen er også disabled, men dette dækker direkte-kald).
            if (rows.length < teams.length) {
                toast(`Alle ${teams.length} hold skal have et resultat før låsning (${rows.length}/${teams.length})`, true);
                dirty = false; render(); return;
            }
            const placements = computePlacements(rows, disc.sort_direction);
            const updates = rows.map((r) => {
                const p = placements.get(r.team_key);
                return supabase.from("FactScore").update({ points: p.points, is_final: true }).eq("score_id", r.score_id);
            });
            const results = await Promise.all(updates);
            if (results.some((r) => r.error)) { toast("Fejl ved låsning", true); console.error(results); return; }
            toast(`${esc(disc.discipline_name)} låst — point tæller nu`);
            dirty = false;
            await refresh(true);
        }

        // Lås op: nulstil is_final + points → grenen bliver provisorisk igen.
        async function unlockDiscipline(discKey) {
            const { error } = await supabase.from("FactScore")
                .update({ is_final: false, points: null }).eq("discipline_key", discKey);
            if (error) { toast("Fejl ved oplåsning", true); return; }
            toast("Disciplin låst op");
            openKeys.add(discKey); // hold den åben så host kan rette med det samme
            dirty = false;
            await refresh(true);
        }

        function focusInsideContent() {
            const a = document.activeElement;
            return a && a.tagName === "INPUT" && contentEl.contains(a);
        }

        async function refresh(force = false) {
            try {
                await load();
                connEl.style.color = "var(--ok-green)";
                // Re-render ikke mens host taster eller har ugemte rettelser (ville smide indtastning).
                if (force || (!focusInsideContent() && !dirty)) render();
            } catch (err) {
                connEl.style.color = "var(--team-pink)";
                if (force) contentEl.innerHTML = `<div class="state-msg error">Fejl: ${esc(err.message)}</div>`;
            }
        }

        contentEl.addEventListener("input", () => { dirty = true; });
        refresh(true);
        setInterval(() => refresh(false), POLL_MS);
    </script>
</body>
</html>
