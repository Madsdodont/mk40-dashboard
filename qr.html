<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mk40 — Holdopstilling (A4 print)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;0,9..144,900&family=JetBrains+Mono:wght@500;700&display=swap">
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            /* Paper-palette delt med kaptajn.html / cards-h.html (canonical brand). */
            --ink-void: oklch(94% 0.012 60);
            --ink-card: oklch(99% 0.005 60);
            --ink-border-soft: oklch(88% 0.012 60);
            --ink-border: oklch(75% 0.012 60);
            --bone: oklch(20% 0.014 30);
            --bone-muted: oklch(40% 0.014 30);
            --bone-dim: oklch(58% 0.012 30);

            /* Ægte bandana-farver (sampled fra foto — reference_mk40_bandana_colors).
               team_key fastholdes fra DimTeam: pink=1, navy=2, grøn=3, gul=4, lilla=5. */
            --team-pink:   oklch(62% 0.22 0);
            --team-navy:   oklch(28% 0.13 260);
            --team-groen:  oklch(52% 0.18 145);
            --team-gul: oklch(82% 0.16 85);
            --team-lilla:  oklch(58% 0.17 295);

            --font-display: "Fraunces", Georgia, serif;
            --font-label: "Segoe UI", system-ui, sans-serif;
            --font-numeric: "JetBrains Mono", ui-monospace, monospace;
            --shadow-low: 0 1px 2px oklch(20% 0.02 30 / 0.08), 0 2px 6px oklch(20% 0.02 30 / 0.06);
            --shadow-paper: 0 4px 14px oklch(20% 0.02 30 / 0.12), 0 18px 50px oklch(20% 0.02 30 / 0.10);
            --w-bold: 700; --w-black: 900; --ls-label: 0.14em; --ls-tight: -0.02em;
        }
        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; }
        body {
            background: var(--ink-void); color: var(--bone);
            font-family: var(--font-label); -webkit-font-smoothing: antialiased;
        }

        /* ---- App-nav (dashboard-029) — kun skærm, aldrig i print (.no-print) ---- */
        .app-nav {
            display: flex; gap: 0.5rem; padding: 0.6rem 1.25rem;
            background: var(--ink-card); border-bottom: 1px solid var(--ink-border-soft);
            font-family: var(--font-label); font-size: 0.72rem; font-weight: var(--w-bold);
            letter-spacing: var(--ls-label); text-transform: uppercase;
        }
        .app-nav a {
            color: var(--bone-muted); text-decoration: none;
            padding: 0.3rem 0.85rem; border-radius: 7px; border: 1px solid transparent;
        }
        .app-nav a.current { color: var(--bone); border-color: var(--ink-border); }
        .app-nav a:hover { color: var(--bone); }

        /* ---- Skærm-kontroller (printes ikke) ---- */
        .controls {
            display: flex; gap: 0.6rem; align-items: center; flex-wrap: wrap;
            max-width: 297mm; margin: 1.25rem auto 0; padding: 0 0.5rem;
        }
        .controls label { font-size: 0.72rem; letter-spacing: var(--ls-label); text-transform: uppercase; font-weight: var(--w-bold); color: var(--bone-dim); }
        .controls input { flex: 1; min-width: 16rem; font-family: var(--font-numeric); font-size: 0.82rem; padding: 0.5rem 0.7rem; border: 1.5px solid var(--ink-border); border-radius: 8px; background: var(--ink-card); color: var(--bone); }
        .controls button { font-family: var(--font-label); font-weight: var(--w-bold); padding: 0.5rem 1.1rem; border: none; border-radius: 8px; background: var(--bone); color: var(--ink-card); cursor: pointer; box-shadow: var(--shadow-low); }
        .controls .hint { font-size: 0.72rem; color: var(--bone-dim); }

        /* ---- A4 landscape-arket ---- */
        .sheet {
            width: 297mm; height: 210mm;
            margin: 1.25rem auto 3rem; padding: 9mm 9mm 8mm;
            background: var(--ink-card); box-shadow: var(--shadow-paper);
            display: flex; flex-direction: column; overflow: hidden;
        }

        .sheet-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; padding-bottom: 4mm; border-bottom: 1.5px solid var(--ink-border-soft); }
        .sheet-head .overline { margin: 0 0 1mm; font-size: 0.7rem; letter-spacing: var(--ls-label); text-transform: uppercase; font-weight: var(--w-bold); color: var(--bone-dim); }
        .sheet-head h1 { font-family: var(--font-display); font-weight: var(--w-black); font-size: 2.5rem; line-height: 0.95; letter-spacing: var(--ls-tight); margin: 0; }
        .sheet-head .sub { margin: 1.5mm 0 0; font-size: 0.9rem; color: var(--bone-muted); }

        .host { display: flex; align-items: center; gap: 2.5mm; text-align: right; }
        .host .host-label { margin: 0; font-size: 0.66rem; letter-spacing: var(--ls-label); text-transform: uppercase; font-weight: var(--w-bold); color: var(--bone-muted); line-height: 1.3; }
        .host .qr-box { padding: 1.5mm; background: #fff; border: 1px solid var(--ink-border-soft); border-radius: 6px; }
        .host .qr-box img, .host .qr-box canvas { display: block; width: 17mm; height: 17mm; }

        /* ---- 5 hold-kolonner, fylder resten af siden ---- */
        .columns { flex: 1; display: flex; gap: 4mm; padding-top: 5mm; min-height: 0; }
        .team {
            flex: 1; min-width: 0; display: flex; flex-direction: column;
            border: 1px solid var(--ink-border-soft); border-radius: 10px; overflow: hidden;
            background: var(--ink-card);
        }
        .team-head { background: var(--team); color: var(--on, #fff); padding: 4mm 3mm 3.5mm; text-align: center; }
        .team-head .team-key { display: block; font-size: 0.62rem; letter-spacing: var(--ls-label); text-transform: uppercase; font-weight: var(--w-bold); opacity: 0.85; margin-bottom: 1mm; }
        .team-head h2 { font-family: var(--font-display); font-weight: var(--w-black); font-size: 1.6rem; line-height: 1; letter-spacing: var(--ls-tight); margin: 0; }

        /* Fast 6-rækkers grid → navne aligner på tværs af kolonner uanset 5 vs 6 medlemmer. */
        .roster { flex: 1; display: grid; grid-template-rows: repeat(6, 1fr); list-style: none; margin: 0; padding: 3mm 2mm; min-height: 0; }
        .roster li { display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 1.02rem; font-weight: 600; text-align: center; line-height: 1.15; color: var(--bone); }
        .roster li.is-captain { font-weight: var(--w-bold); }
        .roster li.is-captain .cap-label { display: block; font-size: 0.6rem; font-weight: var(--w-bold); letter-spacing: var(--ls-label); text-transform: uppercase; color: var(--team); margin-bottom: 0.6mm; }

        .team-qr { padding: 3mm 2mm 3.5mm; border-top: 1px dashed var(--ink-border-soft); text-align: center; }
        .team-qr .qr-box { display: inline-flex; padding: 1.5mm; background: #fff; border-radius: 6px; }
        .team-qr .qr-box img, .team-qr .qr-box canvas { display: block; width: 26mm; height: 26mm; }
        .team-qr .cap { margin: 1.5mm 0 0; font-size: 0.62rem; letter-spacing: var(--ls-label); text-transform: uppercase; font-weight: var(--w-bold); color: var(--team); }

        /* ---- Print: præcis én A4 landscape-side ---- */
        @page { size: A4 landscape; margin: 0; }
        @media print {
            body { background: #fff; }
            .no-print { display: none !important; }
            .sheet { margin: 0; box-shadow: none; width: 297mm; height: 210mm; }
            .team { border-color: #d9d4cc; }
        }
        /* Tving farve-headere + QR-baggrunde med i print (skærm + print). */
        .sheet, .team, .team-head, .qr-box { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    </style>
</head>
<body>
    <nav class="app-nav no-print">
        <a href="./cards-h.html">Scoreboard</a>
        <a href="./qr.html" class="current">Hold</a>
        <a href="./quiz.html">Quiz</a>
    </nav>
    <div class="controls no-print">
        <label for="base">Base-URL</label>
        <input id="base" type="text" spellcheck="false">
        <button onclick="window.print()">Print A4</button>
        <span class="hint">A4 landscape · 1 side · QR'er auto-genereres fra base</span>
    </div>

    <div class="sheet">
        <header class="sheet-head">
            <div class="title">
                <p class="overline">Lørdag 27. juni 2026 · Gunnekær</p>
                <h1>Kongerigernes Kamp</h1>
                <p class="sub">Holdopstilling · fem hold · bandana-farver er kendetegnet</p>
            </div>
            <div class="host">
                <p class="host-label">Dommer<br>Host / Lås</p>
                <div class="qr-box" id="host-qr"></div>
            </div>
        </header>
        <div class="columns" id="columns"></div>
    </div>

    <script>
        // Holdopstilling — låst 2026-06-14. team_key matcher DimTeam (pink=1 … lilla=5).
        // Navne = Mads' guestlist-labels; ingen køn på arket (kun brugt til balancering).
        // Kaptajnen står først i hver members-liste og markeres via captain-feltet.
        const TEAMS = [
            { key: 1, varname: "pink",   color: "Pink",     on: "#fff", captain: "AH",
              members: ["AH", "Johanne", "Theo", "Tim", "Morten A.", "Mira"] },
            { key: 2, varname: "navy",   color: "Mørkeblå", on: "#fff", captain: "Niko",
              members: ["Niko", "Margaux", "Satya", "Jesper", "Dirk", "Rose"] },
            { key: 3, varname: "groen",  color: "Grøn",     on: "#fff", captain: "Anders",
              members: ["Anders", "Mads", "Mikkel", "Julie", "Majbritt"] },
            { key: 4, varname: "gul",    color: "Gul",      on: "oklch(25% 0.03 60)", captain: "Anne",
              members: ["Anne", "Allan", "Christian", "Morten E.", "Ida", "AC"] },
            { key: 5, varname: "lilla",  color: "Lilla",    on: "#fff", captain: "Buggi",
              members: ["Buggi", "Oscar", "Michael", "Kirstine", "Freja"] },
        ];

        const columnsEl = document.getElementById("columns");
        const baseInput = document.getElementById("base");

        function esc(s) { return s == null ? "" : String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }

        // Default-base = den deployede Pages-URL, så koderne resolver selv ved print fra localhost.
        // Overstyr i feltet hvis du flytter projektet.
        const DEPLOYED_BASE = "https://madsdodont.github.io/mk40-dashboard/";
        baseInput.value = DEPLOYED_BASE;

        function render() {
            const base = baseInput.value.trim().replace(/\/?$/, "/");
            columnsEl.innerHTML = "";

            for (const t of TEAMS) {
                const url = `${base}kaptajn.html?team=${t.key}`;
                const sec = document.createElement("section");
                sec.className = "team";
                sec.style.setProperty("--team", `var(--team-${t.varname})`);
                sec.style.setProperty("--on", t.on);
                sec.innerHTML =
                    `<div class="team-head">
                        <span class="team-key">Kongerige</span>
                        <h2>${esc(t.color)}</h2>
                     </div>
                     <ul class="roster">
                        ${t.members.map(m => m === t.captain
                            ? `<li class="is-captain"><span class="cap-label">Kaptajn</span>${esc(m)}</li>`
                            : `<li>${esc(m)}</li>`).join("")}
                     </ul>
                     <div class="team-qr">
                        <div class="qr-box"></div>
                        <p class="cap">Kaptajn · scan</p>
                     </div>`;
                columnsEl.appendChild(sec);
                new QRCode(sec.querySelector(".qr-box"), { text: url, width: 200, height: 200, correctLevel: QRCode.CorrectLevel.M });
            }

            // Host / dommer-kode i headeren.
            const hostBox = document.getElementById("host-qr");
            hostBox.innerHTML = "";
            new QRCode(hostBox, { text: `${base}host.html`, width: 160, height: 160, correctLevel: QRCode.CorrectLevel.M });
        }

        baseInput.addEventListener("change", render);
        render();
    </script>
</body>
</html>
