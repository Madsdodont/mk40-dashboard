<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
    <title>mk40 — Kaptajn</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;0,9..144,900&family=JetBrains+Mono:wght@500;700;800&display=swap">
    <style>
        :root {
            --ink-void: oklch(94% 0.012 60);
            --ink-deep: oklch(97% 0.008 60);
            --ink-card: oklch(99% 0.005 60);
            --ink-elevated: oklch(96% 0.010 60);
            --ink-border-soft: oklch(88% 0.012 60);
            --ink-border: oklch(75% 0.012 60);
            --bone: oklch(20% 0.014 30);
            --bone-muted: oklch(40% 0.014 30);
            --bone-dim: oklch(58% 0.012 30);
            --ok-green: oklch(55% 0.15 150);
            --wait-amber: oklch(60% 0.13 75);
            --signal-error: oklch(55% 0.22 25);
            --team-pink: oklch(58% 0.22 5);
            --team-navy: oklch(42% 0.20 258);
            --team-grøn: oklch(50% 0.18 145);
            --team-gul: oklch(82% 0.16 85);
            --team-lilla: oklch(52% 0.18 295);
            --font-display: "Fraunces", Georgia, serif;
            --font-label: "Segoe UI", system-ui, sans-serif;
            --font-numeric: "JetBrains Mono", ui-monospace, monospace;
            --shadow-low: 0 1px 2px oklch(20% 0.02 30 / 0.08), 0 2px 6px oklch(20% 0.02 30 / 0.06);
            --shadow-medium: 0 2px 4px oklch(20% 0.02 30 / 0.10), 0 8px 24px oklch(20% 0.02 30 / 0.08);
            --w-regular: 600; --w-bold: 700; --w-black: 900;
            --ls-label: 0.12em; --ls-tight: -0.02em;
        }
        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; }
        body {
            background: var(--ink-void); color: var(--bone); font-family: var(--font-label);
            min-height: 100vh; -webkit-font-smoothing: antialiased; -webkit-tap-highlight-color: transparent;
        }
        .wrap { max-width: 540px; margin: 0 auto; padding: 0 0 calc(4rem + env(safe-area-inset-bottom)); }

        /* ===== Team header ===== */
        .team-head {
            position: sticky; top: 0; z-index: 10; background: var(--team-color, var(--bone));
            color: oklch(98% 0.01 60); padding: calc(1.1rem + env(safe-area-inset-top)) 1.25rem 1rem;
            box-shadow: var(--shadow-medium);
        }
        .team-head .kicker { font-size: 0.7rem; letter-spacing: var(--ls-label); text-transform: uppercase; font-weight: var(--w-bold); opacity: 0.85; margin: 0 0 0.15rem; }
        .team-head h1 { font-family: var(--font-display); font-weight: var(--w-black); font-size: 1.6rem; line-height: 1.05; margin: 0; letter-spacing: var(--ls-tight); }
        .team-head .progress { margin-top: 0.6rem; font-size: 0.8rem; font-weight: var(--w-bold); font-family: var(--font-numeric); opacity: 0.92; }

        /* ===== Kaptajn-instruktioner ===== */
        .instructions { margin: 1rem 1rem 0; padding: 0.9rem 1rem; background: var(--ink-card); border: 1px solid var(--ink-border-soft); border-left: 4px solid var(--team-color, var(--ink-border)); border-radius: 10px; box-shadow: var(--shadow-low); }
        .instructions p { margin: 0; font-size: 0.85rem; line-height: 1.4; color: var(--bone-muted); }
        .instructions p + p { margin-top: 0.45rem; }
        .instr-toggle { width: 100%; background: none; border: none; padding: 0; font: inherit; color: inherit; display: flex; align-items: center; gap: 0.5rem; cursor: pointer; text-align: left; }
        .instr-title { flex: 1; margin: 0; font-family: var(--font-display); font-weight: var(--w-bold); font-size: 0.95rem; color: var(--bone); }
        .instr-toggle .chevron { color: var(--bone-dim); font-size: 1rem; transition: transform 0.2s; }
        .instructions.collapsed .instr-toggle .chevron { transform: rotate(-90deg); }
        .instr-body { margin-top: 0.5rem; }
        .instructions.collapsed .instr-body { display: none; }
        .instr-tip { color: var(--bone-dim) !important; }

        /* ===== Discipline cards (accordion) ===== */
        .list { padding: 1rem 1rem 0; display: flex; flex-direction: column; gap: 0.85rem; }
        .disc { background: var(--ink-card); border: 1px solid var(--ink-border-soft); border-radius: 12px; box-shadow: var(--shadow-low); overflow: hidden; }
        .disc-top { width: 100%; text-align: left; background: var(--ink-card); border: none; font: inherit; color: inherit; cursor: pointer; user-select: none; padding: 0.9rem 1rem; display: flex; align-items: center; gap: 0.5rem; }
        .disc-name { flex: 1; min-width: 0; }
        .disc-name h2 { font-family: var(--font-display); font-weight: var(--w-bold); font-size: 1.15rem; margin: 0; line-height: 1.1; }
        .disc-hint { font-size: 0.72rem; color: var(--bone-dim); margin-top: 0.2rem; display: flex; gap: 0.4rem; align-items: center; flex-wrap: wrap; }
        .type-badge { font-size: 0.62rem; letter-spacing: var(--ls-label); text-transform: uppercase; font-weight: var(--w-bold); color: var(--bone-muted); border: 1px solid var(--ink-border-soft); border-radius: 999px; padding: 0.1rem 0.5rem; }
        .disc-summary { font-family: var(--font-numeric); font-weight: var(--w-bold); font-size: 0.9rem; color: var(--team-color, var(--bone-muted)); white-space: nowrap; }
        .status-chip { font-size: 0.7rem; font-weight: var(--w-bold); white-space: nowrap; padding: 0.25rem 0.55rem; border-radius: 999px; }
        .status-chip.missing { background: oklch(92% 0.012 60); color: var(--bone-dim); }
        .status-chip.entered { background: color-mix(in oklch, var(--wait-amber) 18%, transparent); color: var(--wait-amber); }
        .status-chip.locked  { background: color-mix(in oklch, var(--ok-green) 18%, transparent); color: var(--ok-green); }
        .chevron { color: var(--bone-dim); font-size: 1rem; transition: transform 0.2s; }
        .disc.open .chevron { transform: rotate(180deg); }

        .disc-body { padding: 0 1rem 1rem; display: none; }
        .disc.open .disc-body { display: block; }

        input[type="number"], input[type="text"] {
            width: 100%; font-family: var(--font-numeric); font-size: 1rem; min-height: 48px;
            padding: 0.7rem 0.8rem; border: 1.5px solid var(--ink-border); border-radius: 9px;
            background: var(--ink-deep); color: var(--bone); -webkit-appearance: none; appearance: none;
        }
        input[type="text"] { font-family: var(--font-label); font-size: 1rem; }
        input:focus { outline: none; border-color: var(--team-color, var(--bone)); }
        input[readonly], input:disabled { background: var(--ink-elevated); color: var(--bone-muted); border-color: var(--ink-border-soft); }

        /* Score-felter (per-spiller + enkelt-tal) */
        .player-row { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem; }
        .player-row.absent { opacity: 0.55; }
        .player-row .pname { flex: 1; min-width: 0; font-weight: var(--w-bold); font-size: 0.95rem; }
        .player-row .player-input, .player-row .single-input { width: 5rem; min-width: 5rem; flex: none; text-align: right; }
        .player-row .time-min, .player-row .time-sec { width: 3.5rem; min-width: 3.5rem; flex: none; text-align: right; }
        .time-sep { font-weight: var(--w-bold); color: var(--bone-muted); }
        .pencil { background: none; border: none; cursor: pointer; font-size: 1rem; padding: 0 0.2rem; line-height: 1; }
        .absent-toggle { font-size: 0.66rem; font-weight: var(--w-bold); background: none; border: 1px solid var(--ink-border); border-radius: 999px; padding: 0.25rem 0.5rem; color: var(--bone-muted); cursor: pointer; white-space: nowrap; }
        .player-row.absent .absent-toggle { background: color-mix(in oklch, var(--bone-muted) 14%, transparent); color: var(--bone); }
        .absent-toggle[hidden] { display: none; }

        .snit-preview { font-family: var(--font-numeric); font-weight: var(--w-bold); margin: 0.5rem 0 0.7rem; color: var(--team-color, var(--bone)); }
        .id-field { margin-bottom: 0.7rem; }
        .id-label { display: block; font-size: 0.72rem; font-weight: var(--w-bold); color: var(--bone-muted); letter-spacing: 0.02em; margin-bottom: 0.3rem; }
        .id-hint { font-weight: var(--w-regular); color: var(--bone-dim); }
        textarea.id-input { width: 100%; font-family: var(--font-label); font-size: 1rem; line-height: 1.4; min-height: 96px; padding: 0.7rem 0.8rem; border: 1.5px solid var(--ink-border); border-radius: 9px; background: var(--ink-deep); color: var(--bone); resize: vertical; -webkit-appearance: none; appearance: none; }
        textarea.id-input:focus { outline: none; border-color: var(--team-color, var(--bone)); }
        textarea.id-input[readonly] { background: var(--ink-elevated); color: var(--bone-muted); border-color: var(--ink-border-soft); }
        textarea.drama-input { min-height: 52px; }
        .id-scoring { font-size: 0.78rem; line-height: 1.4; color: var(--bone-muted); background: var(--ink-elevated); border-radius: 8px; padding: 0.6rem 0.75rem; margin-bottom: 0.85rem; }
        .id-scoring strong { color: var(--bone); font-weight: var(--w-bold); }
        .hint-line { font-size: 0.72rem; color: var(--bone-dim); margin: 0.5rem 0; }
        .id-foot { display: flex; align-items: center; gap: 0.6rem; margin-top: 0.3rem; }
        .id-foot .dommer-note { flex: 1; font-size: 0.72rem; color: var(--bone-dim); }

        .save-btn { width: 100%; font-family: var(--font-label); font-weight: var(--w-bold); font-size: 1rem; min-height: 48px; padding: 0.7rem 1.25rem; border: none; border-radius: 9px; white-space: nowrap; background: var(--team-color, var(--bone)); color: oklch(98% 0.01 60); box-shadow: var(--shadow-low); cursor: pointer; transition: transform 0.08s, opacity 0.2s; }
        .save-btn:active { transform: scale(0.98); }
        .save-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .save-btn.btn-secondary { background: transparent; color: var(--bone-muted); border: 1.5px solid var(--ink-border); box-shadow: none; width: auto; }

        .locked-result { display: flex; align-items: baseline; gap: 0.6rem; padding: 0.4rem 0; font-family: var(--font-numeric); }
        .locked-result .place { font-size: 1.6rem; font-weight: var(--w-black); color: var(--team-color, var(--bone)); }
        .locked-result .raw { font-size: 0.78rem; color: var(--bone-dim); margin-left: auto; }

        /* Låste individuelle scores (synlige efter lås) */
        .locked-breakdown { margin: 0.5rem 0 0.2rem; border-top: 1px solid var(--ink-border-soft); padding-top: 0.55rem; }
        .locked-breakdown .lb-label { font-size: 0.72rem; font-weight: var(--w-bold); letter-spacing: 0.02em; color: var(--bone-muted); margin: 0 0 0.4rem; }
        .locked-breakdown .player-row { margin-bottom: 0.3rem; }
        .locked-breakdown .locked-val { font-family: var(--font-numeric); font-weight: var(--w-bold); color: var(--bone-muted); margin-left: auto; }
        .locked-breakdown .player-row.absent .locked-val { font-family: var(--font-label); font-weight: var(--w-regular); }

        /* Cap-validering mod umulige scores */
        input.over-cap { border-color: var(--signal-error); }
        .cap-warn { color: var(--signal-error) !important; font-weight: var(--w-bold); }
        .cap-warn[hidden] { display: none; }

        .waiting { font-size: 0.78rem; margin: 0.6rem 0 0; color: var(--ok-green); font-weight: var(--w-bold); }
        .waiting.muted { color: var(--bone-dim); font-weight: var(--w-regular); }

        .state-msg { padding: 3rem 1.5rem; text-align: center; color: var(--bone-muted); }
        .state-msg.error { color: var(--signal-error); }

        .toast { position: fixed; left: 50%; bottom: calc(1.5rem + env(safe-area-inset-bottom)); transform: translateX(-50%) translateY(2rem); background: var(--bone); color: var(--ink-card); font-weight: var(--w-bold); font-size: 0.85rem; padding: 0.7rem 1.2rem; border-radius: 999px; box-shadow: var(--shadow-medium); opacity: 0; pointer-events: none; transition: opacity 0.25s, transform 0.25s; z-index: 50; }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast.error { background: var(--signal-error); }
    </style>
</head>
<body>
    <div class="wrap">
        <div id="content"><div class="state-msg">Indlæser…</div></div>
    </div>
    <div id="toast" class="toast"></div>

    <script type="module">
        import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
        import { SUPABASE_URL, SUPABASE_ANON_KEY } from "./config.js";

        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const POLL_MS = 5000;

        const teamKey = Number(new URLSearchParams(location.search).get("team"));
        const contentEl = document.getElementById("content");
        const toastEl = document.getElementById("toast");

        const PLACE_LABEL = { 10: "1.", 7: "2.", 5: "3.", 3: "4.", 1: "5." };
        const CREATION_KEY = 1;                 // Skabelsesberetningen — identitet (eget flow)
        const PER_PLAYER_KEYS = new Set([2, 3]); // Bowling + Dart — ét felt per spiller, snit
        const TIME_KEYS = new Set([5]);          // Puslespil — min + sek → total sekunder
        // Per-disciplin felt-max: spærrer for umulige scores (per spiller / per holdtal).
        //   Bowling ≤300 (perfekt spil) · Dart ≤180 (tre pile à 60) · Cornhole ≤72 (24 poser × 3 i hul).
        const DISC_MAX = { 2: 300, 3: 180, 4: 72 };
        const capOf = (discKey) => (discKey in DISC_MAX ? DISC_MAX[discKey] : null);
        // Per-disciplin tæl-vejledning: hvordan kaptajnen når frem til tallet de taster.
        const DISC_HOWTO = {
            2: "To runder bowling — tast hver spillers bedste runde (10 frames). Vi tager holdets snit.",
            3: "Hver spiller kaster 3 pile — tast summen af de tre pile pr. spiller. Vi tager holdets snit.",
            4: "24 poser pr. hold (alle kaster mindst 4). 1 point pr. pose på pladen, 3 point pr. pose i hul — tast holdets samlede point.",
            5: "Tast tiden i minutter og sekunder — vi regner den sammen. Hurtigst (laveste) vinder.",
            6: "6 søm — alle hjælpes ad og skiftes til at slå. Tast det samlede antal slag. Færrest vinder.",
            7: "1 point for rigtig kunstner, 1 for rigtig sangtitel, 1 for rigtigt år (pr. sang) — tast holdets samlede point.",
        };
        const ABSENT = "✕";                      // "deltog ikke"-markør i breakdown

        let instrCollapsed = false;
        try { instrCollapsed = localStorage.getItem("mk40_instr_collapsed") === "1"; } catch {}

        function cssVarSafe(name) { return String(name).replace(/\//g, "").replace(/\s+/g, ""); }
        const hasRaw = (r) => r && r.raw_value !== null && r.raw_value !== undefined;
        const playersOf = (t) => String(t.team_members || "").split(",").map((s) => s.trim()).filter(Boolean);
        function esc(s) {
            if (s == null) return "";
            return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
        }
        let toastTimer;
        function toast(msg, isError = false) {
            clearTimeout(toastTimer);
            toastEl.textContent = msg;
            toastEl.className = "toast show" + (isError ? " error" : "");
            toastTimer = setTimeout(() => { toastEl.className = "toast"; }, 2200);
        }

        let allTeams = [], team = null, disciplines = [], allScores = [], myScores = {};
        const openKeys = new Set();   // foldet ud (tom ved load → alt lukket)
        let dirty = false;            // ugemte lokale ændringer → pause poll-re-render

        async function load() {
            const [teamRes, discRes, scoreRes] = await Promise.all([
                supabase.from("DimTeam").select("*").order("team_key"),
                supabase.from("DimDiscipline").select("*").order("discipline_key"),
                supabase.from("FactScore").select("team_key,discipline_key,score_id,raw_value,points,is_final,notes,breakdown"),
            ]);
            if (teamRes.error) throw new Error(teamRes.error.message);
            if (discRes.error) throw new Error(discRes.error.message);
            if (scoreRes.error) throw new Error(scoreRes.error.message);
            allTeams = teamRes.data;
            team = allTeams.find((t) => t.team_key === teamKey);
            if (!team) throw new Error(`Hold ${teamKey} findes ikke`);
            disciplines = discRes.data;
            allScores = scoreRes.data;
            myScores = {};
            for (const r of allScores) if (r.team_key === teamKey) myScores[r.discipline_key] = r;
        }

        // Antal hold der har LÅST en disciplin (raw_value sat).
        function enteredCountFor(discKey) {
            const seen = new Set();
            for (const r of allScores) if (r.discipline_key === discKey && hasRaw(r)) seen.add(r.team_key);
            return seen.size;
        }

        // breakdown "Navn: 180 · Bo: ✕" → { Navn: "180", Bo: "✕" }; enkelt-tal → { __single: "21" }.
        function parseBreakdown(str, isPP) {
            const out = {};
            if (!str) return out;
            if (!isPP) { out.__single = String(str).trim(); return out; }
            for (const part of String(str).split(" · ")) {
                const i = part.lastIndexOf(": ");
                if (i > -1) out[part.slice(0, i).trim()] = part.slice(i + 2).trim();
            }
            return out;
        }

        function render() {
            const teamVar = `var(--team-${cssVarSafe(team.team_color)})`;
            const doneCount = disciplines.filter((d) =>
                d.discipline_key === CREATION_KEY ? !!team.team_creation : hasRaw(myScores[d.discipline_key])
            ).length;

            let html = `<div class="team-head" style="--team-color:${teamVar}">
                <p class="kicker">Kaptajn · Kongerigernes Kamp</p>
                <h1>${esc(team.team_name)}</h1>
                <div class="progress">${doneCount} / ${disciplines.length} discipliner klar</div>
            </div>
            <div class="instructions ${instrCollapsed ? "collapsed" : ""}" style="--team-color:${teamVar}">
                <button class="instr-toggle" type="button" data-instr-toggle aria-expanded="${!instrCollapsed}">
                    <span class="instr-title">Sådan gør du som kaptajn</span>
                    <span class="chevron" aria-hidden="true">▾</span>
                </button>
                <div class="instr-body">
                    <p>Når en disciplin er færdigspillet, taster du <strong>jeres holds resultat</strong>: gem først, og lås når tallene er endelige. Dommeren låser disciplinen når alle ${allTeams.length} hold har låst — så omregnes til point og vises på storskærmen.</p>
                    <p>Har I ved et uheld låst en disciplin, eller tastet forkert? Sig til <strong>dommeren eller Mathias</strong> — de kan rette scoren.</p>
                    <p class="instr-tip">💡 Skriv en note med lidt drama — den fodrer AI-kommentaren på storskærmen.</p>
                </div>
            </div>
            <div class="list">`;

            for (const d of disciplines) {
                const row = myScores[d.discipline_key];
                const isPP = PER_PLAYER_KEYS.has(d.discipline_key);
                const isOpen = openKeys.has(d.discipline_key);
                const entered = enteredCountFor(d.discipline_key);
                let chip, summary, body, dir;

                if (d.discipline_key === CREATION_KEY) {
                    dir = "Udfyld jeres identitet";
                    const filled = !!team.team_creation;
                    chip = filled ? `<span class="status-chip locked">✅ Udfyldt</span>` : `<span class="status-chip missing">⬜ Mangler</span>`;
                    summary = filled ? `<span class="disc-summary">${esc(team.team_short || team.team_name)}</span>` : ``;
                    body = identityBody(team);
                } else if (row && row.is_final) {
                    // Dommer har låst disciplinen → vis placering.
                    dir = isPP ? (d.sort_direction === "asc" ? "Laveste snit vinder" : "Højeste snit vinder") : (d.sort_direction === "asc" ? "Lavest vinder" : "Højest vinder");
                    const place = PLACE_LABEL[row.points] ?? "–";
                    chip = `<span class="status-chip locked">🔒 Låst</span>`;
                    summary = `<span class="disc-summary">${place} plads · ${row.points ?? "–"} pt</span>`;
                    body = `<div class="locked-result">
                        <span class="place">${place} plads</span>
                        <span class="raw">${row.points ?? "–"} point · dit resultat ${row.raw_value != null ? dispValue(d, row.raw_value) : "–"}</span>
                    </div>`;
                } else {
                    dir = isPP ? (d.sort_direction === "asc" ? "Laveste snit vinder" : "Højeste snit vinder") : (d.sort_direction === "asc" ? "Lavest vinder" : "Højest vinder");
                    const locked = hasRaw(row);
                    const draft = !locked && !!row?.breakdown;
                    chip = locked ? `<span class="status-chip locked">🔒 Låst</span>`
                         : draft ? `<span class="status-chip entered">✏️ Kladde</span>`
                         : `<span class="status-chip missing">⬜ Mangler</span>`;
                    summary = locked ? `<span class="disc-summary">${isPP ? "snit " : ""}${dispValue(d, row.raw_value)}</span>` : ``;
                    body = scoreCard(d, row, isPP, entered, allTeams.length);
                }

                html += `<div class="disc ${isOpen ? "open" : ""}" style="--team-color:${teamVar}" data-disc="${d.discipline_key}">
                    <div class="disc-top" role="button" tabindex="0" data-toggle aria-expanded="${isOpen}">
                        <div class="disc-name">
                            <h2>${esc(d.discipline_name)}</h2>
                            <div class="disc-hint"><span class="type-badge">${esc(d.discipline_type)}</span><span>${dir}</span></div>
                        </div>
                        ${summary}
                        ${chip}
                        <span class="chevron" aria-hidden="true">▾</span>
                    </div>
                    <div class="disc-body">${body}</div>
                </div>`;
            }
            html += `</div>`;
            contentEl.innerHTML = html;
            wireInputs();
            dirty = false;
        }

        // ===== Skabelsesberetningen (identitet) =====
        function identityBody(t) {
            return `<div class="id-scoring">🏆 <strong>Sådan gives point:</strong> aftenens gæster stemmer på den bedste skabelsesberetning. Holdet med flest stemmer får <strong>10 point</strong> (1. plads), derefter 7 / 5 / 3 / 1. Dommeren tæller stemmerne og låser.</div>
                <div class="id-field">
                    <label class="id-label">Kongerige-navn</label>
                    <input type="text" class="id-input id-name" maxlength="40" placeholder="Jeres kongeriges navn" value="${esc(t.team_name ?? "")}">
                </div>
                <div class="id-field">
                    <label class="id-label">Kælenavn <span class="id-hint">— kort navn til tavlen</span></label>
                    <input type="text" class="id-input id-short" maxlength="14" placeholder="fx Pink" value="${esc(t.team_short ?? "")}">
                </div>
                <div class="id-field">
                    <label class="id-label">Motto <span class="id-hint">— kort slogan på storskærmen</span></label>
                    <input type="text" class="id-input id-motto" maxlength="60" placeholder="Jeres kongeriges motto" value="${esc(t.team_motto ?? "")}">
                </div>
                <div class="id-field">
                    <label class="id-label">Skabelsesberetningen <span class="id-hint">— jeres kongeriges historie</span></label>
                    <textarea class="id-input id-creation" rows="4" placeholder="Fortæl hvordan jeres kongerige blev til…">${esc(t.team_creation ?? "")}</textarea>
                </div>
                <div class="id-foot">
                    <span class="dommer-note">Dommeren styrer afstemningen — I udfylder bare jeres identitet.</span>
                    <button class="save-btn id-save" type="button">Gem</button>
                </div>`;
        }
        async function saveIdentity(card, btn) {
            const payload = {
                team_name: card.querySelector(".id-name").value.trim() || team.team_name,
                team_short: card.querySelector(".id-short").value.trim() || null,
                team_motto: card.querySelector(".id-motto").value.trim() || null,
                team_creation: card.querySelector(".id-creation").value.trim() || null,
            };
            btn.disabled = true;
            const { error } = await supabase.from("DimTeam").update(payload).eq("team_key", teamKey);
            if (error) { btn.disabled = false; toast("Kunne ikke gemme — prøv igen", true); console.error(error); return; }
            toast("Jeres identitet er gemt");
            openKeys.add(CREATION_KEY);
            await refresh(true);
        }

        // ===== Score-discipliner (per-spiller + enkelt-tal), fælles model =====
        function scoringNote(d, isPP) {
            const win = d.sort_direction === "asc" ? (isPP ? "laveste snit" : "laveste") : (isPP ? "højeste snit" : "højeste");
            return isPP
                ? `🏆 <strong>Sådan gives point:</strong> tast hver spillers resultat — vi tager <strong>holdets snit</strong> (så 5 og 6 spillere kan sammenlignes), rangerer holdene (${win} vinder) og giver 10 / 7 / 5 / 3 / 1.`
                : `🏆 <strong>Sådan gives point:</strong> holdet med ${win} resultat får <strong>10 point</strong> (1. plads), derefter 7 / 5 / 3 / 1 efter placering.`;
        }
        function fmtTime(total) { const m = Math.floor(total / 60), s = Math.abs(total % 60); return `${m}:${String(s).padStart(2, "0")}`; }
        function dispValue(d, raw) { return TIME_KEYS.has(d.discipline_key) ? fmtTime(Number(raw)) : esc(raw); }
        // Read-only visning af de individuelle scores kaptajnen tastede — bevares efter lås (per-spiller-discipliner).
        function lockedBreakdown(d, row) {
            const prev = parseBreakdown(row?.breakdown, true);
            const rows = playersOf(team).map((name) => {
                const v = prev[name];
                const absent = v === ABSENT;
                return `<div class="player-row${absent ? " absent" : ""}">
                        <span class="pname">${esc(name)}</span>
                        <span class="locked-val">${absent ? "deltog ikke" : esc(v ?? "–")}</span>
                    </div>`;
            }).join("");
            return `<div class="locked-breakdown"><p class="lb-label">Jeres scores</p>${rows}</div>`;
        }
        function scoreCard(d, row, isPP, entered, total) {
            const drama = row?.notes ?? "";
            const isTime = TIME_KEYS.has(d.discipline_key);
            // LÅST (kaptajnen har sendt) → endeligt sammendrag.
            if (hasRaw(row)) {
                return `<div class="locked-result">
                        <span class="place">${isPP ? "Snit " : ""}${dispValue(d, row.raw_value)}</span>
                        <span class="raw">🔒 låst — venter på dommeren</span>
                    </div>
                    ${isPP ? lockedBreakdown(d, row) : ``}
                    ${drama ? `<p class="waiting muted">📣 ${esc(drama)}</p>` : ``}
                    <p class="hint-line">Låst. Ved fejl retter dommeren eller Mathias scoren.</p>`;
            }
            const isDraft = !!row?.breakdown;   // gemt kladde → review m. blyanter
            const prev = parseBreakdown(row?.breakdown, isPP);
            const cap = capOf(d.discipline_key);
            const capAttr = cap != null ? `min="0" max="${cap}"` : `min="0"`;   // spær umulige scores
            let fields, snitLine = "";
            if (isPP) {
                const players = playersOf(team);
                fields = players.map((name) => {
                    const v = prev[name];
                    const absent = v === ABSENT;
                    const val = (v && v !== ABSENT) ? v : "";
                    return `<div class="player-row${absent ? " absent" : ""}" data-pname="${esc(name)}">
                        ${isDraft ? `<button class="pencil" type="button" title="Ret">✏️</button>` : ``}
                        <span class="pname">${esc(name)}</span>
                        <input type="number" inputmode="decimal" step="any" ${capAttr} class="player-input" data-player="${esc(name)}" placeholder="–" value="${esc(val)}" ${isDraft ? "readonly" : ""} ${absent ? "disabled" : ""}>
                        <button class="absent-toggle" type="button" ${isDraft ? "hidden" : ""}>${absent ? "✓ ikke med" : "deltog ikke"}</button>
                    </div>`;
                }).join("");
                snitLine = `<p class="snit-preview">Holdets snit: <span class="snit-val">–</span></p>`;
            } else if (isTime) {
                const tot = prev.__single ? Number(prev.__single) : null;
                const mv = tot != null ? Math.floor(tot / 60) : "";
                const sv = tot != null ? tot % 60 : "";
                fields = `<div class="player-row" data-time>
                        ${isDraft ? `<button class="pencil" type="button" title="Ret">✏️</button>` : ``}
                        <span class="pname">Tid</span>
                        <input type="number" inputmode="numeric" min="0" class="time-min" placeholder="min" value="${esc(mv)}" ${isDraft ? "readonly" : ""}>
                        <span class="time-sep">:</span>
                        <input type="number" inputmode="numeric" min="0" max="59" class="time-sec" placeholder="sek" value="${esc(sv)}" ${isDraft ? "readonly" : ""}>
                    </div>`;
            } else {
                const v = prev.__single ?? "";
                fields = `<div class="player-row" data-single>
                        ${isDraft ? `<button class="pencil" type="button" title="Ret">✏️</button>` : ``}
                        <span class="pname">Holdets resultat</span>
                        <input type="number" inputmode="decimal" step="any" ${capAttr} class="single-input" placeholder="–" value="${esc(v)}" ${isDraft ? "readonly" : ""}>
                    </div>`;
            }
            const btnLabel = isDraft ? "Lås scores" : "Gem scores";
            const btnMode = isDraft ? "lock" : "draft";
            const hint = isDraft
                ? "Tjek scorerne. Klik en blyant for at rette. Lås når alt er rigtigt — så fyrer kommentaren én gang."
                : (isPP ? "Udfyld alle felter (eller markér «deltog ikke»). Så kan I gemme." : "Udfyld resultatet. Så kan I gemme.");
            return `<div class="id-scoring">${scoringNote(d, isPP)}</div>
                ${DISC_HOWTO[d.discipline_key] ? `<p class="hint-line">📋 ${DISC_HOWTO[d.discipline_key]}</p>` : ``}
                ${fields}
                ${snitLine}
                <p class="hint-line cap-warn" hidden></p>
                <div class="id-field">
                    <label class="id-label">Drama til storskærmen <span class="id-hint">— fodrer AI-kommentaren</span></label>
                    <textarea class="id-input drama-input" rows="2" maxlength="140" placeholder="fx 'Bo lukkede med en strike-serie!'" ${isDraft ? "readonly" : ""}>${esc(drama)}</textarea>
                </div>
                <p class="hint-line">${hint}</p>
                <button class="save-btn score-btn" type="button" data-mode="${btnMode}">${btnLabel}</button>
                <p class="waiting muted">${entered}/${total} hold har låst denne disciplin</p>`;
        }

        // Læs score-felterne → { breakdown, value, ready }.
        function readScoreData(card) {
            // TIME (puslespil): min + sek → total sekunder.
            const tm = card.querySelector(".time-min");
            if (tm) {
                const m = tm.value.trim(), s = card.querySelector(".time-sec").value.trim();
                const ok = (m !== "" || s !== "") && !isNaN(Number(m || 0)) && !isNaN(Number(s || 0));
                const total = (Number(m || 0) * 60) + Number(s || 0);
                return { breakdown: String(total), value: ok ? total : null, ready: ok };
            }
            // SINGLE (enkelt holdtal).
            const si = card.querySelector(".single-input");
            if (si) {
                const v = si.value.trim();
                return { breakdown: v, value: v === "" ? null : Number(v), ready: v !== "" && !isNaN(Number(v)) };
            }
            // PER-PLAYER (snit).
            const parts = [], nums = [];
            let allSet = true;
            for (const r of card.querySelectorAll(".player-row")) {
                const name = r.dataset.pname;
                if (r.classList.contains("absent")) { parts.push(`${name}: ${ABSENT}`); continue; }
                const v = r.querySelector(".player-input").value.trim();
                if (v !== "" && !isNaN(Number(v))) { parts.push(`${name}: ${v}`); nums.push(Number(v)); }
                else { allSet = false; }
            }
            const value = nums.length ? Math.round(nums.reduce((a, b) => a + b, 0) / nums.length) : null;
            return { breakdown: parts.join(" · "), value, ready: allSet && nums.length > 0 };
        }
        function updateSnit(card) {
            const el = card.querySelector(".snit-val");
            if (!el) return;
            const nums = [...card.querySelectorAll(".player-row")]
                .filter((r) => !r.classList.contains("absent"))
                .map((r) => r.querySelector(".player-input"))
                .filter((i) => i && i.value.trim() !== "" && !isNaN(Number(i.value)))
                .map((i) => Number(i.value));
            el.textContent = nums.length ? String(Math.round(nums.reduce((a, b) => a + b, 0) / nums.length)) : "–";
        }
        // Cap-tjek: markér felter over per-disciplin-max, returnér antal overtrædelser.
        function applyCaps(card) {
            const cap = capOf(Number(card.dataset.disc));
            const warn = card.querySelector(".cap-warn");
            let over = 0;
            for (const inp of card.querySelectorAll(".player-input, .single-input")) {
                const r = inp.closest(".player-row");
                const skip = r && r.classList.contains("absent");
                const v = inp.value.trim();
                const bad = !skip && cap != null && v !== "" && !isNaN(Number(v)) && Number(v) > cap;
                inp.classList.toggle("over-cap", bad);
                if (bad) over++;
            }
            if (warn) {
                if (over && cap != null) { warn.textContent = `Højeste mulige score er ${cap} — ret feltet.`; warn.hidden = false; }
                else { warn.hidden = true; }
            }
            return over;
        }
        // Aktivér «Gem» kun når alt er udfyldt/markeret OG ingen score over cap (kun i draft-mode).
        function validateScoreCard(card, isPP) {
            const over = applyCaps(card);
            const btn = card.querySelector(".score-btn");
            if (!btn || btn.dataset.mode !== "draft") return;
            const { ready } = readScoreData(card);
            btn.disabled = !ready || over > 0;
        }
        // Pencil/drama-edit i review → knap tilbage til «Gem scores».
        function setDraftMode(card) {
            const btn = card.querySelector(".score-btn");
            if (!btn) return;
            btn.dataset.mode = "draft";
            btn.textContent = "Gem scores";
        }

        async function saveDraft(card, discKey, isPP, btn) {
            if (applyCaps(card) > 0) { toast(`Score over max (${capOf(discKey)}) — ret før du gemmer`, true); return; }
            const { breakdown } = readScoreData(card);
            const drama = (card.querySelector(".drama-input")?.value || "").trim() || null;
            btn.disabled = true;
            const { error } = await supabase.from("FactScore").upsert(
                { team_key: teamKey, discipline_key: discKey, round_number: 1, raw_value: null, breakdown: breakdown || null, notes: drama },
                { onConflict: "team_key,discipline_key,round_number" }
            );
            if (error) { btn.disabled = false; toast("Kunne ikke gemme — prøv igen", true); console.error(error); return; }
            toast("Scores gemt — ikke låst endnu");
            openKeys.add(discKey);
            await refresh(true);
        }
        async function lockScores(card, discKey, isPP, btn) {
            if (applyCaps(card) > 0) { toast(`Score over max (${capOf(discKey)}) — ret før du låser`, true); return; }
            const { breakdown, value, ready } = readScoreData(card);
            if (!ready || value === null) { toast("Udfyld alle felter før du låser", true); return; }
            const drama = (card.querySelector(".drama-input")?.value || "").trim() || null;
            btn.disabled = true;
            // raw_value = snit (per-spiller) / resultat (enkelt) → rangeres + fyrer callout én gang.
            const { error } = await supabase.from("FactScore").upsert(
                { team_key: teamKey, discipline_key: discKey, round_number: 1, raw_value: value, breakdown, notes: drama },
                { onConflict: "team_key,discipline_key,round_number" }
            );
            if (error) { btn.disabled = false; toast("Kunne ikke låse — prøv igen", true); console.error(error); return; }
            toast(isPP ? `Holdets snit låst: ${value}` : `Resultat låst: ${value}`);
            openKeys.add(discKey);
            await refresh(true);
        }

        function wireInputs() {
            const instrToggle = contentEl.querySelector("[data-instr-toggle]");
            if (instrToggle) instrToggle.addEventListener("click", () => {
                instrCollapsed = !instrCollapsed;
                try { localStorage.setItem("mk40_instr_collapsed", instrCollapsed ? "1" : "0"); } catch {}
                instrToggle.closest(".instructions").classList.toggle("collapsed", instrCollapsed);
                instrToggle.setAttribute("aria-expanded", String(!instrCollapsed));
            });

            for (const card of contentEl.querySelectorAll(".disc")) {
                const discKey = Number(card.dataset.disc);
                const isPP = PER_PLAYER_KEYS.has(discKey);

                const toggle = card.querySelector("[data-toggle]");
                if (toggle) {
                    const flip = () => {
                        if (openKeys.has(discKey)) openKeys.delete(discKey); else openKeys.add(discKey);
                        const open = openKeys.has(discKey);
                        card.classList.toggle("open", open);
                        toggle.setAttribute("aria-expanded", String(open));
                    };
                    toggle.addEventListener("click", flip);
                    toggle.addEventListener("keydown", (e) => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); flip(); } });
                }

                if (discKey === CREATION_KEY) {
                    const b = card.querySelector(".id-save");
                    if (b) b.addEventListener("click", () => saveIdentity(card, b));
                    continue;
                }

                const scoreBtn = card.querySelector(".score-btn");
                if (scoreBtn) scoreBtn.addEventListener("click", () => {
                    if (scoreBtn.dataset.mode === "lock") lockScores(card, discKey, isPP, scoreBtn);
                    else saveDraft(card, discKey, isPP, scoreBtn);
                });

                // Score-felter: live snit + validering.
                for (const inp of card.querySelectorAll(".player-input, .single-input, .time-min, .time-sec")) {
                    inp.addEventListener("input", () => { if (isPP) updateSnit(card); validateScoreCard(card, isPP); });
                }
                // Blyant → gør feltet redigerbart igen + knap til «Gem».
                for (const pen of card.querySelectorAll(".pencil")) {
                    pen.addEventListener("click", () => {
                        const r = pen.closest(".player-row");
                        const inputs = [...r.querySelectorAll("input")];
                        for (const i of inputs) { i.readOnly = false; i.disabled = false; }
                        r.classList.remove("absent");
                        const at = r.querySelector(".absent-toggle");
                        if (at) { at.hidden = false; at.textContent = "deltog ikke"; }
                        pen.remove();
                        setDraftMode(card);
                        dirty = true;
                        if (inputs[0]) inputs[0].focus();
                        if (isPP) updateSnit(card);
                        validateScoreCard(card, isPP);
                    });
                }
                // «Deltog ikke»-toggle.
                for (const at of card.querySelectorAll(".absent-toggle")) {
                    at.addEventListener("click", () => {
                        const r = at.closest(".player-row");
                        const inp = r.querySelector(".player-input");
                        const nowAbsent = !r.classList.contains("absent");
                        r.classList.toggle("absent", nowAbsent);
                        at.textContent = nowAbsent ? "✓ ikke med" : "deltog ikke";
                        if (inp) { inp.disabled = nowAbsent; if (nowAbsent) inp.value = ""; }
                        if (scoreBtn?.dataset.mode === "lock") setDraftMode(card);
                        dirty = true;
                        if (isPP) updateSnit(card);
                        validateScoreCard(card, isPP);
                    });
                }
                // Drama-edit i review → tilbage til «Gem».
                const drama = card.querySelector(".drama-input");
                if (drama) drama.addEventListener("input", () => { if (scoreBtn?.dataset.mode === "lock") setDraftMode(card); });

                if (isPP) updateSnit(card);
                validateScoreCard(card, isPP);
            }
        }

        function focusInsideContent() {
            const a = document.activeElement;
            return a && (a.tagName === "INPUT" || a.tagName === "TEXTAREA") && contentEl.contains(a);
        }

        async function refresh(force = false) {
            try {
                await load();
                if (force || (!focusInsideContent() && !dirty)) render();
            } catch (err) {
                if (force) contentEl.innerHTML = `<div class="state-msg error">Fejl: ${esc(err.message)}</div>`;
            }
        }

        async function init() {
            if (!teamKey) {
                contentEl.innerHTML = `<div class="state-msg error">Mangler ?team=N i URL'en.<br>Scan dit holds QR-kode.</div>`;
                return;
            }
            contentEl.addEventListener("input", () => { dirty = true; });
            await refresh(true);
            setInterval(() => refresh(false), POLL_MS);
        }

        init();
    </script>
</body>
</html>
