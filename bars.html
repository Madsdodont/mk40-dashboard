<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mk40 — Bars prototype</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700;9..144,900&family=Inter:wght@500;600;700&family=JetBrains+Mono:wght@600;700;800&display=swap">
    <style>
        :root {
            --ink-deep:        oklch(13% 0.012 30);
            --ink-elevated:    oklch(20% 0.018 30);
            --bone:            oklch(95% 0.008 60);
            --bone-muted:      oklch(68% 0.012 60);
            --gold-ceremonial: oklch(78% 0.16 85);
            --team-pink:        oklch(55% 0.22 25);
            --team-navy:        oklch(48% 0.20 245);
            --team-grøn:       oklch(50% 0.15 145);
            --team-gul:        oklch(80% 0.16 90);
            --team-lilla:   oklch(60% 0.005 60);
            --font-display:    "Fraunces", Georgia, serif;
            --font-label:      "Inter", system-ui, sans-serif;
            --font-numeric:    "JetBrains Mono", ui-monospace, monospace;
        }
        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; }
        body {
            background: var(--ink-deep); color: var(--bone);
            font-family: var(--font-label); min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            display: flex; flex-direction: column;
        }

        .proto-nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 10;
            background: oklch(10% 0.01 30 / 0.85); backdrop-filter: blur(8px);
            padding: 0.5rem 1.5rem; display: flex; gap: 0.5rem;
            font-family: var(--font-label); font-size: 0.75rem;
            font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
        }
        .proto-nav a {
            color: var(--bone-muted); text-decoration: none; padding: 0.25rem 0.75rem;
            border: 1px solid transparent;
        }
        .proto-nav a.current { color: var(--gold-ceremonial); border-color: var(--gold-ceremonial); }
        .proto-nav a:hover { color: var(--bone); }

        header {
            padding: 3.5rem 3rem 1.5rem 3rem;
            display: flex; justify-content: space-between; align-items: flex-end;
            gap: 2rem; flex-wrap: wrap;
        }
        header h1 {
            margin: 0; font-family: var(--font-display);
            font-size: clamp(2.25rem, 4.5vw, 3.5rem);
            font-weight: 700; line-height: 1.0; letter-spacing: -0.02em;
            color: var(--bone);
        }
        header .meta {
            color: var(--bone-muted); font-size: 0.8125rem; font-weight: 500;
            letter-spacing: 0.1em; text-transform: uppercase;
            font-variant-numeric: tabular-nums; text-align: right;
        }

        main {
            flex: 1;
            padding: 0 3rem 2rem 3rem;
            display: flex; flex-direction: column;
        }

        /* Discipline-legend strip */
        .disc-legend {
            display: flex; gap: 1.5rem; justify-content: center;
            padding: 0.5rem 0 1.5rem 0;
            font-family: var(--font-label); font-size: 0.75rem;
            font-weight: 600; letter-spacing: 0.12em;
            color: var(--bone-muted); text-transform: uppercase;
            flex-wrap: wrap;
        }
        .disc-legend .item { display: flex; align-items: center; gap: 0.5rem; }
        .disc-legend .swatch {
            width: 14px; height: 14px; display: inline-block;
            background: var(--bone-muted); opacity: 0.5;
        }
        .disc-legend .item:nth-child(1) .swatch { opacity: 1.0; }
        .disc-legend .item:nth-child(2) .swatch { opacity: 0.78; }
        .disc-legend .item:nth-child(3) .swatch { opacity: 0.56; }
        .disc-legend .item:nth-child(4) .swatch { opacity: 0.36; }
        .disc-legend .item:nth-child(5) .swatch { opacity: 0.20; }

        .bars-container {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 1.5rem;
            align-items: end;
            max-width: 1800px;
            margin: 0 auto;
            width: 100%;
        }

        .team-column {
            display: flex; flex-direction: column; align-items: stretch;
            height: 100%;
            min-height: 60vh;
        }

        .team-column .name {
            font-family: var(--font-display);
            font-size: clamp(1rem, 1.3vw, 1.375rem);
            font-weight: 700; line-height: 1.05;
            color: var(--bone); margin-bottom: 0.5rem;
            min-height: 2.5em;
        }
        .team-column .total {
            font-family: var(--font-numeric);
            font-size: clamp(2.5rem, 4vw, 4rem);
            font-weight: 800; line-height: 1.0;
            color: var(--bone);
            font-variant-numeric: tabular-nums;
            margin-bottom: 0.5rem;
        }
        .team-column.leader .total { color: var(--gold-ceremonial); }

        .team-column .total-label {
            font-family: var(--font-label); font-size: 0.6875rem;
            font-weight: 600; letter-spacing: 0.15em;
            color: var(--bone-muted); text-transform: uppercase;
            margin-bottom: 1rem;
        }

        .bar {
            flex: 1;
            display: flex; flex-direction: column-reverse;
            background: oklch(18% 0.012 30);
            position: relative;
            border-bottom: 4px solid var(--team-color);
        }
        .team-column.leader .bar { border-bottom-color: var(--gold-ceremonial); }
        .team-column.leader .bar::after {
            content: ""; position: absolute; inset: -3px; border: 2px solid var(--gold-ceremonial);
            pointer-events: none;
        }

        .segment {
            background: var(--team-color);
            position: relative;
        }
        .segment[data-rank="1"] { opacity: 1.0; }
        .segment[data-rank="2"] { opacity: 0.78; }
        .segment[data-rank="3"] { opacity: 0.56; }
        .segment[data-rank="4"] { opacity: 0.36; }
        .segment[data-rank="5"] { opacity: 0.20; }

        .segment .seg-label {
            position: absolute; left: 0.5rem; right: 0.5rem; top: 50%;
            transform: translateY(-50%);
            font-family: var(--font-numeric); font-weight: 700;
            font-size: 0.75rem; color: var(--ink-deep);
            text-align: center;
            font-variant-numeric: tabular-nums;
            mix-blend-mode: difference;
            filter: invert(1);
            opacity: 0.85;
        }
        .segment.tiny .seg-label { display: none; }

        @media (max-width: 900px) {
            header { padding: 3rem 1.25rem 1rem 1.25rem; }
            header h1 { font-size: 1.75rem; }
            main { padding: 0 1.25rem 1.25rem 1.25rem; }
            .bars-container { gap: 0.5rem; }
            .team-column .name { font-size: 0.75rem; min-height: 2.2em; }
            .team-column .total { font-size: 1.5rem; }
            .team-column .total-label { font-size: 0.5625rem; margin-bottom: 0.5rem; }
            .segment .seg-label { font-size: 0.625rem; }
        }

        .state-message {
            grid-column: 1/-1;
            text-align: center; padding: 4rem 2rem; color: var(--bone-muted);
            font-family: var(--font-label); letter-spacing: 0.1em;
            text-transform: uppercase;
        }
        .state-message.error { color: var(--team-pink); }
    </style>
</head>
<body>
    <nav class="proto-nav">
        <a href="./">Table (boring)</a>
        <a href="./cards.html">A · Cards</a>
        <a href="./bars.html" class="current">B · Bars</a>
        <a href="./cinema.html">C · Cinematic</a>
        <a href="./hud.html">D · HUD</a>
        <a href="./hud2.html">E · HUD v2</a>
    </nav>

    <header>
        <h1>Kongerigernes Kamp</h1>
        <div class="meta">
            <div>mk40 · 2026-06-27</div>
            <div id="last-updated">Forbinder…</div>
        </div>
    </header>

    <main>
        <div class="disc-legend" id="disc-legend"></div>
        <div id="bars-container" class="bars-container">
            <div class="state-message">Henter data…</div>
        </div>
    </main>

    <script type="module">
        import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
        import { SUPABASE_URL, SUPABASE_ANON_KEY } from "./config.js";
        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const container = document.getElementById("bars-container");
        const legend = document.getElementById("disc-legend");
        const lastUpdated = document.getElementById("last-updated");

        function cssVarSafe(name) { return String(name).replace(/\//g, "").replace(/\s+/g, ""); }
        function esc(s) { return String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c])); }

        async function fetchAll() {
            const [t, d, s] = await Promise.all([
                supabase.from("DimTeam").select("*").order("team_key"),
                supabase.from("DimDiscipline").select("*").order("discipline_key"),
                supabase.from("FactScore").select("*").eq("is_final", true),
            ]);
            if (t.error || d.error || s.error) throw new Error(t.error?.message || d.error?.message || s.error?.message);
            return { teams: t.data, disciplines: d.data, scores: s.data };
        }

        function render({ teams, disciplines, scores }) {
            const matrix = {};
            for (const r of scores) {
                if (!matrix[r.team_key]) matrix[r.team_key] = {};
                matrix[r.team_key][r.discipline_key] = r.points;
            }

            const totals = teams.map(t => ({
                team: t,
                total: disciplines.reduce((a, d) => a + (matrix[t.team_key]?.[d.discipline_key] ?? 0), 0),
            }));
            const maxTotal = Math.max(...totals.map(x => x.total), 1);
            const leaderKey = totals.slice().sort((a,b) => b.total - a.total)[0]?.team.team_key;

            // Discipline legend
            legend.innerHTML = disciplines.map((d, idx) => `
                <div class="item"><span class="swatch"></span><span>${esc(d.discipline_name)} <span style="opacity:0.5">/${d.max_points}</span></span></div>
            `).join("");

            container.innerHTML = totals.map(x => {
                const colorVar = `var(--team-${cssVarSafe(x.team.team_color)})`;
                const isLeader = x.team.team_key === leaderKey;
                const heightPct = (x.total / maxTotal) * 100;

                const segments = disciplines.map((d, idx) => {
                    const pts = matrix[x.team.team_key]?.[d.discipline_key] ?? 0;
                    const segHeight = (pts / x.total) * heightPct;
                    if (segHeight < 0.5) return "";
                    const tiny = segHeight < 4;
                    return `<div class="segment${tiny ? " tiny" : ""}" data-rank="${idx + 1}" style="height: ${segHeight}%"><span class="seg-label">${pts}</span></div>`;
                }).join("");

                return `
                    <div class="team-column${isLeader ? " leader" : ""}" style="--team-color: ${colorVar}">
                        <div class="name">${esc(x.team.team_name)}</div>
                        <div class="total">${x.total}</div>
                        <div class="total-label">Total</div>
                        <div class="bar">${segments}</div>
                    </div>
                `;
            }).join("");

            const time = new Date().toLocaleTimeString("da-DK", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
            lastUpdated.textContent = `Opdateret ${time}`;
        }

        async function poll() {
            try { render(await fetchAll()); }
            catch (e) {
                container.innerHTML = `<div class="state-message error">${esc(e.message)}</div>`;
                lastUpdated.textContent = "Forbindelse afbrudt";
            }
        }
        poll(); setInterval(poll, 5000);
    </script>
</body>
</html>
