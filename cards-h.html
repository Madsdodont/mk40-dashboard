<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mk40 — HUD v3 (viz) prototype</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;0,9..144,900;1,9..144,600;1,9..144,700&family=JetBrains+Mono:wght@500;700;800&display=swap">
    <style>
        :root {
            /* Light/editorial theme — won A/B test 2026-05-30 vs dark broadcast variant.
               Tokens renamed 2026-06-20 (dashboard-016) to match the light pivot:
               surfaces = --paper-*, text = --ink-* (ink on paper). Values unchanged.

               Paper palette — cream-tinted backdrop. Warm hue 60 (cream), never pure white.
               Wider spread so 5 surface levels read as hierarchy. */
            --paper-void:        oklch(94% 0.012 60);  /* page background — slight cream */
            --paper-deep:        oklch(97% 0.008 60);  /* shell background — paper white */
            --paper-card:        oklch(99% 0.005 60);  /* card surface — brightest */
            --paper-elevated:    oklch(96% 0.010 60);  /* mid surface — tinted paper */
            --paper-border-soft: oklch(88% 0.012 60);  /* subtle divider */
            --paper-border:      oklch(75% 0.012 60);  /* visible divider */

            /* Text — warm dark ink for the light paper bg. Hue 30 for editorial warmth. */
            --ink:            oklch(20% 0.014 30);  /* primary text — near-black, warm */
            --ink-muted:      oklch(40% 0.014 30);  /* secondary text */
            --ink-dim:        oklch(58% 0.012 30);  /* tertiary text — labels, hints */

            /* Live red — broadcast pill only */
            --live-red:        oklch(58% 0.22 25);

            /* NB: Gold retired in dark version (2026-05-30) — team colors drive everything.
               Same principle holds here. */

            /* Team colors — same OKLCH as dark version. Mid-saturation bandana values render
               vividly against light cream bg without need for L-adjustment.
               Navy stays at L=48% (was bumped for dark TV); on light bg it has more headroom. */
            --team-pink:        oklch(58% 0.22 5);    /* Pink bandana — slight L drop for white-bg contrast */
            --team-navy:        oklch(42% 0.20 258);  /* Navy bandana — slight L drop for contrast on cream */
            --team-grøn:       oklch(50% 0.18 145);  /* Grass green — L drop for legibility */
            --team-gul:        oklch(82% 0.16 85);   /* Gylden gul — unified bandana-værdi (hue 85) */
            --team-lilla:      oklch(52% 0.18 295);  /* Lilla bandana — L drop for clear identity on light bg */

            /* Fonts */
            --font-display:    "Fraunces", Georgia, serif;
            --font-label:      "Segoe UI", system-ui, sans-serif;  /* Windows/Office/Power BI native — not the AI-default Inter */
            --font-numeric:    "JetBrains Mono", ui-monospace, monospace;

            /* Shadow tokens — softer for light theme. Warm-tinted (ink hue 30), low opacity.
               Light surfaces show shadows as subtle warmth-shifts, not depth-chasms. */
            --shadow-low:    0 1px 2px oklch(20% 0.02 30 / 0.08),
                             0 2px 6px oklch(20% 0.02 30 / 0.06);
            --shadow-medium: 0 2px 4px oklch(20% 0.02 30 / 0.10),
                             0 8px 24px oklch(20% 0.02 30 / 0.08);
            --shadow-high:   0 4px 8px oklch(20% 0.02 30 / 0.14),
                             0 16px 48px oklch(20% 0.02 30 / 0.12);

            /* Spacing scale — 8pt grid */
            --space-1:  4px;
            --space-2:  8px;
            --space-3:  12px;
            --space-4:  16px;
            --space-5:  24px;
            --space-6:  32px;
            --space-7:  40px;
            --space-8:  48px;
            --space-9:  64px;
            --space-10: 96px;

            /* Layout system — doubling tiers on the 8pt grid (24→48→96), one per proximity level.
               Semantic aliases so the role is explicit and reusable (also portable to AV). */
            --gap-row:   var(--space-5);   /* 24px — elements within a row (cards, panels) */
            --gap-stack: var(--space-8);   /* 48px — between shell rows (section break) */
            --frame:     var(--space-10);  /* 96px — outer margin, all four sides */

            /* Type scale — role-zoned: text=Segoe UI · display=Fraunces · num=JetBrains Mono.
               Token values match the dominant existing sizes, so this collapses the COUNT
               (~30 sizes -> 10) without shifting the look. ~1.25 Major Third where it carries hierarchy. */
            /* Type ladder — explicit reading-order tiers, sized for native 4K @ 100% zoom.
               Dynamic range preserved so hierarchy holds (the floor-only bump on 06-13 flattened
               it). Maxes ARE the effective TV sizes; vw drives growth; mins protect a laptop view.
               Reinforced by weight + colour (ink/ink-muted/ink-dim) + family — not size alone.
               T4 micro 22 · T3 26-28 · T2 44 · T2+ 56 · T1 104 · T1+ 132. */
            --text-xs:    clamp(0.8125rem, 0.7vw, 1.375rem);   /* T4 micro: TOTAL, PT, times, rank# → 22px */
            --text-sm:    clamp(0.875rem, 0.8vw, 1.625rem);    /* T3 minor: disc-name              → 26px */
            --text-md:    clamp(1rem, 0.85vw, 1.75rem);        /* T3 body / motto (quiet flavour)  → 28px */
            --num-sm:     clamp(0.875rem, 0.8vw, 1.625rem);    /* T3 gap-to-leader (+1pt)          → 26px */
            --display-sm: clamp(1.375rem, 1.5vw, 2.75rem);     /* T2 team name · panel heads       → 44px */
            --display-md: clamp(1.625rem, 1.9vw, 3.5rem);      /* T2+ leader name (amplified)      → 56px */
            --num-md:     clamp(1.5rem, 1.5vw, 2.5rem);        /* T2/3 hero points (small)         → 40px */
            --num-lg:     clamp(2.5rem, 2.6vw, 4.5rem);        /* T1/2 hero points                 → 72px */
            --num-xl:     clamp(3.5rem, 4.5vw, 6.5rem);        /* T1 total — the score, dominant   → 104px */
            --num-2xl:    clamp(4.5rem, 5.5vw, 8.25rem);       /* T1+ leader total (amplified)     → 132px */
            /* Weights - 3 (800 merged into bold) */
            --w-regular: 600;  --w-bold: 700;  --w-black: 900;
            /* Letter-spacing - 4 */
            --ls-tight: -0.02em;  --ls-normal: 0;  --ls-label: 0.12em;  --ls-wide: 0.2em;
        }
        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; }
        body {
            /* Five-team aurora field — the shared arena. Each team's hue sits as a soft, low-presence
               wash; heavy overlap blends them into one cohesive multi-hue field over the cream base.
               Color lives HERE, not on the cards — cards are calm vessels that pick up ambient hue
               through their transparency. Knobs: the % per hue (intensity) and the at-positions (layout). */
            background:
                radial-gradient(ellipse 55% 60% at 10% 12%,  color-mix(in oklch, var(--team-pink)      16%, transparent) 0%, transparent 62%),
                radial-gradient(ellipse 55% 60% at 30% 88%,  color-mix(in oklch, var(--team-navy)      15%, transparent) 0%, transparent 62%),
                radial-gradient(ellipse 60% 65% at 52% 8%,   color-mix(in oklch, var(--team-grøn)     14%, transparent) 0%, transparent 62%),
                radial-gradient(ellipse 55% 60% at 73% 90%,  color-mix(in oklch, var(--team-gul)      15%, transparent) 0%, transparent 62%),
                radial-gradient(ellipse 55% 60% at 92% 14%,  color-mix(in oklch, var(--team-lilla) 16%, transparent) 0%, transparent 62%),
                var(--paper-void);
            background-attachment: fixed;
            color: var(--ink);
            font-family: var(--font-label); min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            display: flex; flex-direction: column;
        }

        /* ===== App nav (dashboard-029) — de tre display-sider: Scoreboard · Hold · Quiz.
           Kaptajn + Dommer tilgås direkte via URL (uden for nav, ADR/029-scope). ===== */
        .app-nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 30;
            background: oklch(96% 0.008 60 / 0.85); backdrop-filter: blur(8px);
            border-bottom: 1px solid var(--paper-border-soft);
            padding: 0.5rem 1.5rem; display: flex; gap: 0.5rem;
            font-family: var(--font-label); font-size: var(--text-sm);
            font-weight: var(--w-regular); letter-spacing: var(--ls-label); text-transform: uppercase;
        }
        .app-nav a {
            color: var(--ink-muted); text-decoration: none; padding: 0.25rem 0.75rem;
            border: 1px solid transparent;
        }
        .app-nav a.current { color: oklch(45% 0.16 50); border-color: oklch(45% 0.16 50); }
        .app-nav a:hover { color: var(--ink); }

        /* ===== Layout shell — vertical lock 15/45/25/15 ===== */
        .shell {
            /* 96px frame all sides (app-nav is fixed-overlay scaffolding, floats in the top frame).
               Fit-to-one-screen: min-height 100vh, rows compress via fr + child overflow:hidden. */
            min-height: 100vh;
            padding: var(--frame);
            display: grid;
            grid-template-rows: minmax(0,15fr) minmax(0,45fr) minmax(0,25fr) minmax(0,15fr);  /* minmax(0,..) = rows stay proportional to 100vh, content clips instead of pushing the page taller (no bottom cut-off; 06-13) */
            gap: var(--gap-stack);
            max-width: none;   /* fill the TV — capped 2400px left ~18% dead bands on 4K-class viewports (06-13) */
            margin: 0 auto;
            width: 100%;
        }

        /* ===== Top banner ===== */
        /* Banner is now a row of independent frosted blocks with 24px air between (was one glued
           strip with border-dividers). Each event-block carries its own surface + shadow. */
        .top-banner {
            display: grid;
            grid-template-columns: 1.7fr repeat(4, 1fr) auto;
            gap: var(--gap-row);
            min-height: 0;
        }

        .event-block {
            padding: 0.875rem 1rem;
            display: flex; flex-direction: column;
            justify-content: space-between;
            position: relative;
            min-width: 0;
            background: color-mix(in oklch, var(--paper-card) 72%, transparent);
            backdrop-filter: blur(16px) saturate(1.15);
            border: 1px solid color-mix(in oklch, var(--team-color, var(--paper-border)) 18%, var(--paper-border-soft));
            border-radius: 8px;
            box-shadow: var(--shadow-low);
            overflow: hidden;
        }
        .event-block.empty { opacity: 0.4; }
        .event-block.empty .ev-team { color: var(--ink-dim); }

        /* Hero (latest event) — emphasis via a MORE SOLID surface + team glow, not a color flood. */
        .event-block.hero {
            background: color-mix(in oklch, var(--paper-card) 88%, transparent);
            padding: 1rem 1.25rem;
            border-color: color-mix(in oklch, var(--team-color) 32%, var(--paper-border));
            box-shadow:
                var(--shadow-low),
                0 0 20px color-mix(in oklch, var(--team-color) 12%, transparent);
        }
        .event-block.hero::after { background: none; }

        .event-block .ev-team-tag {
            position: absolute; top: 0; left: 0;
            width: 4px; height: 100%;
            background: var(--team-color);
        }
        .event-block.hero .ev-team-tag { width: 6px; }
        .event-block.empty .ev-team-tag { background: var(--paper-border); }

        .event-block .ev-meta {
            display: flex; align-items: center; gap: 0.5rem;
            font-family: var(--font-label); font-size: var(--text-xs);
            font-weight: var(--w-bold); letter-spacing: var(--ls-label);
            color: var(--ink-dim); text-transform: uppercase;
        }
        .event-block.hero .ev-meta { font-size: var(--text-sm); color: var(--ink-muted); }

        .event-block .ev-team {
            font-family: var(--font-display); font-weight: var(--w-bold);
            font-size: var(--display-sm);
            line-height: 1.05; color: var(--ink);
            letter-spacing: var(--ls-tight); margin-top: 0.4rem;
        }
        .event-block.hero .ev-team {
            font-weight: var(--w-black);
            font-size: var(--display-sm);
        }

        .event-block .ev-discipline {
            font-family: var(--font-label); font-size: var(--text-xs);
            font-weight: var(--w-regular); letter-spacing: var(--ls-label);
            color: var(--ink-muted); text-transform: uppercase;
            margin-top: 0.1rem;
        }
        .event-block.hero .ev-discipline { font-size: var(--text-sm); }

        .event-block .ev-points {
            font-family: var(--font-numeric); font-weight: var(--w-bold);
            font-size: var(--num-md);
            color: var(--ink); line-height: 1;
            font-variant-numeric: tabular-nums; align-self: flex-end;
        }
        .event-block.hero .ev-points { font-size: var(--num-lg); }
        .event-block .ev-points::before { content: "+"; opacity: 0.5; font-weight: var(--w-bold); }

        .banner-clock-block {
            padding: 0.875rem 1.25rem;
            display: flex; flex-direction: column;
            justify-content: space-between; align-items: flex-end;
            background: color-mix(in oklch, var(--paper-card) 72%, transparent);
            backdrop-filter: blur(16px) saturate(1.15);
            border: 1px solid var(--paper-border-soft);
            border-radius: 8px;
            box-shadow: var(--shadow-low);
            min-width: 120px;
        }
        /* Live pill — broadcast convention: white text on red, regardless of theme.
           Hardcoded white (not --ink, which is dark in light theme). */
        .live-pill {
            display: inline-flex; align-items: center; gap: 0.5rem;
            background: var(--live-red); color: oklch(100% 0 0);
            padding: 0.25rem 0.6rem;
            font-family: var(--font-label); font-weight: var(--w-bold);
            letter-spacing: var(--ls-label); font-size: var(--text-xs);
        }
        .live-pill::before {
            content: ""; width: 6px; height: 6px; border-radius: 50%;
            background: oklch(100% 0 0); animation: pulse 1.8s ease-in-out infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .banner-clock {
            font-family: var(--font-numeric); font-weight: var(--w-bold);
            color: var(--ink); font-variant-numeric: tabular-nums;
            font-size: var(--num-md); line-height: 1;
        }
        .banner-date {
            font-family: var(--font-label); font-size: var(--text-xs);
            font-weight: var(--w-regular); letter-spacing: var(--ls-label);
            color: var(--ink-dim); text-transform: uppercase;
            margin-bottom: 0.25rem;
        }

        /* ===== Hold cards row — BIG ===== */
        .cards-row {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: var(--gap-row);
            min-height: 0;
        }

        /* Hold-cards (LIGHT THEME) — team-color baked vivid on cream-paper bg.
           Higher mix-percentages than dark version because team-color on paper reads softer
           than on ink. Top 50% → middle 18% → bottom 0% creates clear team-territory. */
        .hold-card {
            /* Calm vessel — NO team tint on the surface. The aurora field behind glows through
               the translucent frosted card, so each card picks up ambient hue from its zone
               without flooding. Team identity lives in the stripe + radar + badge only. */
            background: color-mix(in oklch, var(--paper-card) 72%, transparent);
            backdrop-filter: blur(16px) saturate(1.15);
            border: 1px solid color-mix(in oklch, var(--team-color) 18%, var(--paper-border-soft));
            border-top: 6px solid var(--team-color);  /* stripe carries team identity, not the surface */
            border-radius: 8px;
            padding: var(--space-5);  /* 24px symmetric — was 24/24/20/24, asymmetric bottom snapped to grid */
            display: flex;
            flex-direction: column;
            /* identity (badge/name/motto) sits top, stats zone (total/gap/radar) anchored bottom
               via .total-block margin-top:auto → ALL slack collapses into ONE intentional gap.
               Was grid-template-rows: auto auto 1fr auto — the 1fr landed on motto (5 kids, 4 tracks)
               and inflated it to a dead gradient void. */
            position: relative;
            min-height: 0;
            overflow: hidden;
            box-shadow:
                var(--shadow-low),
                0 0 0 1px color-mix(in oklch, var(--team-color) 15%, transparent) inset;
            transition: box-shadow 240ms cubic-bezier(0.23, 1, 0.32, 1);
        }
        /* Top-edge light catch (under colored stripe) — paper highlight, not dark line */
        .hold-card::before {
            content: ""; position: absolute; top: 6px; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg,
                transparent 0%,
                oklch(100% 0 0 / 0.7) 50%,
                transparent 100%);
            pointer-events: none;
            z-index: 1;
        }
        /* Bottom team-color spill — anchors the card to its territory */
        .hold-card::after {
            content: ""; position: absolute; left: 0; right: 0; bottom: 0; height: 70%;
            background: none;  /* spill removed — the aurora field supplies all ambient color now */
            pointer-events: none;
            z-index: 0;
        }
        .hold-card > * { position: relative; z-index: 2; }

        /* Leader (LIGHT) — team-color amplified on paper. */
        .hold-card.leader {
            /* Leader stays calm too — no tint. It reads as leader via a MORE OPAQUE (more solid,
               less ghosted) surface + thicker 10px stripe + glow shadow. Presence, not color-flood. */
            background: color-mix(in oklch, var(--paper-card) 90%, transparent);
            border: 1px solid color-mix(in oklch, var(--team-color) 32%, var(--paper-border));
            border-top: 10px solid var(--team-color);
            box-shadow:
                var(--shadow-high),
                0 0 50px color-mix(in oklch, var(--team-color) 25%, transparent),
                inset 0 1px 0 oklch(100% 0 0 / 0.5);
        }
        .hold-card.leader::after {
            background: none;  /* leader differentiated by opacity + stripe + glow, not a spill */
        }

        .hold-card .badge-row {
            display: flex; justify-content: space-between; align-items: center;
            min-height: 28px;  /* fixed height across ALL cards (pill vs plain rank) → names align on a shared baseline below */
            font-family: var(--font-label); font-size: var(--text-xs);
            font-weight: var(--w-bold); letter-spacing: var(--ls-label);
            text-transform: uppercase; color: var(--ink-dim);
        }
        .hold-card.leader .badge-row {
            color: var(--ink);
        }
        /* LIGHT THEME: badge text must be DARK on team-color bg (was --paper-deep = dark in dark theme,
           but tokens are flipped here so --paper-deep is now light = unreadable on team bg).
           --ink holds dark text in light theme. */
        .hold-card.leader .badge-row .lead-badge {
            background: var(--team-color);
            color: oklch(100% 0 0);  /* white text on team-color pill */
            padding: 0.25rem 0.6rem;
            border-radius: 4px;
            font-weight: var(--w-black);
            box-shadow: 0 0 12px color-mix(in oklch, var(--team-color) 60%, transparent);
        }

        .hold-card .name {
            font-family: var(--font-display); font-weight: var(--w-bold);
            font-size: clamp(1.5rem, 1.65vw, 3rem);   /* T2 leading-area name — slight bump over display-sm → 48px (06-14) */
            line-height: 1.0; color: var(--ink);
            letter-spacing: var(--ls-tight); margin-top: var(--space-2);  /* 8px — related to badge above */
            text-wrap: balance;
        }
        .hold-card.leader .name {
            font-weight: var(--w-black);
            font-size: clamp(1.875rem, 2.1vw, 3.875rem);   /* leader name amplified → 62px (06-14) */
        }

        .hold-card .motto {
            font-family: var(--font-display); font-style: italic;
            font-weight: var(--w-regular);
            font-size: clamp(1.5rem, 1.55vw, 2.5rem);   /* motto bumped → 40px — readable from across the room (dashboard-022, 06-16) */
            color: var(--ink-muted); line-height: 1.3;
            margin-top: var(--space-2); min-height: 2.2em;  /* 8px — within identity group */
        }
        .hold-card.leader .motto {
            color: var(--ink);
            opacity: 0.85;
        }

        .hold-card .total-block {
            margin-top: auto;  /* anchors stats zone to card bottom; absorbs motto-length variance so all 5 cards' stats align */
            padding-top: var(--space-4);  /* 16px */
        }
        .hold-card .total-label {
            font-family: var(--font-label); font-size: var(--text-xs);
            font-weight: var(--w-bold); letter-spacing: var(--ls-wide);
            color: var(--ink-dim); text-transform: uppercase;
        }
        .hold-card .total {
            font-family: var(--font-numeric); font-weight: var(--w-bold);
            /* font-size + margin-top owned by the G-section override (.hold-card .total, below) — dead dup removed 06-16 */
            color: var(--ink-muted); line-height: 0.9;
            font-variant-numeric: tabular-nums;
            letter-spacing: var(--ls-tight);
        }
        /* Leader total — amplified via size + weight + full ink (not muted) + team-color text-shadow halo */
        .hold-card.leader .total {
            color: var(--ink);
            font-weight: var(--w-bold);
            /* font-size owned by the G-section override (.hold-card.leader .total, below) — dead dup removed 06-16 */
            text-shadow: 0 0 32px color-mix(in oklch, var(--team-color) 60%, transparent);
        }

        /* Gap-to-leader — dumbbell delta as a glance number. Serves PRODUCT.md job (a): se hvem leder OG med hvor meget. */
        .hold-card .gap {
            font-family: var(--font-numeric); font-weight: var(--w-bold);
            font-size: var(--num-sm);
            letter-spacing: var(--ls-normal);
            color: var(--ink-dim); font-variant-numeric: tabular-nums;
            margin-top: 0.2rem;
        }
        .hold-card .gap .gap-unit { font-size: 0.7em; opacity: 0.7; margin-left: 0.15em; }
        .hold-card.leader .gap {
            color: var(--ink);
            text-shadow: 0 0 16px color-mix(in oklch, var(--team-color) 45%, transparent);
        }

        .hold-card .radar-row {
            margin-top: var(--space-5);  /* 24px — was 20px (off-grid); section break below stats */
            padding-top: var(--space-4);  /* 16px */
            border-top: 1px solid color-mix(in oklch, var(--team-color) 20%, var(--paper-border-soft));
            display: flex; align-items: center; gap: var(--space-4);  /* 16px radar↔meta */
        }
        .hold-card.leader .radar-row { border-top-color: color-mix(in oklch, var(--team-color) 45%, transparent); }

        .hold-card .radar { flex-shrink: 0; }  /* size owned by the G-section override (.hc-radar .radar, below) — dead dup removed 06-16 */
        .hold-card .radar .axis { stroke: var(--paper-border); stroke-width: 1; }
        .hold-card .radar .ring { stroke: var(--paper-border); stroke-width: 1; fill: none; opacity: 0.55; }
        .hold-card .radar .polygon {
            fill: var(--team-color); fill-opacity: 0.42;
            stroke: var(--team-color); stroke-width: 2;
            stroke-linejoin: round;
        }
        /* Leader radar — same team-color, just brighter fill + stronger stroke */
        .hold-card.leader .radar .polygon {
            fill-opacity: 0.6;
            stroke-width: 2.5;
            filter: drop-shadow(0 0 8px color-mix(in oklch, var(--team-color) 50%, transparent));
        }
        /* Numbered vertex nodes — paper disc + dark number, matches the disc-strip number chip.
           Neutral (no team/discipline color) so it reads as a key, not another color signal. */
        .hold-card .radar .axis-node {
            fill: var(--paper-card); stroke: var(--paper-border); stroke-width: 1;
        }
        .hold-card .radar .axis-num {
            font-family: var(--font-numeric); font-size: 9px;  /* viewBox user-units (×2.47 → ~22px screen) — matches disc-section number, fits the node disc w/ padding (06-14) */
            font-weight: var(--w-bold); fill: var(--ink-muted); text-anchor: middle;
        }

        .hold-card .radar-meta {
            font-family: var(--font-label); font-size: var(--text-xs);
            font-weight: var(--w-bold); letter-spacing: var(--ls-label);
            color: var(--ink-dim); text-transform: uppercase;
            line-height: 1.35;
            min-width: 0;
        }
        .hold-card .radar-meta strong {
            display: block;
            font-family: var(--font-numeric); font-weight: var(--w-bold);
            font-size: var(--text-md); color: var(--ink-muted);
            letter-spacing: var(--ls-normal);
            margin-top: 0.15rem;
        }
        .hold-card.leader .radar-meta strong { color: var(--ink); }

        /* ===== Mid row: bump (1.4fr) + seneste+AI (1fr) ===== */
        .mid-row {
            display: grid;
            grid-template-columns: 1.4fr 1fr;
            gap: var(--gap-row);
            min-height: 0;
        }

        .panel {
            background: color-mix(in oklch, var(--paper-card) 72%, transparent);
            backdrop-filter: blur(16px) saturate(1.15);
            border: 1px solid var(--paper-border-soft);
            border-radius: 8px;
            padding: 1.25rem 1.5rem;
            display: flex; flex-direction: column;
            overflow: hidden;
            min-height: 0;
            box-shadow: var(--shadow-low);
            position: relative;
        }
        .panel::before {
            content: ""; position: absolute; top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg,
                transparent 0%,
                oklch(100% 0 0 / 0.7) 50%,
                transparent 100%);
            pointer-events: none;
        }

        .panel-header {
            display: flex; justify-content: space-between; align-items: baseline;
            margin-bottom: 0.875rem;
            flex-shrink: 0;
        }
        .panel-header .title {
            font-family: var(--font-display); font-weight: var(--w-bold);
            font-size: var(--display-sm); letter-spacing: var(--ls-tight);
            color: var(--ink);
        }
        .panel-header .sub {
            font-family: var(--font-label); font-size: var(--text-xs);
            font-weight: var(--w-bold); letter-spacing: var(--ls-label);
            color: var(--ink-dim); text-transform: uppercase;
        }

        /* Bump chart container — fills mid-row vertically */
        .bump-wrap {
            flex: 1; min-height: 0;
            position: relative;
        }
        .bump-svg { position: absolute; inset: 0; width: 100%; height: 100%; }
        .bump-svg .axis-line {
            stroke: var(--paper-border-soft); stroke-width: 1; stroke-dasharray: 2 5;
        }
        .bump-svg .rank-label {
            font-family: var(--font-numeric); font-size: clamp(0.875rem, 1vw, 1.1875rem);  /* 14→19px bump rank (was 12px; 06-13) */
            font-weight: var(--w-bold); fill: var(--ink-dim);
            letter-spacing: var(--ls-normal);
        }
        .bump-svg .team-line {
            stroke-width: 3; fill: none;
            stroke-linecap: round; stroke-linejoin: round;
        }
        .bump-svg .team-end-dot { stroke: var(--paper-card); stroke-width: 2.5; }
        .bump-svg .team-end-label {
            font-family: var(--font-display); font-weight: var(--w-bold);
            font-size: clamp(1.375rem, 1.7vw, 2rem); letter-spacing: var(--ls-tight);  /* bump team labels → 32px (06-14) */
        }

        /* ===== Seneste + AI commentary panel ===== */
        .latest-panel {
            display: grid;
            grid-template-rows: auto auto 1fr auto;
            gap: 0;
            background: color-mix(in oklch, var(--paper-card) 72%, transparent);
            backdrop-filter: blur(16px) saturate(1.15);
            border: 1px solid var(--paper-border-soft);
            border-radius: 8px;
            position: relative;
            overflow: hidden;
            min-height: 0;
            box-shadow: var(--shadow-low);
            transition: box-shadow 240ms cubic-bezier(0.23, 1, 0.32, 1);
        }
        .latest-panel::before {
            content: ""; position: absolute; top: 0; left: 0; right: 0;
            height: 6px; background: var(--team-color);
            box-shadow: 0 1px 12px color-mix(in oklch, var(--team-color) 60%, transparent);
            z-index: 2;
        }
        /* Latest result with an event — emphasis via more-solid surface + team-stripe (::before) + glow. */
        .latest-panel.has-event {
            background: color-mix(in oklch, var(--paper-card) 88%, transparent);
            border-color: color-mix(in oklch, var(--team-color) 28%, var(--paper-border-soft));
            box-shadow:
                var(--shadow-low),
                0 0 20px color-mix(in oklch, var(--team-color) 10%, transparent);
        }
        /* When latest event IS the leader — amplify own team-color glow further */
        .latest-panel.has-event.leader {
            box-shadow:
                var(--shadow-low),
                0 0 28px color-mix(in oklch, var(--team-color) 16%, transparent);
        }

        .latest-panel .lp-header {
            padding: 1rem 1.5rem 0.5rem 1.5rem;
            display: flex; justify-content: space-between; align-items: baseline;
        }
        .latest-panel .lp-label {
            font-family: var(--font-label); font-size: var(--text-xs);
            font-weight: var(--w-bold); letter-spacing: var(--ls-wide);
            color: var(--ink-muted); text-transform: uppercase;
        }
        .latest-panel .lp-time {
            font-family: var(--font-numeric); font-weight: var(--w-regular);
            font-size: var(--text-sm); color: var(--ink-dim);
            font-variant-numeric: tabular-nums; letter-spacing: var(--ls-normal);
        }

        .latest-panel .lp-hero {
            padding: 0.25rem 1.5rem 0 1.5rem;
            display: flex; align-items: baseline; gap: 1.25rem;
        }
        .latest-panel .lp-points {
            font-family: var(--font-display); font-weight: var(--w-black);
            font-size: var(--num-xl);
            line-height: 0.9;
            color: var(--ink);
            letter-spacing: var(--ls-tight);
            font-variant-numeric: tabular-nums;
            flex-shrink: 0;
        }
        .latest-panel .lp-points::before {
            content: "+"; opacity: 0.55; font-weight: var(--w-bold);
            font-size: 0.55em; vertical-align: top;
            margin-right: 0.05em;
        }
        .latest-panel .lp-event-meta {
            display: flex; flex-direction: column;
            min-width: 0;
        }
        .latest-panel .lp-team {
            font-family: var(--font-display); font-weight: var(--w-black);
            font-size: var(--num-md);
            line-height: 1.0; color: var(--ink);
            letter-spacing: var(--ls-tight); text-wrap: balance;
        }
        .latest-panel .lp-discipline {
            font-family: var(--font-label); font-size: var(--text-sm);
            font-weight: var(--w-bold); letter-spacing: var(--ls-label);
            color: var(--ink-muted); text-transform: uppercase;
            margin-top: 0.25rem;
        }

        .latest-panel .lp-commentary {
            padding: 1rem 1.5rem 0.5rem 1.5rem;
            font-family: var(--font-display); font-style: italic;
            font-weight: var(--w-regular);
            /* font-size owned by the hero-slot override (.latest-hero-slot .lp-commentary, below) — dead dup removed 06-16 */
            line-height: 1.35;
            color: var(--ink);
            text-wrap: balance;
            align-self: end;
        }
        .latest-panel .lp-commentary::before {
            content: "“"; font-size: 1.5em; line-height: 0;
            vertical-align: -0.25em; color: var(--ink-muted);
            margin-right: 0.15em;
        }
        .latest-panel .lp-commentary::after {
            content: "”"; font-size: 1.5em; line-height: 0;
            vertical-align: -0.25em; color: var(--ink-muted);
            margin-left: 0.1em;
        }
        .latest-panel .lp-commentary-tag {
            display: block;
            margin-top: 0.4rem;
            font-family: var(--font-label); font-style: normal;
            font-size: var(--text-xs); font-weight: var(--w-bold);
            letter-spacing: var(--ls-label); text-transform: uppercase;
            color: var(--ink-dim);
        }

        .latest-panel .lp-context {
            padding: 0.75rem 1.5rem 1rem 1.5rem;
            font-family: var(--font-label); font-size: var(--text-sm);
            font-weight: var(--w-bold); letter-spacing: var(--ls-label);
            color: var(--ink-muted); text-transform: uppercase;
            border-top: 1px solid var(--paper-border-soft);
            display: flex; justify-content: space-between; align-items: baseline;
        }
        .latest-panel .lp-context strong {
            font-family: var(--font-numeric); font-weight: var(--w-bold);
            color: var(--ink); font-size: var(--text-md);
            letter-spacing: var(--ls-normal);
        }
        /* Position-line: leader gets ink (full), behind gets ink-muted. Team-identity carried by panel's team-color edge + glow. */
        .latest-panel .lp-context strong.lead { color: var(--ink); }
        .latest-panel .lp-context strong.behind { color: var(--ink-muted); }

        .latest-panel.empty .lp-hero,
        .latest-panel.empty .lp-commentary { display: none; }
        .latest-panel.empty .lp-empty {
            grid-row: 2 / 4;
            padding: 2rem 1.5rem;
            display: flex; align-items: center; justify-content: center;
            color: var(--ink-dim);
            font-family: var(--font-label); font-size: var(--text-md);
            font-weight: var(--w-bold); letter-spacing: var(--ls-label); text-transform: uppercase;
            text-align: center;
        }

        /* ===== Disciplin strip ===== */
        /* Was one glued strip; now 5 independent frosted pills with 24px air between. */
        .disc-strip {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: var(--gap-row);
            min-height: 0;
        }
        .disc-pill {
            padding: 1.125rem 1.5rem;
            display: flex; flex-direction: column;
            justify-content: center;
            gap: 0.35rem;
            min-width: 0;
            background: color-mix(in oklch, var(--paper-card) 72%, transparent);
            backdrop-filter: blur(16px) saturate(1.15);
            border: 1px solid var(--paper-border-soft);
            border-radius: 8px;
            box-shadow: var(--shadow-low);
        }
        .disc-pill .label {
            font-family: var(--font-label); font-size: var(--text-md);
            font-weight: var(--w-bold); letter-spacing: var(--ls-label);
            text-transform: uppercase; color: var(--ink-muted);
            display: flex; align-items: center; gap: 0.5rem;
        }
        /* Number chip — matches the radar vertex node (paper disc + dark number). The radar↔discipline key. */
        .disc-pill .label .disc-num {
            margin-left: auto;  /* parks the number at the far right of each box → consistent scan position */
            display: inline-flex; align-items: center; justify-content: center;
            width: 20px; height: 20px; border-radius: 50%;
            border: 1px solid var(--paper-border); background: var(--paper-card);
            font-family: var(--font-numeric); font-size: var(--text-xs);
            font-weight: var(--w-bold); color: var(--ink-muted);
            letter-spacing: var(--ls-normal); flex-shrink: 0;
        }
        /* Done discipline: label stays ink-muted; checkmark gets the leading team's color */
        .disc-pill[data-status="done"] .label { color: var(--ink); }
        .disc-pill[data-status="done"] .label::before {
            content: "✓"; font-weight: var(--w-black); font-size: var(--text-md);
            color: var(--leader-color, var(--ink));
            text-shadow: 0 0 8px color-mix(in oklch, var(--leader-color, transparent) 40%, transparent);
        }
        .disc-pill[data-status="pending"] .label::before { content: "○"; opacity: 0.6; }
        .disc-pill .meta {
            font-family: var(--font-numeric); font-size: var(--text-sm);
            font-weight: var(--w-bold); color: var(--ink-dim);
            font-variant-numeric: tabular-nums; letter-spacing: var(--ls-normal);
        }
        .disc-pill .meta .leader-name {
            font-family: var(--font-display); font-weight: var(--w-bold);
            font-style: italic; color: var(--ink-muted);
            letter-spacing: var(--ls-normal); margin-left: 0.25rem;
        }

        /* Per-discipline dot-strip — generalizes dumbbell to N teams. Each team's score as a dot
           on a shared 0→max axis; position on common baseline = most accurately decoded channel.
           Reveals how contested each discipline was (tight cluster = gyser, lone right dot = walkover). */
        .disc-pill .disc-dots {
            position: relative; height: 14px;
            margin: 0.15rem 0.25rem;
            border-bottom: 1px solid var(--paper-border-soft);
        }
        .disc-pill .disc-dots .dot {
            position: absolute; top: 50%; transform: translate(-50%, -50%);
            width: 9px; height: 9px; border-radius: 50%;
            background: var(--team-color);
            box-shadow: 0 0 0 1.5px var(--paper-card);
        }
        .disc-pill .disc-dots .dot.lead {
            width: 13px; height: 13px;
            box-shadow: 0 0 0 2px var(--paper-card),
                        0 0 8px color-mix(in oklch, var(--team-color) 50%, transparent);
            z-index: 2;
        }
        .disc-pill[data-status="pending"] .disc-dots {
            border-bottom-style: dashed; opacity: 0.5;
        }

        /* ===== Responsive breakpoints ===== */

        /* Tablets landscape & smaller desktop */
        @media (max-width: 1500px) {
            .hold-card .radar { width: 96px; height: 96px; }
            .hold-card .total { font-size: clamp(3rem, 5vw, 5.5rem); }
            .hold-card .name { font-size: clamp(1rem, 1.2vw, 1.375rem); }
        }

        /* Smaller tablet — drop to 3-up cards */
        @media (max-width: 1300px) {
            .cards-row { grid-template-columns: repeat(3, 1fr); }
            .hold-card:nth-child(4), .hold-card:nth-child(5) {
                grid-column: span 1;
            }
            .hold-card { min-height: 280px; }
            .hold-card .radar { width: 88px; height: 88px; }
        }

        /* Phones & narrow */
        @media (max-width: 1100px) {
            .shell {
                padding: 0.75rem;
                grid-template-rows: auto auto auto auto;
            }
            .top-banner { grid-template-columns: 1fr; }
            .event-block { border-right: none; border-bottom: 1px solid var(--paper-border-soft); }
            .event-block.empty { display: none; }
            .banner-clock-block { flex-direction: row; align-items: center; padding: 0.6rem 1rem; }
            .banner-date { margin-bottom: 0; }
            .cards-row { grid-template-columns: repeat(2, 1fr); }
            .hold-card { min-height: 240px; }
            .hold-card .radar { width: 80px; height: 80px; }
            .hold-card .total { font-size: clamp(2.5rem, 8vw, 4rem); }
            .mid-row { grid-template-columns: 1fr; }
            .bump-wrap { min-height: 280px; }
            .latest-panel .lp-hero { flex-direction: column; align-items: flex-start; gap: 0.5rem; }
            .latest-panel .lp-points { font-size: 3rem; }
            .disc-strip { grid-template-columns: 1fr 1fr; }
            .disc-pill { border-right: none; border-bottom: 1px solid var(--paper-border-soft); padding: 0.75rem 1rem; }
        }

        @media (max-width: 540px) {
            .cards-row { grid-template-columns: 1fr; }
        }

        .state-message {
            grid-column: 1 / -1;
            text-align: center; padding: 2rem 1rem;
            color: var(--ink-muted);
            font-family: var(--font-label); letter-spacing: var(--ls-label);
            text-transform: uppercase;
            font-size: var(--text-sm); font-weight: var(--w-bold);
        }
        .state-message.error { color: var(--live-red); }

        /* ========================================================================
           G · CARDS HORIZONTAL — layout overrides, placed last so they win the cascade.
           Reuses hud3's tokens, frosted surface, typography and radar; only geometry changes:
           five rank-sorted cards laid DOWN and stacked on the left, radar to the right of TOTAL.
           Right column left intentionally open for v1 — we react to the form, then fill it.
           ======================================================================== */
        .shell {
            /* Three columns, each full height; each lays out its own stack.
               1: rank cards · 2: header / hero / bump · 3: agenda / disciplines. */
            grid-template-columns: minmax(440px, 36%) minmax(440px, 36%) 1fr;
            grid-template-rows: 1fr;
            column-gap: var(--gap-stack);
        }
        .cards-stack {
            grid-column: 1;
            display: grid;
            grid-template-rows: repeat(5, 1fr);
            gap: var(--gap-row);
            min-height: 0;
        }
        /* Middle column — page header (top), hero (floats to the actual middle), bump (bottom). */
        .col-mid {
            grid-column: 2;
            min-height: 0;
            display: grid;
            grid-template-rows: repeat(5, 1fr);   /* aligns to the 5-card stack: header 1 · hero 2 · bump 2 */
            gap: var(--gap-row);
        }
        /* Right column — agenda (3 cards) over the disciplines panel (2 cards), same grid. */
        .col-right {
            grid-column: 3;
            min-height: 0;
            display: grid;
            grid-template-rows: repeat(5, 1fr);
            gap: var(--gap-row);
        }
        .bump-panel { grid-row: 4 / 6; min-height: 0; }

        .hold-card {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto auto;
            grid-template-rows: none;
            align-items: center;
            column-gap: var(--space-6);
            padding: var(--space-2) var(--space-6);  /* 8px vertical — tighter so the radar gets more room */
            border-top: 0;
            border-left: 6px solid var(--team-color);  /* accent moves to the left edge */
            box-shadow: var(--shadow-low);
        }
        .hold-card.leader {
            border-top: 0;
            border-left: 10px solid var(--team-color);
            box-shadow:
                var(--shadow-low),
                0 0 24px color-mix(in oklch, var(--team-color) 14%, transparent);
        }

        .hc-identity { display: flex; flex-direction: column; min-width: 0; }
        .hc-stats    { display: flex; flex-direction: column; align-items: flex-start; }
        .hc-radar    { display: flex; align-items: center; justify-content: center; }

        /* TOTAL scaled down for the shorter horizontal card; radar sits to its right. */
        .hold-card .total        { font-size: clamp(5rem, 9vw, 14rem); margin-top: 0; }   /* sole owner of total size — 224px, balanced w/ radar (06-14) */
        .hold-card.leader .total { font-size: clamp(5.5rem, 9.5vw, 15rem); }              /* sole owner — leader 240px */
        .hold-card .total-label  { margin-bottom: var(--space-1); }
        .hc-radar .radar         { width: 296px; height: 296px; }  /* sole owner of radar size — 296px (06-14) */

        /* ===== Region A — AI-commentary hero (the wow-moment's home in G) =====
           Col 2, rows 1-3 (the 617×555 zone alongside the leader cards). Reuses hud3's
           .latest-panel wholesale; a slot wrapper owns grid-placement so renderHero's
           className rewrite can't clobber it. Commentary scaled up — it's the star here,
           not a side panel. dashboard-011 wired the real Sonnet callout into this node
           (Edge Function /callout, fired on each discipline-lock). */
        .latest-hero-slot {
            grid-row: 2 / 4;   /* two cards tall, between the header and the bump */
            min-height: 0;
            display: flex;
        }

        /* --- Region A · the wow widget ---------------------------------------------------
           Text-as-hero: the AI commentary is the dominant element; the score demotes to a
           result line. Inverted (warm charcoal in the cream field) + strong elevation =
           the "widget pops out" feeling (F1-card reference). 8px radius kept for system
           consistency — pop comes from the inversion + shadow, not a one-off radius.
           SOLO content (path C): opponent, if any, lives in the AI commentary text itself.

           Dark-mode color discipline (designparser elevation-system + wcag-contrast +
           simultaneous-contrast): never pure black; warm off-white text (never pure white);
           pairs chosen for THIS surface, not flipped 1:1; all text verified >=AA. */
        .latest-hero-slot .latest-panel {
            flex: 1; min-height: 0;
            position: relative;
            display: grid;
            grid-template-rows: auto 1fr auto;
            gap: 0;
            padding: var(--space-6);
            background: oklch(22% 0.02 40);
            border-color: color-mix(in oklch, var(--team-color) 38%, oklch(36% 0.02 40));
            box-shadow:
                var(--shadow-high),
                0 0 56px color-mix(in oklch, var(--team-color) 40%, transparent);
        }
        .latest-hero-slot .latest-panel.leader {
            box-shadow:
                var(--shadow-high),
                0 0 72px color-mix(in oklch, var(--team-color) 50%, transparent);
        }
        .latest-hero-slot .latest-panel::before {
            box-shadow: 0 1px 18px color-mix(in oklch, var(--team-color) 70%, transparent);
        }

        /* Header tag — discipline + time, F1 "RACE"-style chip row. */
        .latest-hero-slot .lp-tag {
            display: flex; justify-content: space-between; align-items: center;
            font-family: var(--font-label); font-size: var(--text-xs);
            font-weight: var(--w-bold); letter-spacing: var(--ls-wide); text-transform: uppercase;
        }
        .latest-hero-slot .lp-tag-disc {
            display: inline-flex; align-items: center; gap: 0.6rem;
            color: oklch(78% 0.02 70);
        }
        .latest-hero-slot .lp-tag-disc::before {
            content: ""; width: 9px; height: 9px; border-radius: 50%;
            background: var(--team-color);
            box-shadow: 0 0 10px color-mix(in oklch, var(--team-color) 80%, transparent);
        }
        .latest-hero-slot .lp-tag-time {
            font-family: var(--font-numeric); font-weight: var(--w-regular);
            letter-spacing: var(--ls-normal); color: oklch(66% 0.02 70);
            font-variant-numeric: tabular-nums;
        }

        /* THE HERO — commentary in Segoe (sharp, native, readable). Short or long, the callout
           voice is the same; Fraunces stays on the headlines/team names only (Mads 06-08). */
        .latest-hero-slot .lp-commentary {
            align-self: center;
            margin: 0; padding: var(--space-4) 0;
            font-family: var(--font-label); font-style: normal; font-weight: var(--w-regular);
            font-size: clamp(1.875rem, 2.8vw, 3.25rem);   /* sole owner of callout size — 52px (06-14) */
            line-height: 1.3; letter-spacing: var(--ls-normal);
            color: oklch(95% 0.012 85);
            text-wrap: pretty;
        }
        .latest-hero-slot .lp-commentary::before {
            content: "\201C"; font-family: var(--font-display);
            font-size: 1.1em; line-height: 0; vertical-align: -0.3em;
            color: var(--team-color); margin-right: 0.05em;
            text-shadow: 0 0 16px color-mix(in oklch, var(--team-color) 60%, transparent);
        }
        /* Lock-SUMMARY is the longest text → size it down a touch from the base. */
        .latest-hero-slot .lp-commentary.is-summary {
            font-size: clamp(1.625rem, 2.3vw, 2.75rem);   /* lock-summary bumped → 44px (06-14) */
            line-height: 1.35;
        }

        /* Result line — demoted: team · score · standing. */
        .latest-hero-slot .lp-result {
            display: flex; align-items: baseline; gap: var(--space-4);
            padding-top: var(--space-3);
            border-top: 1px solid oklch(36% 0.015 40);
        }
        .latest-hero-slot .lp-result-team {
            font-family: var(--font-display); font-weight: var(--w-black);
            font-size: var(--display-sm); color: oklch(96% 0.012 85);
            letter-spacing: var(--ls-tight);
        }
        .latest-hero-slot .lp-result-score {
            font-family: var(--font-numeric); font-weight: var(--w-bold);
            font-size: var(--num-md); color: oklch(96% 0.012 85);
            font-variant-numeric: tabular-nums; letter-spacing: var(--ls-tight);
        }
        .latest-hero-slot .lp-result-score i {
            font-style: normal; font-size: 0.55em; opacity: 0.6; margin-left: 0.1em;
        }
        .latest-hero-slot .lp-result-standing {
            margin-left: auto;
            font-family: var(--font-numeric); font-weight: var(--w-bold);
            font-size: var(--text-md); color: oklch(78% 0.02 70);
            font-variant-numeric: tabular-nums;
        }

        /* Empty state on the dark surface. */
        .latest-hero-slot .latest-panel.empty { grid-template-rows: auto 1fr; }
        .latest-hero-slot .lp-empty  { color: oklch(70% 0.02 70); }
        .latest-hero-slot .lp-label  { color: oklch(78% 0.02 70); }

        /* --- Callout arrival (dashboard-011) --------------------------------------------
           When a freshly-locked discipline's callout lands, the hero animates in ONCE:
           the commentary fades + rises, and a soft team-color glow pulses around the panel.
           Ceremonial, not broadcast — no flash, no bounce, no color blink (PRODUCT.md).
           The glow rides a transient ::after overlay so the panel's base box-shadow
           (and the .leader variant) is never overridden. */
        @keyframes heroTextIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes heroArriveGlow {
            0%, 100% { opacity: 0; }
            40%      { opacity: 1; }
        }
        .latest-hero-slot .latest-panel::after {
            content: ""; position: absolute; inset: 0; border-radius: inherit;
            pointer-events: none; opacity: 0;
            box-shadow: 0 0 92px color-mix(in oklch, var(--team-color) 55%, transparent);
        }
        .latest-hero-slot .latest-panel.lp-arrive::after {
            animation: heroArriveGlow 750ms cubic-bezier(.2, .7, .2, 1);
        }
        .latest-hero-slot .lp-commentary.lp-fresh {
            animation: heroTextIn 750ms cubic-bezier(.2, .7, .2, 1) both;
        }
        @media (prefers-reduced-motion: reduce) {
            .latest-hero-slot .latest-panel.lp-arrive::after,
            .latest-hero-slot .lp-commentary.lp-fresh { animation: none; }
        }

        /* ===== dashboard-020 · LOCK-summary overlay =======================================
           Når en disciplin låses: et stort overlay (70% af skærmen) eksploderer ud af centrum,
           bliver stående 15s med den federe narrativ-summary + de fem placeringer, og skrumper
           så tilbage. Crescendo'et — mørkt widget-sprog som hero'en, holdfarvet glød. */
        .hero-overlay {
            position: fixed; inset: 0; z-index: 200;
            display: none; align-items: center; justify-content: center;
            background: color-mix(in oklch, oklch(14% 0.02 40) 58%, transparent);
            backdrop-filter: blur(4px);
            opacity: 0; transition: opacity 320ms ease;
        }
        .hero-overlay.show { display: flex; opacity: 1; }
        .hero-overlay-card {
            /* dashboard-022 (06-16): the lock crescendo read too small on the TV — blown up to
               ~88% of the screen with a much bigger commentary, a harder overshoot explode, and
               a breathing team-glow through the 15s dwell. THIS is the wow-moment, 7× per evening. */
            position: relative;
            width: 88vw; height: 86vh; max-width: 2400px; max-height: 1500px;
            display: grid; grid-template-rows: auto 1fr auto; gap: clamp(var(--space-4), 2.5vh, var(--space-7));
            padding: clamp(2.5rem, 4.5vw, 6rem);
            border-radius: 24px;
            background: oklch(21% 0.02 40);
            border: 2px solid color-mix(in oklch, var(--team-color) 55%, oklch(38% 0.02 40));
            box-shadow: var(--shadow-high), 0 0 180px color-mix(in oklch, var(--team-color) 50%, transparent);
            transform-origin: center center;
        }
        /* Breathing team-glow during dwell — a transient ::after ring so the base shadow is untouched.
           Starts after the explode settles (0.75s delay), pulses gently while the card holds. */
        .hero-overlay-card::after {
            content: ""; position: absolute; inset: 0; border-radius: inherit;
            pointer-events: none; opacity: 0;
            box-shadow: 0 0 0 transparent;
        }
        .hero-overlay.show .hero-overlay-card::after {
            animation: overlayGlowPulse 2.6s ease-in-out 0.75s infinite;
        }
        @keyframes overlayGlowPulse {
            0%, 100% { opacity: 0.55; box-shadow: 0 0 90px color-mix(in oklch, var(--team-color) 35%, transparent); }
            50%      { opacity: 1;    box-shadow: 0 0 240px color-mix(in oklch, var(--team-color) 70%, transparent); }
        }
        .hero-overlay.explode .hero-overlay-card { animation: overlayExplode 760ms cubic-bezier(.16, .84, .34, 1) both; }
        .hero-overlay.implode .hero-overlay-card { animation: overlayImplode 520ms cubic-bezier(.5, 0, .75, .25) both; }
        @keyframes overlayExplode {
            0%   { transform: scale(0.06); opacity: 0; }
            55%  { opacity: 1; }
            78%  { transform: scale(1.04); }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes overlayImplode {
            from { transform: scale(1); opacity: 1; }
            to   { transform: scale(0.10); opacity: 0; }
        }
        .hero-overlay .ov-tag {
            display: flex; justify-content: space-between; align-items: center;
            font-family: var(--font-label); font-size: clamp(1.125rem, 1.5vw, 2rem);
            font-weight: var(--w-bold); letter-spacing: var(--ls-wide); text-transform: uppercase;
        }
        .hero-overlay .ov-disc { display: inline-flex; align-items: center; gap: 0.9rem; color: oklch(80% 0.02 70); }
        .hero-overlay .ov-disc::before {
            content: ""; width: 18px; height: 18px; border-radius: 50%;
            background: var(--team-color);
            box-shadow: 0 0 20px color-mix(in oklch, var(--team-color) 85%, transparent);
        }
        .hero-overlay .ov-status { color: oklch(64% 0.02 70); }
        /* Summary is long prose → Segoe (sharp, native), not Fraunces italic. Readable over
           2-3 sentences; the Fraunces display voice stays on the headlines/short callouts.
           THE star of the overlay — sized big (dashboard-022). */
        .hero-overlay .ov-commentary {
            align-self: center; margin: 0;
            font-family: var(--font-label); font-style: normal; font-weight: var(--w-regular);
            font-size: clamp(2.5rem, 4.4vw, 6rem); line-height: 1.28; letter-spacing: var(--ls-tight);
            color: oklch(96% 0.012 85); text-wrap: pretty;
        }
        .hero-overlay .ov-commentary::before {
            content: "\201C"; font-family: var(--font-display);
            font-size: 1.05em; line-height: 0; vertical-align: -0.32em;
            color: var(--team-color); margin-right: 0.06em;
            text-shadow: 0 0 24px color-mix(in oklch, var(--team-color) 60%, transparent);
        }
        .hero-overlay .ov-results {
            display: flex; flex-direction: column; gap: clamp(0.5rem, 1.1vh, 1rem);
            padding-top: var(--space-5); border-top: 1px solid oklch(36% 0.015 40);
        }
        .hero-overlay .ov-row {
            display: grid; grid-template-columns: 3rem 1.2rem 1fr auto auto; align-items: center; gap: 1.2rem;
            font-family: var(--font-numeric); font-size: clamp(1.5rem, 2vw, 2.875rem);
            color: oklch(82% 0.012 85); opacity: 0.72;
            transform: translateY(16px);
            animation: ovRowRise 560ms cubic-bezier(.2, .7, .2, 1) both;
            animation-delay: calc(var(--i, 0) * 90ms + 0.6s);
        }
        @keyframes ovRowRise {
            from { transform: translateY(16px); }
            to   { transform: translateY(0); }
        }
        .hero-overlay .ov-row.win { opacity: 1; }
        .hero-overlay .ov-rank { font-weight: var(--w-bold); color: oklch(70% 0.02 70); font-variant-numeric: tabular-nums; }
        .hero-overlay .ov-dot { width: 1rem; height: 1rem; border-radius: 50%; background: var(--team-color); box-shadow: 0 0 12px color-mix(in oklch, var(--team-color) 60%, transparent); }
        .hero-overlay .ov-name { font-family: var(--font-display); font-weight: var(--w-bold); font-size: 1.15em; color: oklch(94% 0.012 85); letter-spacing: var(--ls-tight); }
        .hero-overlay .ov-raw { color: oklch(70% 0.02 70); font-variant-numeric: tabular-nums; }
        .hero-overlay .ov-pts { font-weight: var(--w-bold); color: oklch(94% 0.012 85); font-variant-numeric: tabular-nums; min-width: 3ch; text-align: right; }
        @media (prefers-reduced-motion: reduce) {
            .hero-overlay.explode .hero-overlay-card,
            .hero-overlay.implode .hero-overlay-card,
            .hero-overlay.show .hero-overlay-card::after,
            .hero-overlay .ov-row { animation: none; }
            .hero-overlay .ov-row { transform: none; }
        }

        /* ===== Region B · timeline — the day as a vertical 12→22 axis =====================
           Col 3, rows 1-3 (~60%, aligned with cards 1-3). Light frosted — the hero stays the
           single dark focal point. Hour ruler (12..22, one tick/hour) + a dot per program
           event at its time + a "now" line tracking the wall clock, so you read where we are
           in the day at a glance. Static SCHEDULE (includes non-scoring events too). */
        .agenda {
            /* Compact type-zone: the agenda is a dense time-proportional timeline (event boxes
               sized by duration), so the global text-token bump (06-13) overflowed short slots.
               Scope the tokens back to their compact pre-bump values here — reference panel, not
               a glance-headline. Cascades to every .tl-* child. */
            --text-xs: clamp(0.75rem, 0.6vw, 1.1875rem); --text-sm: clamp(1rem, 0.85vw, 1.625rem); --text-md: clamp(1.125rem, 0.9vw, 1.75rem);  /* agenda: times hold ~19px (--text-xs), titles bumped → 26px (06-14) */
            grid-row: 1 / 4;   /* three cards tall, aligned with cards 1-3 */
            min-height: 0;
            display: flex; flex-direction: column; gap: var(--space-4);
            padding: var(--space-5);
            border-radius: 8px;
            background: color-mix(in oklch, var(--paper-card) 72%, transparent);
            backdrop-filter: blur(16px) saturate(1.15);
            border: 1px solid var(--paper-border-soft);
            box-shadow: var(--shadow-low);
            overflow: hidden;
        }
        .agenda .ag-head {
            font-family: var(--font-display); font-weight: var(--w-black);
            font-size: var(--display-sm); letter-spacing: var(--ls-tight);
            color: var(--ink); flex-shrink: 0;
        }
        /* Calendar track — hour grid behind, event boxes positioned absolutely by time. */
        .tl { position: relative; flex: 1; min-height: 0; }
        /* Faint hour grid line + label (the ruler). */
        .tl-hour { position: absolute; left: 0; right: 0; transform: translateY(-50%); display: flex; align-items: center; gap: 6px; }
        .tl-hour-lbl {
            font-family: var(--font-label); font-size: var(--text-xs); font-weight: var(--w-bold);
            color: var(--ink-muted); font-variant-numeric: tabular-nums;
            width: 22px; text-align: right; flex-shrink: 0;
        }
        .tl-hour-line { flex: 1; height: 1px; background: var(--paper-border-soft); opacity: 0.55; }
        /* Event box — placed at start, sized to duration. Sits over the grid in the right column. */
        .tl-box {
            position: absolute; left: 32px; right: 0;
            background: var(--paper-card);  /* solid (brightest surface) so the shadow reads as lift, not a blend */
            border: 1px solid var(--paper-border-soft);
            border-left: 3px solid var(--ink-muted);
            border-radius: 6px;
            padding: 3px 8px 2px;
            min-height: 21px;  /* keeps the shortest (30-min) box readable with the new top padding */
            overflow: hidden;
            display: flex; flex-direction: column; justify-content: flex-start; gap: 2px;
            box-shadow: var(--shadow-low);  /* smallest shadow in the system — just a little lift */
        }
        .tl-box-title {
            font-family: var(--font-label); font-weight: var(--w-bold);
            font-size: var(--text-sm); color: var(--ink); line-height: 1.15;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .tl-box-time {
            font-family: var(--font-label); font-size: var(--text-sm);  /* all event times one size — coherent with the 16–21 window time (dashboard-022, 06-16) */
            color: var(--ink-muted); font-variant-numeric: tabular-nums; line-height: 1;
        }
        .tl-box-menu {
            font-family: var(--font-label); font-size: clamp(1rem, 0.78vw, 1.5rem);  /* grey subtitle bumped one level → 24px (06-14) */
            color: var(--ink-muted); line-height: 1.3; margin-top: 1px;
        }
        .tl-box { z-index: 2; }  /* solid event boxes sit above the open-window band */
        /* Current box (now inside its window) — emphasised via border + brightness, same low shadow. */
        .tl-box.is-now {
            border-left-color: var(--ink);
            background: var(--paper-card);
            box-shadow: var(--shadow-low);
        }
        /* Open station-window (16–21) — a translucent band, dashed to read as a period, not an event.
           Lower z-index so the Food Truck box overlaps it cleanly. */
        .tl-window {
            /* Ambient open-period zone — NOT an event box. A soft tinted band that the FIXED (solid,
               shadowed) event boxes sit on top of; the fixed-vs-loose hierarchy comes from depth +
               treatment, not position. No box-border so it doesn't compete with the events; only a
               left accent ties it to the timeline + an explicit "fri rækkefølge" tag (dashboard-022, 06-16). */
            position: absolute; left: 32px; right: 0; z-index: 1;
            border: none;
            border-left: 3px solid color-mix(in oklch, var(--ink-dim) 32%, transparent);
            border-radius: 8px;
            background: color-mix(in oklch, var(--paper-elevated) 55%, transparent);
            padding: 8px 12px;
            overflow: hidden;
            display: flex; flex-direction: column; gap: 8px;
        }
        .tl-window.is-now {
            border-left-color: var(--ink);
            background: color-mix(in oklch, var(--paper-elevated) 72%, transparent);
        }
        .tl-window-head { display: flex; align-items: baseline; justify-content: space-between; gap: 6px; }
        .tl-window-title {
            font-family: var(--font-label); font-weight: var(--w-bold);
            font-size: var(--text-sm); color: var(--ink); line-height: 1.1;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        /* Explicit "this period is open / self-paced" flag — the semantic that makes the ambient
           treatment read as intentional rather than just a faint box. */
        .tl-window-tag {
            flex-shrink: 0;
            padding: 1px 9px; border-radius: 999px;
            font-family: var(--font-label); font-size: var(--text-xs);
            font-weight: var(--w-bold); letter-spacing: var(--ls-label); text-transform: uppercase;
            color: var(--ink-muted);
            background: color-mix(in oklch, var(--ink-dim) 13%, transparent);
            border: 1px solid color-mix(in oklch, var(--ink-dim) 24%, transparent);
            white-space: nowrap;
        }
        .tl-window-time {
            font-family: var(--font-label); font-size: var(--text-sm);  /* 16–21 window times bumped a notch (dashboard-022, 06-16) */
            color: var(--ink-muted); font-variant-numeric: tabular-nums; flex-shrink: 0;
        }
        .tl-stations { display: flex; flex-wrap: wrap; gap: 4px; }
        .tl-st {
            font-family: var(--font-label); font-size: var(--text-sm); font-weight: var(--w-bold);  /* pills sized with the event times for a coherent program block (dashboard-022, 06-16) */
            color: var(--ink-muted); line-height: 1; white-space: nowrap;
            padding: 2px 7px; border-radius: 999px;
            border: 1px solid var(--paper-border-soft); background: var(--paper-card);
        }
        /* Now line — runs across the track at the current time. */
        .tl-now { position: absolute; left: 22px; right: 0; transform: translateY(-50%); z-index: 3; height: 2px; }
        .tl-now::before {
            content: ""; position: absolute; left: 0; right: 0; height: 2px;
            background: var(--live-red); border-radius: 2px;
        }
        .tl-now::after {
            content: ""; position: absolute; left: 0; top: 50%; transform: translate(-50%, -50%);
            width: 7px; height: 7px; border-radius: 50%; background: var(--live-red);
        }

        /* ===== Page header — MK40 + date · clock · LIVE (centred, above the hero) ===== */
        .page-header {
            grid-row: 1;   /* one card tall, aligned with card 1 */
            min-height: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: var(--space-2);
            text-align: center;
            padding: var(--space-4);
            border-radius: 8px;
            background: color-mix(in oklch, var(--paper-card) 72%, transparent);
            backdrop-filter: blur(16px) saturate(1.15);
            border: 1px solid var(--paper-border-soft);
            box-shadow: var(--shadow-low);
        }
        .page-header .ph-title {
            font-family: var(--font-display); font-weight: var(--w-black);
            font-size: clamp(4.75rem, 7.2vw, 9rem); letter-spacing: var(--ls-tight);  /* MK40 — bumped again, bigger still (dashboard-022, 06-16) */
            color: var(--ink); line-height: 0.9;
        }
        .page-header .ph-meta {
            display: flex; align-items: center; gap: var(--space-3);
            font-family: var(--font-label); font-size: var(--text-sm);
            font-weight: var(--w-bold); letter-spacing: var(--ls-label); text-transform: uppercase;
            color: var(--ink-muted);
        }
        .page-header .ph-clock { font-variant-numeric: tabular-nums; }
        .page-header .ph-sep { color: var(--ink-dim); }

        /* ===== Disciplines panel (bottom-right) — placeholders; the numbers match the radar. ===== */
        .disc-panel {
            grid-row: 4 / 6;   /* two cards tall, aligned with cards 4-5 */
            min-height: 0;
            display: flex; flex-direction: column; gap: var(--space-3);
            padding: var(--space-5);
            border-radius: 8px;
            background: color-mix(in oklch, var(--paper-card) 72%, transparent);
            backdrop-filter: blur(16px) saturate(1.15);
            border: 1px solid var(--paper-border-soft);
            box-shadow: var(--shadow-low);
            overflow: hidden;
        }
        .disc-panel .dp-head {
            font-family: var(--font-display); font-weight: var(--w-black);
            font-size: var(--display-sm); letter-spacing: var(--ls-tight);
            color: var(--ink); flex-shrink: 0;
        }
        .disc-panel .dp-list {
            display: flex; flex-direction: column; gap: var(--space-2);
            flex: 1; min-height: 0; justify-content: space-between;
        }
        /* One row per discipline: label (left) + live rå-bars (right). */
        .disc-panel .dp-disc { display: flex; align-items: center; gap: var(--space-3); min-height: 0; }
        .disc-panel .dp-disc.is-locked { opacity: 0.62; }
        .disc-panel .dp-disc-label { flex: 0 0 50%; display: flex; align-items: center; gap: var(--space-2); min-width: 0; }  /* 40→50% so bigger disc names don't truncate (06-13) */
        /* Number chip — mirrors the radar vertex node (paper disc + dark number): the radar↔discipline key. */
        .disc-panel .dp-num {
            flex-shrink: 0;
            display: inline-flex; align-items: center; justify-content: center;
            width: 32px; height: 32px; border-radius: 50%;   /* 20→32: ~4px breathing room around the 22px number (06-14) */
            border: 1px solid var(--paper-border); background: var(--paper-card);
            font-family: var(--font-label); font-size: var(--text-xs); font-weight: var(--w-bold);
            color: var(--ink-muted);
        }
        .disc-panel .dp-name {
            font-family: var(--font-label); font-weight: var(--w-bold);
            font-size: clamp(1.125rem, 1.1vw, 2rem); color: var(--ink);  /* disc-name bumped → 32px (06-14) */
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .disc-panel .dp-status {
            margin-left: auto; flex-shrink: 0; font-family: var(--font-numeric);
            font-size: var(--text-xs); font-weight: var(--w-bold);
        }
        .disc-panel .dp-status.live { color: var(--live-red); }
        .disc-panel .dp-status.locked { color: var(--ink-dim); }
        .disc-panel .dp-status.idle { color: var(--paper-border); }
        /* Bars: lodrette, vinder højest. Højde = rawToBarFraction (normaliseret pr. gren). */
        .disc-panel .dp-bars {
            flex: 1; display: flex; align-items: flex-end; gap: 3px;
            height: 38px; min-width: 0;
        }
        .disc-panel .dp-bar {
            flex: 1; height: 100%; position: relative;
            display: flex; flex-direction: column; justify-content: flex-end; align-items: center;
        }
        .disc-panel .dp-bar-fill {
            width: 100%; height: var(--h, 0%); border-radius: 3px 3px 0 0;
            background: var(--team-color); opacity: 0.55; transition: height 0.4s ease;
        }
        .disc-panel .dp-bar.lead .dp-bar-fill {
            opacity: 1; box-shadow: 0 0 8px color-mix(in oklch, var(--team-color) 45%, transparent);
        }
        .disc-panel .dp-bar.empty .dp-bar-fill {
            height: 3px; background: var(--paper-border-soft); opacity: 0.6; border-radius: 2px;
        }
        .disc-panel .dp-bar-val {
            font-family: var(--font-numeric); font-size: clamp(1rem, 1vw, 1.375rem); font-weight: var(--w-bold);  /* disc-bar vals → 22px (06-14) */
            color: var(--ink-muted); line-height: 1; margin-bottom: 2px; white-space: nowrap;
        }
    </style>
</head>
<body>
    <nav class="app-nav">
        <a href="./cards-h.html" class="current">Scoreboard</a>
        <a href="./qr.html">Hold</a>
        <a href="./musikquiz.html">Quiz</a>
    </nav>

    <div class="shell">
        <div class="cards-stack" id="cards-row">
            <div class="state-message">Henter data…</div>
        </div>
        <div class="col-mid">
            <div class="page-header">
                <div class="ph-title">MK40</div>
                <div class="ph-meta">
                    <span class="ph-date" id="ph-date"></span>
                    <span class="ph-sep">·</span>
                    <span class="ph-clock" id="ph-clock"></span>
                    <span class="live-pill">LIVE</span>
                </div>
            </div>
            <div class="latest-hero-slot">
                <div class="latest-panel empty" id="latest-panel">
                    <div class="lp-tag"><span class="lp-label">Seneste resultat</span><span class="lp-tag-time"></span></div>
                    <div class="lp-empty">Venter på første score</div>
                </div>
            </div>
            <div class="panel bump-panel">
                <div class="panel-header">
                    <span class="title">Placering gennem aftenen</span>
                    <span class="sub">Rank · Bump</span>
                </div>
                <div class="bump-wrap" id="bump-wrap">
                    <svg class="bump-svg" id="bump-svg" preserveAspectRatio="none"></svg>
                </div>
            </div>
        </div>
        <div class="col-right">
            <div class="agenda" id="agenda"></div>
            <div class="disc-panel" id="disc-panel"></div>
        </div>
    </div>

    <!-- dashboard-020: lock-summary overlay — eksploderer fra centrum, 15s dwell, skrumper -->
    <div class="hero-overlay" id="hero-overlay" aria-hidden="true"></div>

    <script type="module">
        import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
        import { SUPABASE_URL, SUPABASE_ANON_KEY } from "./config.js";
        import { computePlacements, rawToBarFraction } from "./score.js";
        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const $ = id => document.getElementById(id);
        const banner = $("top-banner");
        const cardsRow = $("cards-row");
        const bumpSvg = $("bump-svg");
        const bumpWrap = $("bump-wrap");
        const latestPanel = $("latest-panel");
        const discStrip = $("disc-strip");
        const agenda = $("agenda");
        const discPanel = $("disc-panel");
        const overlayEl = $("hero-overlay");

        function cssVarSafe(name) { return String(name).replace(/\//g, "").replace(/\s+/g, ""); }
        function esc(s) { return String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c])); }
        function teamColorVar(team) { return `var(--team-${cssVarSafe(team.team_color)})`; }

        // Puslespil (disc 5) lagrer rå-tal som sekunder → vis mm:ss. Andre grene: rå-tal som det er.
        const TIME_DISC = new Set([5]);
        function fmtRaw(disc, raw) {
            if (raw === null || raw === undefined) return "";
            if (disc && TIME_DISC.has(disc.discipline_key)) {
                const t = Number(raw), m = Math.floor(t / 60), s = Math.abs(t % 60);
                return `${m}:${String(s).padStart(2, "0")}`;
            }
            return String(raw);
        }
        function shortName(name) { return String(name).split(" ").slice(-1)[0]; }

        let lastData = null;

        // ===== Callout state (dashboard-011 + 020) ===========================
        // TO lag (dashboard-020):
        //  • SCORE-entry → lille center-hero (provisorisk, relativ kommentar). Fyrer ofte.
        //  • Disciplin-LÅS → stort overlay (federe summary der væver de små callouts sammen),
        //    eksploderer fra centrum, 15s dwell, skrumper tilbage. Fyrer 7× over aftenen.
        // Host flipper hele grenens rows is_final→true i én batch → lås = pr. disciplin.
        // Dedup: scoreSeen pr. (hold×disc×runde), lockSeen pr. disciplin. Baseline-seed på
        // første poll (ingen kold-start-burst). Kald fejler stille (ADR-5).
        const CALLOUT_URL = `${SUPABASE_URL}/functions/v1/callout`;
        const CALLOUT_TIMEOUT_MS = 12000;  // lock-summary (heavy Sonnet-prompt) målt 7.1s live 06-13 → headroom mod cold-start/load før graceful fallback rammer
        const OVERLAY_DWELL_MS = 15000;  // Mads: 15s først (lock-overlayets explode-dwell)
        const SCORE_DWELL_MS = 15000;    // dashboard-027: min-visningstid pr. lille score-callout før køen drainer den næste (tunbar; sæt evt. ned til solo-testen 023)
        const nowMs = () => performance.now();  // monotonisk elapsed-clock til dwell-gaten (uafhængig af wall-clock)
        // ?demo=1 → lokal success-path-verifikation. Den ægte Edge Function har kun
        // GitHub-Pages-origin i CORS, så et localhost-kald blokeres af browseren; stubben
        // lader os se animation+dedup lokalt uden at røre funktionen.
        const DEMO = new URLSearchParams(location.search).has("demo");

        const scoreSeen = new Set();    // "team:disc:round" — score-entries vi har set/fyret
        const lockSeen = new Set();     // disciplin-keys vi har fyret lock-overlay for
        let baselineSeeded = false;     // første poll seeder uden at fyre
        const calloutLog = new Map();   // discKey → [tekst,…] (rigtige score-callouts, fodres til summary)

        let currentHero = null;         // malet hero-indhold ({kind, …fields, text})
        let heroPaintKey = null;        // "kind:discKey:teamKey:rev" sidst malet → repaint/anim-guard
        let heroRevision = 0;
        let overlayActive = false;      // sandt mens det store overlay er oppe → små callouts holdes tilbage
        let lastCtx = null;             // seneste poll-kontekst (til overlay-flush)

        // dashboard-027 — score-callout-kø: nær-samtidige scores må ikke stjæle hinandens
        // skærmtid. Fresh entries lægges i kø (FIFO, ankomst-orden) og drainer ÉN ad gangen,
        // hver med ≥SCORE_DWELL_MS på skærmen. Spejler lock-overlayets gate-mønster.
        let scoreQueue = [];            // ventende score-entries (ældste først) der ikke er vist endnu
        let scoreBusyUntil = 0;         // performance.now()-deadline: ny score holdes tilbage indtil da
        let scorePending = false;       // sandt mens en score-callout fetcher/maler → undgå dobbelt-drain i fetch-latency

        // Fem sarkastiske fallbacks (Mads' valg): vist når AI fejler/timeouter ELLER ved
        // kold-start. Hero'en bliver aldrig tom; AI er ren enhancement ovenpå (ADR-5).
        const AI_FALLBACKS = [
            "AI'en blev bedt om en kommentar. Den loggede ud i stedet.",
